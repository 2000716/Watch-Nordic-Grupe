<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>

<body style="background:#091B1E; color:white; font-family:Arial;">

<h1>Admin</h1>

<div id="liste"></div>

<script>
async function hent() {
  const res = await fetch("http://localhost:3000/soknader");
  const data = await res.json();

  const div = document.getElementById("liste");
  div.innerHTML = "";

  data.forEach(s => {
    const el = document.createElement("div");

    el.innerHTML = `
    <hr>
    <b>${s.fornavn} ${s.etternavn}</b><br>
    ${s.type} | ${s.rolle}<br>
    ${s.beskrivelse}<br>
    Status: ${s.status}<br>

    <button onclick="update(${s.id}, 'Godkjent')">Godkjenn</button>
    <button onclick="update(${s.id}, 'Avslått')">Avslå</button>
    `;

    div.appendChild(el);
  });
}

async function update(id, status) {
  await fetch("http://localhost:3000/status/" + id, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({status})
  });

  alert("Oppdatert + e-post sendt (simulert)");
  hent();
}

hent();
</script>

</body>
</html>
