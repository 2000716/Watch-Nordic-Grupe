<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Nordic™</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #091B1E;
  color: white;
}

/* NAVBAR */
.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

.logo {
  font-size: 26px;
  font-weight: 900;
  color: #00FFCC;
  letter-spacing: 2px;
}

.nav-buttons a {
  margin-left: 15px;
  text-decoration: none;
  padding: 8px 18px;
  border-radius: 4px;
  font-weight: bold;
}

.login {
  border: 1px solid white;
  color: white;
}

.signup {
  background: #00FFCC;
  color: black;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    #091B1E 10%,
    rgba(9,27,30,0.4) 60%,
    transparent 100%
  );
}

/* HERO CONTENT */
.hero-content {
  position: absolute;
  bottom: 120px;
  left: 50px;
  max-width: 600px;
}

.hero-content h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.hero-content p {
  color: #ccc;
  margin-bottom: 25px;
}

/* BUTTONS */
.cta-buttons {
  display: flex;
  gap: 15px;
}

.cta-buttons a {
  padding: 12px 30px;
  border-radius: 50px;
  font-weight: bold;
  text-decoration: none;
}

.start {
  background: #00FFCC;
  color: black;
}

.more {
  border: 2px solid white;
  color: white;
}

/* SEKSJON */
.section {
  padding: 60px 50px;
}

.section h2 {
  margin-bottom: 20px;
  color: #00FFCC;
}

/* FILM GRID */
.movie-row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.movie-row img {
  width: 250px;
  border-radius: 6px;
  transition: transform 0.3s ease;
}

.movie-row img:hover {
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  padding: 30px;
  text-align: center;
  color: #777;
  font-size: 14px;
}

/* MOBIL */
@media(max-width:768px) {
  .hero-content h1 {
    font-size: 28px;
  }

  .hero-content {
    left: 20px;
    right: 20px;
  }

  .navbar {
    padding: 15px 20px;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">WATCH</div>
  <div class="nav-buttons">
    <a href="login.html" class="login">Logg inn</a>
    <a href="registrer.html" class="signup">Start nå</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1601933470928-c9b6d0fddfbc" alt="Film banner">

  <div class="hero-content">
    <h1>Se filmer og serier uten grenser</h1>
    <p>Stream tusenvis av titler – når som helst, hvor som helst.</p>

    <div class="cta-buttons">
      <a href="registrer.html" class="start">
        <i class="fas fa-play"></i> Start gratis
      </a>
      <a href="#info" class="more">Les mer</a>
    </div>
  </div>
</section>

<!-- POPULÆRT -->
<section class="section">
  <h2>Populært nå</h2>
  <div class="movie-row">
    <img src="https://via.placeholder.com/300x170">
    <img src="https://via.placeholder.com/300x170">
    <img src="https://via.placeholder.com/300x170">
    <img src="https://via.placeholder.com/300x170">
  </div>
</section>

<!-- ORIGINALS -->
<section class="section">
  <h2>Watch Originals</h2>
  <div class="movie-row">
    <img src="https://via.placeholder.com/300x170">
    <img src="https://via.placeholder.com/300x170">
    <img src="https://via.placeholder.com/300x170">
  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  © 2026 Watch Nordic™
</div>

</body>
</html>
