<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Nordic™</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #091B1E;
  font-family: Arial, sans-serif;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 50px;
  z-index: 100;

  background: linear-gradient(
    to bottom,
    rgba(9,27,30,0.9),
    rgba(9,27,30,0)
  );
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 3px;
  color: #00FFCC;

  text-shadow:
    0 0 6px rgba(0,255,204,0.6),
    0 0 18px rgba(0,255,204,0.3);
}

/* BUTTONS */
.nav-buttons {
  display: flex;
  gap: 15px;
}

.nav-buttons a {
  text-decoration: none;
  font-weight: bold;
  padding: 8px 20px;
  border-radius: 4px;
  transition: 0.3s;
}

/* LOGG INN */
.login {
  border: 1px solid white;
  color: white;
}

/* REGISTRER */
.signup {
  background: #00FFCC;
  color: black;
}

/* HOVER */
.nav-buttons a:hover {
  opacity: 0.85;
}

/* SENTRERT TEKST (valgfritt) */
.center-content {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.center-content h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.center-content p {
  color: #aaa;
}

/* MOBIL */
@media(max-width:768px) {
  .navbar {
    padding: 0 20px;
  }

  .logo {
    font-size: 22px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">WATCH</div>

  <div class="nav-buttons">
    <a href="login.html" class="login">Logg inn</a>
    <a href="registrer.html" class="signup">Registrer</a>
  </div>
</div>

<!-- VALGFRITT INNHOLD -->
<div class="center-content">
  <h1>Velkommen til Watch</h1>
  <p>Stream filmer og serier</p>
</div>

</body>
</html>
