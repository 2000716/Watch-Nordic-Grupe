<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Velkommen | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>

    /* ================= RESET ================= */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#091B1E;
      color:white;
      font-family: Inter, Arial, sans-serif;
      overflow-x:hidden;
    }

    /* ================= BAKGRUNN GLOW ================= */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(0,255,204,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,255,204,0.08), transparent 30%);
      z-index:-1;
    }

    /* ================= BACKGROUND WALL (FIXED) ================= */
    .bg-wall {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;

      display: flex;
      flex-wrap: wrap;

      transform: perspective(1200px) rotateY(-18deg) scale(1.2);
      transform-origin: left;

      opacity: 0.25;
    }

    .bg-wall::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #091B1E 40%, transparent);
    }

    .bg-item {
      width: 140px;
      height: 200px;
      margin: 10px;

      background-size: cover;
      background-position: center;

      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);

      filter: brightness(0.8) saturate(1.1);
      transition: transform 0.3s;
    }

    .bg-item:nth-child(even) {
      transform: translateY(20px);
    }

    /* ================= NAVBAR ================= */
    .navbar{
      position:fixed;
      top:0;
      width:100%;
      height:80px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 60px;
      z-index:999;
      backdrop-filter:blur(14px);
      background:rgba(9,27,30,0.65);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .logo{
      font-size:30px;
      font-weight:900;
      letter-spacing:4px;
      color:#00FFCC;
      text-shadow:0 0 8px rgba(0,255,204,0.7);
    }

    .nav-buttons{
      display:flex;
      gap:15px;
    }

    .nav-buttons a{
      text-decoration:none;
      padding:12px 22px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
    }

    .login{
      color:white;
      border:1px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.04);
    }

    .signup{
      background:#00FFCC;
      color:#071214;
      box-shadow:0 0 25px rgba(0,255,204,0.35);
    }

    /* ================= HERO ================= */
    .hero{
      position:relative;
      height:100vh;
      display:flex;
      align-items:center;
      overflow:hidden;
    }

    .hero img{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(0.45);
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:650px;
      margin-left:70px;
    }

    .hero-content h1{
      font-size:72px;
      font-weight:900;
    }

    .hero-content p{
      color:#c9d1d1;
      font-size:19px;
    }

    /* ================= MOVIES ================= */
    .section{
      padding:70px 60px;
    }

    .movie-row{
      display:flex;
      gap:20px;
      overflow-x:auto;
    }

    .movie-card{
      min-width:230px;
      transition:0.3s;
    }

    .movie-card img{
      width:100%;
      height:340px;
      object-fit:cover;
      border-radius:18px;
    }

    .movie-card:hover{
      transform:scale(1.05);
    }

    .movie-overlay{
      position:absolute;
      inset:0;
      opacity:0;
      transition:0.3s;
    }

    .movie-card:hover .movie-overlay{
      opacity:1;
    }

    /* ================= DEVICES ================= */
    .devices{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:25px;
    }

    .device{
      padding:30px;
      background:rgba(255,255,255,0.04);
      border-radius:20px;
    }

    /* ================= FOOTER ================= */
    .footer{
      padding:70px;
      color:#7d7d7d;
    }

    .footer-links{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    /* ================= MOBILE ================= */
    @media (max-width:768px){

      .navbar{
        padding:10px 16px;
      }

      .hero-content h1{
        font-size:34px;
      }

      .section{
        padding:40px 16px;
      }

      .movie-card{
        min-width:150px;
      }

      .movie-card img{
        height:220px;
      }

      .devices{
        grid-template-columns:repeat(2,1fr);
      }

      .footer-links{
        grid-template-columns:repeat(2,1fr);
      }
    }

  </style>
</head>

<body>

<div class="bg-wall" id="bg-wall"></div>

<nav class="navbar">
  <div class="logo">WATCH</div>
  <div class="nav-buttons">
    <a href="login.html" class="login">Logg inn</a>
    <a href="registrer.html" class="signup">Registrer</a>
  </div>
</nav>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1601933470928-c9b6d0fddfbc">

  <div class="hero-content">
    <h1>Filmer og serier.<br>På neste nivå.</h1>
    <p>Stream tusenvis av filmer og serier.</p>
  </div>
</section>

<section class="section" id="filmer">
  <h2>Populært på Watch</h2>
  <div class="movie-row" id="film-galleri"></div>
</section>

<section class="section">
  <div class="devices">
    <div class="device"><i class="fas fa-tv"></i><h3>Smart-TV</h3></div>
    <div class="device"><i class="fas fa-laptop"></i><h3>PC</h3></div>
    <div class="device"><i class="fas fa-mobile-alt"></i><h3>Mobil</h3></div>
    <div class="device"><i class="fas fa-tablet-alt"></i><h3>Nettbrett</h3></div>
  </div>
</section>

<footer class="footer">
  <div class="footer-links">
    <a href="#">Om</a>
    <a href="#">Kontakt</a>
    <a href="#">Personvern</a>
    <a href="#">Hjelp</a>
  </div>
</footer>

<script src="Filmdata.js"></script>

<script>
const bgWall = document.getElementById("bg-wall");
const gallery = document.getElementById("film-galleri");

if (typeof filmer !== "undefined") {

  Object.keys(filmer).forEach(key => {

    const film = filmer[key];

    // BACKGROUND WALL
    const div = document.createElement("div");
    div.className = "bg-item";
    div.style.backgroundImage = `url(${film.poster})`;
    bgWall.appendChild(div);

    // GALLERY
    const card = document.createElement("div");
    card.className = "movie-card";
    card.innerHTML = `
      <img src="${film.poster}">
      <div class="movie-overlay">
        <h3>${film.tittel || "Film"}</h3>
        <p>Se nå</p>
      </div>
    `;

    gallery.appendChild(card);
  });

}
</script>

</body>
</html>
