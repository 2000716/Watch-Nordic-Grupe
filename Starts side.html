<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velkommen | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
 <style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #091B1E;
  font-family: Arial, sans-serif;
  color: white;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 50px;
  z-index: 100;

  background: linear-gradient(
    to bottom,
    rgba(9,27,30,0.9),
    rgba(9,27,30,0)
  );
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 3px;
  color: #00FFCC;

  text-shadow:
    0 0 6px rgba(0,255,204,0.6),
    0 0 18px rgba(0,255,204,0.3);
}

/* BUTTONS */
.nav-buttons {
  display: flex;
  gap: 15px;
}

.nav-buttons a {
  text-decoration: none;
  font-weight: bold;
  padding: 8px 20px;
  border-radius: 4px;
  transition: 0.3s;
}

/* LOGG INN */
.login {
  border: 1px solid white;
  color: white;
}

/* REGISTRER */
.signup {
  background: #00FFCC;
  color: black;
}

/* ================= HERO ================= */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
}

/* bakgrunnsbilde */
.hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* mørk fade */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(9,27,30,0.95) 20%,
    rgba(9,27,30,0.4) 60%,
    transparent 100%
  );
}

/* tekst */
.hero-content {
  position: relative;
  z-index: 2;
  margin-left: 60px;
  max-width: 500px;
}

.hero-content h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.hero-content p {
  color: #ccc;
  margin-bottom: 20px;
}

.hero-content a {
  display: inline-block;
  padding: 12px 30px;
  background: #00FFCC;
  color: black;
  border-radius: 40px;
  text-decoration: none;
  font-weight: bold;
}

/* ================= GALLERI ================= */
.section {
  padding: 60px 50px;
}

.section h2 {
  margin-bottom: 20px;
  color: #00FFCC;
}

.movie-row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.movie-row img {
  width: 220px;
  border-radius: 6px;
  pointer-events: none; /* 🔥 gjør dem ikke klikkbare */
}

/* ================= ENHETER ================= */
.devices {
  display: flex;
  justify-content: center;
  gap: 50px;
  text-align: center;
  flex-wrap: wrap;
}

.device {
  max-width: 150px;
}

.device i {
  font-size: 40px;
  margin-bottom: 10px;
  color: #00FFCC;
}

/* MOBIL */
@media(max-width:768px) {

  .hero-content h1 {
    font-size: 30px;
  }

  .hero-content {
    margin-left: 20px;
  }

  .navbar {
    padding: 0 20px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">WATCH</div>
  <div class="nav-buttons">
    <a href="login.html" class="login">Logg inn</a>
    <a href="registrer.html" class="signup">Registrer</a>
  </div>
</div>

<!-- ================= HERO ================= -->
<section class="hero">
  <img src="https://images.unsplash.com/photo-1601933470928-c9b6d0fddfbc">

  <div class="hero-content">
    <h1>Se filmer og serier</h1>
    <p>Stream tusenvis av titler – når som helst.</p>
    <a href="registrer.html">Start nå</a>
  </div>
</section>

<!-- ================= FILMER ================= -->
<section class="section">
  <h2>Tilgjengelige filmer</h2>
  <div class="movie-row" id="film-galleri"></div>
</section>

<!-- ================= ENHETER ================= -->
<section class="section">
  <h2>Se hvor som helst</h2>

  <div class="devices">
    <div class="device">
      <i class="fas fa-tv"></i>
      <p>Smart-TV</p>
    </div>

    <div class="device">
      <i class="fas fa-laptop"></i>
      <p>PC / Mac</p>
    </div>

    <div class="device">
      <i class="fas fa-mobile-alt"></i>
      <p>Mobil</p>
    </div>

    <div class="device">
      <i class="fas fa-tablet-alt"></i>
      <p>Nettbrett</p>
    </div>
  </div>
</section>

<!-- ================= SCRIPT ================= -->
<script src="Filmdata.js"></script>
<script>

// Hent filmer fra din Filmdata.js

  Object.keys(filmer).forEach(key => {
    const film = filmer[key];

    const img = document.createElement("img");
    img.src = film.poster;

    gallery.appendChild(img);
  });
}

</script>

</body>
</html>
