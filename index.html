<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Velkommen | Watch Nordic™</title>

  <link rel="manifest" href="manifest.json">
  <script>
    // 1. Registrer Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // 2. Disney-Intro logikk: Vises kun hvis i "standalone" modus (appen)
    // Bruker sessionStorage for at introen skal vises hver gang appen startes på nytt
    const erIAppModus = window.matchMedia('(display-mode: standalone)').matches;
    if (erIAppModus && !sessionStorage.getItem("harSettIntro")) {
      sessionStorage.setItem("harSettIntro", "true");
      window.location.href = "intro.html";
    }
  </script>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ================= RESET ================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #091B1E; color: white; font-family: Inter, Arial, sans-serif; overflow-x: hidden; }

    /* ================= BAKGRUNN GLOW ================= */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(0,255,204,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,255,204,0.08), transparent 30%);
      z-index: -1;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      position: fixed; top: 0; width: 100%; height: 80px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 60px; z-index: 999;
      backdrop-filter: blur(14px);
      background: rgba(9,27,30,0.65);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { font-size: 30px; font-weight: 900; letter-spacing: 4px; color: #00FFCC; text-shadow: 0 0 8px rgba(0,255,204,0.7), 0 0 20px rgba(0,255,204,0.3); }
    .nav-buttons { display: flex; align-items: center; gap: 15px; }
    .nav-buttons a { text-decoration: none; padding: 12px 22px; border-radius: 999px; font-weight: 700; transition: 0.3s ease; font-size: 14px; }
    .login { color: white; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
    .login:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .signup { background: #00FFCC; color: #071214; box-shadow: 0 0 25px rgba(0,255,204,0.35); }
    .signup:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 0 35px rgba(0,255,204,0.5); }

    /* ================= HERO ================= */
    .hero { position: relative; height: 100vh; display: flex; align-items: center; overflow: hidden; background: #091B1E; }
    .hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to right, rgba(9,27,30,1) 25%, rgba(9,27,30,0.7) 55%, rgba(9,27,30,0.2) 100%); z-index: 1; }
    .hero::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 250px; background: linear-gradient(to top, #091B1E, transparent); z-index: 1; }
    .hero-content { position: relative; z-index: 2; max-width: 650px; margin-left: 70px; }
    .hero-content h1 { font-size: 72px; line-height: 1; margin-bottom: 20px; font-weight: 900; }
    .hero-content p { color: #c9d1d1; font-size: 19px; line-height: 1.6; margin-bottom: 35px; max-width: 550px; }
    .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-buttons a { text-decoration: none; font-weight: 800; transition: 0.3s ease; }
    .primary-btn { background: #00FFCC; color: #071214; padding: 16px 34px; border-radius: 999px; box-shadow: 0 0 30px rgba(0,255,204,0.35); }
    .primary-btn:hover { transform: scale(1.04); }

    /* ================= SEKSJONER & FILMROW ================= */
    .section { padding: 70px 60px; }
    .movie-row { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scroll-behavior: smooth; }
    .movie-card { position: relative; min-width: 230px; transition: 0.35s ease; cursor: pointer; flex-shrink: 0; }
    .movie-card img { width: 100%; height: 340px; object-fit: cover; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    
    /* ================= HERO WALL (3D PC) ================= */
    .hero-wall { position: absolute; inset: 0; overflow: hidden; z-index: 0; transform: perspective(2000px) rotateY(-22deg) rotateX(4deg) scale(1.25); transform-origin: right center; opacity: .32; }

    /* ================= RESPONSIVE / MEDIA QUERIES ================= */
    @media (max-width: 768px) {
      .hero { height: auto; min-height: 95vh; padding-top: 100px; text-align: center; }
      .hero-content { margin: 0 auto; padding: 0 20px; }
      .navbar { padding: 12px 20px; }
      .movie-card { min-width: 150px; }
      .movie-card img { height: 220px; }
    }

    /* ================= NØDBREMS (ROTASJONSLÅS) ================= */
    @media screen and (orientation: landscape) and (max-width: 900px) {
      body { position: fixed !important; overflow: hidden !important; width: 100vw !important; height: 100vh !important; }
      body::after {
        content: "Vennligst snu telefonen til portrett-modus.";
        position: fixed; top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: #091B1E; color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 99999999; font-family: Inter, sans-serif; font-size: 18px; text-align: center; padding: 20px;
      }
    }
  </style>
</head>
<body>
    </body>
</html>
