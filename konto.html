<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Konto | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      /* De originale fargene og stilene er satt tilbake her */
      --bg: #0d1b2a;
      --muted: #a0aab2;
      --accent: #e50914;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: #1b263b;
      --kids-accent: #33b5ff;
      --danger: #ff4d4d;
      --gray-btn: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px 50px;
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-img {
      height: 35px;
      object-fit: contain;
    }

    header .nav-btns { display: flex; gap: 12px; }

    header button {
      background: var(--gray-btn);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    header button:hover { 
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255,255,255,0.4);
    }

    header button.logout-btn {
      border-color: rgba(255, 77, 77, 0.3);
      color: var(--danger);
    }
    header button.logout-btn:hover {
      background: rgba(255, 77, 77, 0.15);
      border-color: var(--danger);
    }

    .container {
      max-width: 1050px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 30px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 50px;
      flex: 1;
    }

    .sidebar {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      border: 1px solid var(--border);
      height: fit-content;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 15px;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
      transition: transform 0.2s ease, border-color 0.2s;
    }

    .avatar:hover {
      border-color: var(--accent);
      transform: scale(1.03);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name { font-size: 19px; font-weight: 700; margin-bottom: 25px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

    .profile-actions { display: flex; flex-direction: column; gap: 10px; }

    .profile-actions button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 11px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .profile-actions button:hover { background: rgba(255,255,255,0.1); }

    .profile-actions button.delete-btn {
      border-color: rgba(255, 77, 77, 0.3);
      color: var(--danger);
      margin-top: 15px;
    }
    .profile-actions button.delete-btn:hover {
      background: rgba(255, 77, 77, 0.1);
      border-color: var(--danger);
    }

    .content-section { margin-bottom: 40px; }

    .content h2 {
      margin: 0 0 15px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 0 24px;
      border: 1px solid var(--border);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .row:last-child { border-bottom: none; }

    .info-block { flex: 1; padding-right: 20px; }

    .label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .value { font-size: 15px; font-weight: 500; color: #f0f0f0; }

    .row button.edit-trigger {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .row button.edit-trigger:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
    }

    .hidden { display: none !important; }

    .edit-field { margin-top: 12px; width: 100%; max-width: 420px; }

    .edit-field input, .edit-field select {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: white;
      font-size: 14px;
      margin-bottom: 8px;
      outline: none;
    }
    .edit-field input:focus, .edit-field select:focus { border-color: var(--accent); }
    .edit-field select option { background: var(--bg); color: white; }

    .edit-actions { display: flex; gap: 10px; margin-top: 4px; }
    .edit-actions button {
      padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-save { background: var(--accent); color: white; border: none; }
    .btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--muted); }

    .parent-lock-screen { text-align: center; padding: 30px 0; }
    
    .btn-parent-unlock {
      background: var(--gray-btn);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 24px;
      font-weight: 700;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-parent-unlock:hover { background: rgba(255,255,255,0.2); border-color: var(--accent); }

    footer {
      border-top: 1px solid var(--border);
      padding: 25px;
      color: var(--muted);
      opacity: 0.6;
      font-size: 12px;
      margin-top: auto;
      text-align: center;
    }

    @media (max-width: 850px) {
      .container { grid-template-columns: 1fr; padding: 20px; gap: 30px; }
      .sidebar { width: 100%; }
      .row { flex-direction: column; align-items: flex-start; gap: 12px; }
      header { padding: 15px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" alt="Watch Nordic Logo" class="logo-img">
    <div class="nav-btns">
      <button id="navHovedsideBtn"><i class="fa-solid fa-house"></i> Hovedside</button>
      <button class="logout-btn" id="navLoggUtBtn"><i class="fa-solid fa-right-from-bracket"></i> Logg Ut</button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="avatar" id="avatarContainer">
        <img id="profilbilde" src="" alt="Profilbilde">
      </div>
      <div class="profile-name" id="navnDisplay">Laster...</div>
      <div class="profile-actions" id="sidebarActions">
        <button id="endreBildeSideBtn"><i class="fa-solid fa-user-gear"></i> Endre bilde</button>
        <button class="delete-btn" id="sletteKnapp"><i class="fa-solid fa-trash-can"></i> Slett profil</button>
      </div>
    </aside>

    <section class="content">
      <div class="content-section">
        <h2>Medlemskap og personvern</h2>
        <div class="card">
          <div class="row" id="navnRow">
            <div class="info-block">
              <div class="label">Profilnavn</div>
              <div class="value" id="navnView">Laster...</div>
              
              <div class="edit-field hidden" id="navnEditField">
                <input type="text" id="navnInput" maxlength="15">
                <div class="edit-actions">
                  <button class="btn-save" id="lagreNavnBtn">Lagre</button>
                  <button class="btn-cancel" id="avbrytNavnBtn">Avbryt</button>
                </div>
              </div>
            </div>
            <button class="edit-trigger" id="endreNavnKnapp">Endre</button>
          </div>
          <div class="row" id="epostRow">
            <div class="info-block">
              <div class="label">E-postadresse (Konto)</div>
              <div class="value" id="epostView">Laster...</div>
            </div>
          </div>
        </div>
      </div>

      <div id="foreldreKontrollSeksjon" class="content-section hidden">
        <h2>Foreldrekontroll</h2>
        <div class="card">
          <div id="parentLockPanel" class="parent-lock-screen">
            <p style="margin-bottom: 15px; color: var(--muted); font-size: 13px;">Innholdsbegrensninger er låst. Foreldre må bekrefte PIN.</p>
            <button class="btn-parent-unlock" id="laasOppForeldreKontrollBtn"><i class="fa-solid fa-lock"></i> Vis innstillinger med PIN</button>
          </div>

          <div id="parentSettingsPanel" class="hidden" style="padding: 15px 0;">
            <div class="edit-field">
              <label class="label">Velg profil du vil begrense:</label>
              <select id="profileSelect" style="margin-top: 5px;"></select>
            </div>
            
            <div class="edit-field" style="margin-top: 15px;">
              <label class="label">Maks tillatt aldersgrense:</label>
              <select id="ageRestrictionSelect" style="margin-top: 5px;">
                <option value="A">Tillat kun innhold for alle (A)</option>
                <option value="6">Maks 6 år</option>
                <option value="9">Maks 9 år</option>
                <option value="12">Maks 12 år</option>
                <option value="18">Ingen restriksjoner (Voksen)</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer>© 2026 Watch Nordic Group AS. Alle rettigheter forbeholdt.</footer>

  <script type="module">
    import { auth, db } from "./firebase-oppsett.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const aktivProfilIndex = parseInt(urlParams.get('index')) || 0;
    const FORELDRE_PIN = "1234";

    const navnDisplay = document.getElementById("navnDisplay");
    const navnView = document.getElementById("navnView");
    const navnInput = document.getElementById("navnInput");
    const epostView = document.getElementById("epostView");
    const foreldreKontrollSeksjon = document.getElementById("foreldreKontrollSeksjon");
    const parentLockPanel = document.getElementById("parentLockPanel");
    const parentSettingsPanel = document.getElementById("parentSettingsPanel");
    const profileSelect = document.getElementById("profileSelect");
    const ageRestrictionSelect = document.getElementById("ageRestrictionSelect");
    const sletteKnapp = document.getElementById("sletteKnapp");

    let profiler = [];
    let globalEpost = ""; 
    let docRef = null;

    // Økonomisk lokal-caching
    const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
    const cachedEmail = localStorage.getItem("watch_nordic_email_cache");
    if (cachedProfiles && cachedEmail) {
      profiler = JSON.parse(cachedProfiles);
      globalEpost = cachedEmail;
      if(profiler[aktivProfilIndex]) byggProfilgrensesnitt();
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        docRef = doc(db, "users", user.uid);
        globalEpost = user.email || globalEpost;
        hentKontodata();
      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById("navHovedsideBtn").addEventListener("click", () => {
      window.location.href = `hvem-ser-på.html?index=${aktivProfilIndex}`;
    });
    document.getElementById("navLoggUtBtn").addEventListener("click", loggUt);
    document.getElementById("laasOppForeldreKontrollBtn").addEventListener("click", laasOppForeldreKontroll);
    profileSelect.addEventListener("change", oppdaterValgtProfilISekvens);
    ageRestrictionSelect.addEventListener("change", lagreAldersgrenseGlobalt);
    sletteKnapp.addEventListener("click", haandterSlettingMellomProfil);
    
    document.getElementById("endreNavnKnapp").addEventListener("click", endreNavn);
    document.getElementById("lagreNavnBtn").addEventListener("click", lagreNavn);
    document.getElementById("avbrytNavnBtn").addEventListener("click", avbrytNavn);

    async function hentKontodata() {
      try {
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          profiler = data.profiler || [];
          globalEpost = data.epost || globalEpost;
          localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
          localStorage.setItem("watch_nordic_email_cache", globalEpost);
          byggProfilgrensesnitt();
        }
      } catch (e) { console.error(e); }
    }

    function byggProfilgrensesnitt() {
      const gjeldendeProfil = profiler[aktivProfilIndex];
      if (!gjeldendeProfil) return;

      navnDisplay.innerText = gjeldendeProfil.navn;
      navnView.innerText = gjeldendeProfil.navn;
      epostView.innerText = globalEpost;
      document.getElementById("profilbilde").src = gjeldendeProfil.bilde;

      if (aktivProfilIndex === 0) {
        sletteKnapp.innerHTML = `<i class="fa-solid fa-trash-can"></i> Slett konto permanent`;
      } else {
        sletteKnapp.innerHTML = `<i class="fa-solid fa-user-xmark"></i> Slett profil`;
      }

      if (gjeldendeProfil.isKids) {
        foreldreKontrollSeksjon.classList.add("hidden");
        document.getElementById("endreNavnKnapp").classList.add("hidden");
      } else {
        foreldreKontrollSeksjon.classList.remove("hidden");
        fyllProfilVelger();
      }
    }

    function fyllProfilVelger() {
      profileSelect.innerHTML = "";
      profiler.forEach((prof, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.innerText = prof.navn + (prof.isKids ? " (Barn)" : "");
        profileSelect.appendChild(opt);
      });
      profileSelect.value = aktivProfilIndex;
      oppdaterValgtProfilISekvens();
    }

    function oppdaterValgtProfilISekvens() {
      const targetIndex = profileSelect.value;
      ageRestrictionSelect.value = profiler[targetIndex].maksAldersgrense || "18";
    }

    function endreNavn() {
      navnInput.value = navnView.innerText;
      navnView.classList.add("hidden");
      document.getElementById("navnEditField").classList.remove("hidden");
      document.getElementById("endreNavnKnapp").classList.add("hidden");
    }

    async function lagreNavn() {
      const nyttNavn = navnInput.value.trim();
      if (!nyttNavn) return alert("Navnet kan ikke være tomt!");
      
      if (nyttNavn === profiler[aktivProfilIndex].navn) {
        avbrytNavn();
        return;
      }

      profiler[aktivProfilIndex].navn = nyttNavn;
      await setDoc(docRef, { profiler: profiler }, { merge: true });
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));

      navnView.innerText = nyttNavn;
      navnDisplay.innerText = nyttNavn;
      avbrytNavn();
    }

    function avbrytNavn() {
      navnView.classList.remove("hidden");
      document.getElementById("navnEditField").classList.add("hidden");
      document.getElementById("endreNavnKnapp").classList.remove("hidden");
    }

    function laasOppForeldreKontroll() {
      if (prompt("Skriv inn foreldre-PIN:") === FORELDRE_PIN) {
        parentLockPanel.classList.add("hidden");
        parentSettingsPanel.classList.remove("hidden");
      } else {
        alert("Feil PIN!");
      }
    }

    async function lagreAldersgrenseGlobalt() {
      const targetIndex = profileSelect.value;
      const nyGrense = ageRestrictionSelect.value;

      if (profiler[targetIndex].maksAldersgrense === nyGrense) return;

      profiler[targetIndex].maksAldersgrense = nyGrense;
      
      await setDoc(docRef, { profiler: profiler }, { merge: true });
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      alert(`Aldersgrense for ${profiler[targetIndex].navn} ble oppdatert.`);
    }

    async function haandterSlettingMellomProfil() {
      if (aktivProfilIndex !== 0) {
        if (!confirm(`Er du sikker på at du vil slette profilen "${profiler[aktivProfilIndex].navn}" permanent?`)) return;
        
        profiler.splice(aktivProfilIndex, 1);
        await setDoc(docRef, { profiler: profiler }, { merge: true });
        localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
        
        alert("Profilen ble slettet.");
        window.location.href = "hvem-ser-på.html?index=0"; 
      } else {
        if (!confirm("ADVARSEL: Vil du slette HELE kontoen og alle underprofiler permanent? Dette sletter alt.")) return;
        alert("Forespørsel om sletting sendt.");
        loggUt();
      }
    }

    async function loggUt() {
      localStorage.clear();
      await signOut(auth);
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
