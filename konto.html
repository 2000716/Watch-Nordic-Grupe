<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Konto | Watch Nordic™</title>
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #091B1E; --muted: #bfc9c9; --accent: #00FFCC;
      --card-bg: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
    .container { max-width: 900px; margin: 40px auto; padding: 20px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .value { font-size: 16px; margin-top: 5px; }
    .btn-action { background: var(--accent); color: #071214; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <h2><i class="fa-solid fa-gear"></i> Kontoinnstillinger</h2>
    
    <div class="card">
      <div class="row">
        <div><div class="label">Profilnavn</div><div class="value" id="navnView">Laster...</div></div>
        <button class="btn-action" id="endreNavnKnapp">Endre</button>
      </div>
      <div class="row">
        <div><div class="label">E-postadresse</div><div class="value" id="epostView">Laster...</div></div>
      </div>
    </div>

    <div id="foreldreKontrollSeksjon">
      <h2><i class="fa-solid fa-shield-halved"></i> Foreldrekontroll</h2>
      <div class="card">
        <div id="parentLockPanel">
          <button class="btn-action" id="laasOppForeldreKontrollBtn">Lås opp foreldrekontroll</button>
        </div>
        <div id="parentSettingsPanel" class="hidden">
          <label>Maks aldersgrense:</label>
          <select id="ageRestrictionSelect">
            <option value="A">Alle (A)</option>
            <option value="6">6 år</option>
            <option value="12">12 år</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-oppsett.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // Enkel caching-mekanisme for å unngå unødvendige reads
    async function loadData() {
      const cached = localStorage.getItem("user_data");
      if (cached) {
        render(JSON.parse(cached));
      }
      
      const user = auth.currentUser;
      if (user) {
        const docRef = doc(db, "users", user.uid);
        const snap = await getDoc(docRef); // Kun 1 read ved innlasting
        if (snap.exists()) {
          const data = snap.data();
          localStorage.setItem("user_data", JSON.stringify(data));
          render(data);
        }
      }
    }

    async function saveData(newData) {
      // Skriver kun til Firestore hvis nødvendig
      const user = auth.currentUser;
      await setDoc(doc(db, "users", user.uid), newData, { merge: true });
      localStorage.setItem("user_data", JSON.stringify(newData));
    }

    function render(data) {
      document.getElementById("navnView").innerText = data.profiler[0].navn;
      document.getElementById("epostView").innerText = data.epost;
    }

    loadData();
  </script>
</body>
</html>
