<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Konto | Watch Nordic™</title>
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --bg: #091B1E; --muted: #bfc9c9; --accent: #00FFCC; --card-bg: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08); --kids-accent: #33b5ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: white; font-family: 'Inter', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 20px 60px; background: rgba(9, 27, 30, 0.65); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 24px; font-weight: 900; color: var(--accent); }
    .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 40px 60px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
    .sidebar { background: var(--card-bg); border-radius: 24px; padding: 35px; text-align: center; border: 1px solid var(--border); height: fit-content; }
    .avatar { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; border: 3px solid rgba(255,255,255,0.1); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .card { background: var(--card-bg); border-radius: 24px; padding: 20px 24px; margin-bottom: 35px; border: 1px solid var(--border); }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .hidden { display: none !important; }
    .edit-field { width: 100%; margin-top: 10px; }
    .edit-field input, .edit-field select { width: 100%; padding: 12px; background: #091B1E; border: 1px solid var(--border); border-radius: 10px; color: white; }
    .btn-save { background: var(--accent); color: #071214; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }
    footer { border-top: 1px solid var(--border); padding: 30px; text-align: center; color: #666; margin-top: auto; }
  </style>
</head>
<body>

  <header>
    <h1>WATCH</h1>
    <div>
      <button id="navHovedsideBtn">Hovedside</button>
      <button id="navLoggUtBtn">Logg Ut</button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="avatar"><img id="profilbilde" src="" alt="Profil"></div>
      <div id="navnDisplay" style="font-size: 22px; font-weight: 700;">Laster...</div>
      <div id="sidebarActions" style="margin-top:20px;">
        <button id="sletteKnapp">Slett profil</button>
      </div>
    </aside>

    <section class="content">
      <h2>Kontoinformasjon</h2>
      <div class="card">
        <div class="row">
          <div>
            <div style="font-size:12px; color:var(--muted);">Profilnavn</div>
            <div id="navnView">Laster...</div>
            <div id="navnEditField" class="edit-field hidden">
              <input type="text" id="navnInput">
              <button class="btn-save" id="lagreNavnBtn">Lagre</button>
            </div>
          </div>
          <button id="endreNavnKnapp">Endre</button>
        </div>
      </div>

      <div id="foreldreKontrollSeksjon" class="hidden">
        <h2>Foreldrekontroll</h2>
        <div class="card">
          <div id="parentLockPanel">
            <button id="laasOppForeldreKontrollBtn">Lås opp med PIN</button>
          </div>
          <div id="parentSettingsPanel" class="hidden">
            <select id="ageRestrictionSelect">
              <option value="A">Alle (A)</option>
              <option value="6">6 år</option>
              <option value="12">12 år</option>
            </select>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer>© 2026 Watch Nordic Group AS.</footer>

  <script type="module">
    import { auth, db } from "./firebase-oppsett.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const index = parseInt(urlParams.get('index')) || 0;
    let profiler = [], docRef = null;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        docRef = doc(db, "users", user.uid);
        hentData();
      } else { window.location.href = "index.html"; }
    });

    async function hentData() {
      const snap = await getDoc(docRef);
      if (snap.exists()) {
        profiler = snap.data().profiler;
        const p = profiler[index];
        document.getElementById("navnDisplay").innerText = p.navn;
        document.getElementById("navnView").innerText = p.navn;
        document.getElementById("profilbilde").src = p.bilde;
        if (p.isKids) document.getElementById("foreldreKontrollSeksjon").classList.remove("hidden");
      }
    }

    document.getElementById("endreNavnKnapp").onclick = () => {
      document.getElementById("navnView").classList.add("hidden");
      document.getElementById("navnEditField").classList.remove("hidden");
      document.getElementById("navnInput").value = document.getElementById("navnView").innerText;
    };

    document.getElementById("lagreNavnBtn").onclick = async () => {
      profiler[index].navn = document.getElementById("navnInput").value;
      await setDoc(docRef, { profiler }, { merge: true });
      location.reload();
    };

    document.getElementById("laasOppForeldreKontrollBtn").onclick = () => {
      if (prompt("Skriv PIN (1234):") === "1234") {
        document.getElementById("parentLockPanel").classList.add("hidden");
        document.getElementById("parentSettingsPanel").classList.remove("hidden");
      }
    };

    document.getElementById("navLoggUtBtn").onclick = () => { signOut(auth); window.location.href = "index.html"; };
  </script>
</body>
</html>
