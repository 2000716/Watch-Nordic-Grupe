<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konto | Watch Nordic™</title>

<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:#141414;
  --muted:#b3b3b3;
}

body {
  margin:0;
  background:#141414;
  color:white;
  font-family:system-ui;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #222;
}

header button {
  background:none;
  border:1px solid #555;
  color:white;
  padding:8px 16px;
  cursor:pointer;
  border-radius:6px;
}

.container {
  display:grid;
  grid-template-columns:280px 1fr;
  gap:40px;
  padding:40px;
}

.sidebar {
  text-align:center;
}

.avatar {
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  cursor:pointer;
  transition:.2s;
}

.avatar:hover {
  transform:scale(1.05);
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-name {
  margin-top:15px;
  font-size:20px;
}

.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:8px;
  margin-top:5px;
  background:#111;
  border:1px solid #333;
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>Konto</h1>
  <div>
    <button onclick="tilbake()">Tilbake</button>
    <button onclick="loggUt()">Logg ut</button>
  </div>
</header>

<div class="container">

<div class="sidebar">
  <div class="avatar" onclick="endreProfilbilde()">
    <img id="profilbilde">
  </div>

  <div class="profile-name" id="navnDisplay"></div>

  <br>
  <button onclick="velgProfil()">Bytt profil</button>
  <br><br>
  <button onclick="slettProfil()" style="color:red;">Slett profil</button>
</div>

<div>

<div class="card">
  <h3>Navn</h3>
  <div id="navnView"></div>

  <div id="navnEdit" class="hidden">
    <input id="navnInput">
    <button onclick="lagreNavn()">Lagre</button>
  </div>

  <button onclick="endreNavn()">Endre</button>
</div>

<div class="card">
  <h3>E-post</h3>
  <div id="epostView"></div>

  <div id="epostEdit" class="hidden">
    <input id="epostInput">
    <button onclick="lagreEpost()">Lagre</button>
  </div>

  <button onclick="endreEpost()">Endre</button>
</div>

</div>
</div>

<script>

/* LOGIN */
if (!localStorage.getItem("epost")) {
  window.location.href = "Innloggings side.html";
}

/* DATA */
let profiler = JSON.parse(localStorage.getItem("profiler")) || [];
let aktivProfil = Number(localStorage.getItem("aktivProfil")) || 0;

/* FAILSAFE */
if (!profiler[aktivProfil]) {
  window.location.href = "hvem-ser-på.html";
}

let aktiv = profiler[aktivProfil];

/* 🔥 FIX: hent nytt bilde fra registrering */
let nyttBilde = localStorage.getItem("valgtProfilbilde");

if (nyttBilde) {
  profiler[aktivProfil].bilde = nyttBilde;
  localStorage.setItem("profiler", JSON.stringify(profiler));
  localStorage.removeItem("valgtProfilbilde");

  aktiv = profiler[aktivProfil];
}

/* LOAD UI */
function loadUI() {
  document.getElementById("navnDisplay").innerText = aktiv.navn;
  document.getElementById("navnView").innerText = aktiv.navn;

  document.getElementById("profilbilde").src =
    aktiv.bilde || "https://api.dicebear.com/7.x/avataaars/svg?seed=user";

  document.getElementById("epostView").innerText =
    localStorage.getItem("epost") || "";
}

loadUI();

/* NAVN */
function endreNavn() {
  document.getElementById("navnEdit").classList.remove("hidden");
  document.getElementById("navnInput").value = aktiv.navn;
}

function lagreNavn() {
  let ny = document.getElementById("navnInput").value.trim();
  if (!ny) return;

  aktiv.navn = ny;
  profiler[aktivProfil] = aktiv;

  localStorage.setItem("profiler", JSON.stringify(profiler));

  loadUI();
  document.getElementById("navnEdit").classList.add("hidden");
}

/* EPOST */
function endreEpost() {
  document.getElementById("epostEdit").classList.remove("hidden");
  document.getElementById("epostInput").value = localStorage.getItem("epost");
}

function lagreEpost() {
  let ny = document.getElementById("epostInput").value.trim();
  if (!ny) return;

  localStorage.setItem("epost", ny);
  loadUI();
  document.getElementById("epostEdit").classList.add("hidden");
}

/* PROFILBILDE */
function endreProfilbilde() {
  localStorage.setItem("redigerProfilIndex", aktivProfil);
  window.location.href = "profilbilder.html";
}

/* NAV */
function tilbake() {
  window.location.href = "hvem-ser-på.html";
}

function velgProfil() {
  window.location.href = "hvem-ser-på.html";
}

/* SLETT */
function slettProfil() {
  if (!confirm("Slette profil?")) return;

  profiler.splice(aktivProfil, 1);

  localStorage.setItem("profiler", JSON.stringify(profiler));
  localStorage.setItem("aktivProfil", 0);

  window.location.href = "hvem-ser-på.html";
}

/* LOGG UT */
function loggUt() {
  localStorage.clear();
  window.location.href = "Innloggings side.html";
}

</script>

</body>
</html>
