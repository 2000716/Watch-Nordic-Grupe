<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konto | Watch Nordic</title>

<style>
:root {
  --bg:#0b0b0b;
  --bg-soft:#141414;
  --muted:#9ca3af;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background: linear-gradient(to bottom, #000, #0b0b0b 60%, #111);
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* HEADER */
header {
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #1a1a1a;
}

header h1 {
  margin:0;
  font-size:20px;
  font-weight:600;
}

header button {
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

header button:hover { opacity:0.7; }

/* LAYOUT */
.container {
  max-width:1100px;
  margin:auto;
  padding:40px;
  display:grid;
  grid-template-columns:250px 1fr;
  gap:60px;
}

/* SIDEBAR */
.sidebar {
  text-align:left;
}

.avatar {
  width:120px;
  height:120px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.avatar:hover {
  transform:scale(1.05);
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-name {
  margin-top:15px;
  font-size:18px;
  font-weight:500;
}

.profile-actions {
  margin-top:15px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.profile-actions button {
  text-align:left;
  padding:6px 0;
  color:#ccc;
}

.profile-actions button:hover { color:white; }

/* CONTENT */
.content {
  max-width:700px;
}

h2 {
  font-size:26px;
  margin-bottom:10px;
}

/* ROWS */
.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
  border-bottom:1px solid #1a1a1a;
}

.label {
  color:var(--muted);
  font-size:13px;
}

.value {
  font-size:15px;
}

/* EDIT */
.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  background:#111;
  border:1px solid #222;
  color:white;
  border-radius:6px;
  margin-top:8px;
}

.edit-actions {
  margin-top:10px;
  display:flex;
  gap:10px;
}

.edit-actions button {
  font-size:13px;
}

/* MOBILE */
@media (max-width:900px) {
  .container {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>Konto</h1>
  <div>
    <button onclick="window.location.href='Hovedside.html'">Tilbake</button>
    <button onclick="loggUt()">Logg ut</button>
  </div>
</header>

<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="avatar" onclick="velgProfil()">
    <img id="profilbilde" src="https://via.placeholder.com/120">
  </div>

  <div class="profile-name" id="navnDisplay"></div>

  <div class="profile-actions">
    <button onclick="velgProfil()">Endre profilbilde</button>
    <button onclick="bekreftSlettBruker()" style="color:#ff4d4d;">
      Slett profil
    </button>
  </div>
</aside>

<!-- CONTENT -->
<section class="content">

<h2>Kontoinformasjon</h2>

<!-- NAVN -->
<div class="row" id="navnRow">
  <div>
    <div class="label">Navn</div>
    <div class="value" id="navnView"></div>

    <div class="hidden">
      <input type="text" id="navnInput">
      <div class="edit-actions">
        <button onclick="lagreNavn()">Lagre</button>
        <button onclick="avbrytNavn()">Avbryt</button>
      </div>
    </div>
  </div>
  <button onclick="endreNavn()">Endre</button>
</div>

<!-- EPOST -->
<div class="row" id="epostRow">
  <div>
    <div class="label">E-post</div>
    <div class="value" id="epostView"></div>

    <div class="hidden">
      <input type="email" id="epostInput">
      <div class="edit-actions">
        <button onclick="lagreEpost()">Lagre</button>
        <button onclick="avbrytEpost()">Avbryt</button>
      </div>
    </div>
  </div>
  <button onclick="endreEpost()">Endre</button>
</div>

<!-- PASSORD -->
<div class="row">
  <div>
    <div class="label">Passord</div>
    <div class="value">••••••••</div>
  </div>
</div>

</section>
</div>

<script>
// redirect hvis ikke logget inn
if (!localStorage.getItem("epost")) {
  window.location.href = "Innlogging.html";
}

const navnDisplay = document.getElementById("navnDisplay");
const navnView = document.getElementById("navnView");
const navnInput = document.getElementById("navnInput");
const navnRow = document.getElementById("navnRow");

const epostView = document.getElementById("epostView");
const epostInput = document.getElementById("epostInput");
const epostRow = document.getElementById("epostRow");

// LOAD
navnDisplay.innerText = localStorage.getItem("navn") || "Profil";
navnView.innerText = localStorage.getItem("navn") || "Profil";
epostView.innerText = localStorage.getItem("epost") || "";

const bilde = localStorage.getItem("profilbilde");
if (bilde) document.getElementById("profilbilde").src = bilde;

// PROFILBILDE
function velgProfil() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      localStorage.setItem("profilbilde", reader.result);
      document.getElementById("profilbilde").src = reader.result;
    };

    if (file) reader.readAsDataURL(file);
  };

  input.click();
}

// NAVN
function endreNavn() {
  navnInput.value = navnView.innerText;
  navnView.classList.add("hidden");
  navnRow.querySelector(".hidden").classList.remove("hidden");
}

function lagreNavn() {
  const ny = navnInput.value.trim();
  if (!ny) return;
  localStorage.setItem("navn", ny);
  navnView.innerText = ny;
  navnDisplay.innerText = ny;
  avbrytNavn();
}

function avbrytNavn() {
  navnView.classList.remove("hidden");
  navnRow.querySelector("input").parentElement.classList.add("hidden");
}

// EPOST
function endreEpost() {
  epostInput.value = epostView.innerText;
  epostView.classList.add("hidden");
  epostRow.querySelector(".hidden").classList.remove("hidden");
}

function lagreEpost() {
  const ny = epostInput.value.trim();
  if (!ny.includes("@")) {
    alert("Ugyldig e-post");
    return;
  }
  localStorage.setItem("epost", ny);
  epostView.innerText = ny;
  avbrytEpost();
}

function avbrytEpost() {
  epostView.classList.remove("hidden");
  epostRow.querySelector("input").parentElement.classList.add("hidden");
}

// SLETT
function bekreftSlettBruker() {
  if (!confirm("Vil du slette profilen permanent?")) return;
  localStorage.clear();
  window.location.href = "index.html";
}

// LOGG UT
function loggUt() {
  if (!confirm("Vil du logge ut?")) return;
  localStorage.removeItem("epost");
  localStorage.removeItem("passord");
  window.location.href = "Innlogging.html";
}
</script>

</body>
</html>
