<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Konto | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    :root {
      --bg: #091B1E;
      --muted: #bfc9c9;
      --accent: #00FFCC;
      --card-bg: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(0,255,204,0.08), transparent 35%);
      z-index: -1;
    }

    header {
      padding: 20px 60px;
      background: rgba(9, 27, 30, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { 
      font-size: 24px; 
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,255,204,0.3);
    }

    header .nav-btns {
      display: flex;
      gap: 12px;
    }

    header button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    header button:hover { 
      background: rgba(255,255,255,0.12);
      border-color: white;
    }

    header button.logout-btn {
      border-color: rgba(255, 77, 77, 0.4);
      color: #ff4d4d;
    }
    header button.logout-btn:hover {
      background: rgba(255, 77, 77, 0.1);
      border-color: #ff4d4d;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 60px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
      flex: 1;
    }

    .sidebar {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 35px 24px;
      text-align: center;
      border: 1px solid var(--border);
      height: fit-content;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      cursor: pointer;
      border: 3px solid rgba(255,255,255,0.1);
      transition: 0.3s ease;
      position: relative;
    }

    .avatar:hover {
      border-color: var(--accent);
      transform: scale(1.02);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 25px;
      word-break: break-word;
    }

    .profile-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .profile-actions button {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .profile-actions button:hover { 
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
    }

    .profile-actions button.delete-btn {
      border-color: rgba(255, 77, 77, 0.2);
      color: #ff4d4d;
      margin-top: 15px;
    }
    .profile-actions button.delete-btn:hover {
      background: rgba(255, 77, 77, 0.15);
      border-color: #ff4d4d;
    }

    .content h2 {
      margin: 0 0 18px;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .content h2 i {
      color: var(--accent);
      font-size: 18px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 10px 24px;
      margin-bottom: 35px;
      border: 1px solid var(--border);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .row:last-child { border-bottom: none; }

    .info-block {
      flex: 1;
      padding-right: 20px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .value { font-size: 16px; font-weight: 500; }

    .row button.edit-trigger {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s;
    }

    .row button.edit-trigger:hover {
      background: rgba(255,255,255,0.08);
      border-color: white;
    }

    .hidden { display: none !important; }

    .edit-field { margin-top: 10px; width: 100%; max-width: 400px; }

    .edit-field input {
      width: 100%;
      padding: 12px;
      background: rgba(9, 27, 30, 0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: white;
      font-size: 15px;
    }

    .edit-field input:focus { outline: none; border-color: var(--accent); }

    .edit-actions { margin-top: 12px; display: flex; gap: 10px; }

    .edit-actions button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-save { background: var(--accent); color: #071214; border: none; }
    .btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); }

    footer {
      border-top: 1px
