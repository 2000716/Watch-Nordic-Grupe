<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Min Konto | Watch Nordic™</title>
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  
  <style>
    :root { --bg: #091B1E; --muted: #bfc9c9; --accent: #00FFCC; --card-bg: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08); --kids-accent: #33b5ff; }
    body { background: var(--bg); color: white; font-family: 'Inter', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at top left, rgba(0,255,204,0.08), transparent 35%); z-index: -1; }
    header { padding: 20px 60px; background: rgba(9, 27, 30, 0.65); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 24px; font-weight: 900; color: var(--accent); }
    .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 40px 60px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; flex: 1; }
    .sidebar { background: var(--card-bg); border-radius: 24px; padding: 35px 24px; border: 1px solid var(--border); }
    .card { background: var(--card-bg); border-radius: 24px; padding: 20px 24px; margin-bottom: 35px; border: 1px solid var(--border); }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    button { cursor: pointer; padding: 10px 20px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: white; font-weight: 700; transition: 0.2s; }
    .logout-btn { border-color: #ff4d4d; color: #ff4d4d; }
    .delete-btn { border-color: #ff4d4d; color: #ff4d4d; margin-top: 15px; width: 100%; }
    .hidden { display: none !important; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlfCbB1AuiKVHMBEhYd0cvkJ0jxHVZfUg",
      authDomain: "watch-nordic-78b99.firebaseapp.com",
      projectId: "watch-nordic-78b99",
      storageBucket: "watch-nordic-78b99.firebasestorage.app",
      messagingSenderId: "541804766412",
      appId: "1:541804766412:web:83fc77721e384131a1ce69"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Sjekk innlogging via Firebase
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.getElementById("epostView").innerText = user.email;
        document.getElementById("navnDisplay").innerText = user.displayName || "Bruker";
        document.getElementById("navnView").innerText = user.displayName || "Bruker";
      }
    });

    // Funksjon for sletting
    window.haandterSletting = async () => {
      if (!confirm("ADVARSEL: Dette vil slette kontoen din og all fremdrift fra våre servere permanent. Er du sikker?")) return;

      const user = auth.currentUser;
      try {
        // 1. Slett fra Firestore (brukerdata)
        await deleteDoc(doc(db, "brukere", user.uid));
        // 2. Slett fra Firebase Auth
        await deleteUser(user);
        
        localStorage.clear();
        alert("Kontoen er slettet.");
        window.location.href = "index.html";
      } catch (error) {
        if (error.code === 'auth/requires-recent-login') {
          alert("Av sikkerhetshensyn: Logg ut og inn igjen for å bekrefte sletting.");
        } else {
          alert("Feil ved sletting: " + error.message);
        }
      }
    };

    window.loggUt = () => {
      signOut(auth).then(() => {
        localStorage.clear();
        window.location.href = "index.html";
      });
    };
  </script>
</head>
<body>

  <header>
    <h1>WATCH</h1>
    <div class="nav-btns">
      <button onclick="window.location.href='Hovedside.html'">Hovedside</button>
      <button class="logout-btn" onclick="loggUt()">Logg Ut</button>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="profile-name" id="navnDisplay">Laster...</div>
      <button class="delete-btn" onclick="haandterSletting()">Slett konto permanent</button>
    </aside>

    <section class="content">
      <h2>Kontoinformasjon</h2>
      <div class="card">
        <div class="row">
          <div class="info-block">
            <div class="label">E-postadresse</div>
            <div class="value" id="epostView">Laster...</div>
          </div>
        </div>
        <div class="row">
          <div class="info-block">
            <div class="label">Navn</div>
            <div class="value" id="navnView">Laster...</div>
          </div>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
