<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konto</title>

<style>
:root {
  --bg:#000;
  --bg-soft:#0f0f0f;
  --line:#1a1a1a;
  --text-muted:#a1a1aa;
}

body {
  margin:0;
  background:#000;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* HEADER */
header {
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
}

header h1 {
  font-size:18px;
  font-weight:500;
}

header button {
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* MAIN */
.main {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* PROFILE TOP */
.profile-top {
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:40px;
}

.avatar {
  width:90px;
  height:90px;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.avatar:hover {
  transform:scale(1.05);
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-name {
  font-size:22px;
  font-weight:600;
}

.change-btn {
  font-size:13px;
  color:var(--text-muted);
  cursor:pointer;
}

.change-btn:hover {
  color:white;
}

/* SECTION */
.section {
  margin-bottom:40px;
}

.section h2 {
  font-size:20px;
  font-weight:600;
  margin-bottom:15px;
}

/* ROW */
.row {
  display:flex;
  justify-content:space-between;
  padding:18px 0;
  border-bottom:1px solid var(--line);
}

.label {
  color:var(--text-muted);
  font-size:13px;
}

.value {
  font-size:15px;
}

/* EDIT */
.hidden { display:none; }

input {
  background:#111;
  border:1px solid #222;
  color:white;
  padding:10px;
  border-radius:6px;
  margin-top:8px;
}

.edit-actions {
  margin-top:8px;
  display:flex;
  gap:10px;
}

.edit-actions button {
  font-size:13px;
}

/* DELETE */
.danger {
  color:#ff4d4d;
  cursor:pointer;
}

.danger:hover {
  opacity:0.8;
}
</style>
</head>

<body>

<header>
  <h1>Konto</h1>
  <div>
    <button onclick="loggUt()">Logg ut</button>
  </div>
</header>

<div class="main">

<!-- PROFILE -->
<div class="profile-top">
  <div class="avatar" onclick="velgProfil()">
    <img id="profilbilde" src="https://via.placeholder.com/90">
  </div>

  <div>
    <div class="profile-name" id="navnDisplay"></div>
    <div class="change-btn" onclick="velgProfil()">Endre profilbilde</div>
  </div>
</div>

<!-- ACCOUNT -->
<div class="section">
  <h2>Konto</h2>

  <div class="row" id="navnRow">
    <div>
      <div class="label">Navn</div>
      <div class="value" id="navnView"></div>

      <div class="hidden">
        <input id="navnInput">
        <div class="edit-actions">
          <button onclick="lagreNavn()">Lagre</button>
          <button onclick="avbrytNavn()">Avbryt</button>
        </div>
      </div>
    </div>
    <button onclick="endreNavn()">Endre</button>
  </div>

  <div class="row" id="epostRow">
    <div>
      <div class="label">E-post</div>
      <div class="value" id="epostView"></div>

      <div class="hidden">
        <input id="epostInput">
        <div class="edit-actions">
          <button onclick="lagreEpost()">Lagre</button>
          <button onclick="avbrytEpost()">Avbryt</button>
        </div>
      </div>
    </div>
    <button onclick="endreEpost()">Endre</button>
  </div>

  <div class="row">
    <div>
      <div class="label">Passord</div>
      <div class="value">••••••••</div>
    </div>
  </div>
</div>

<!-- DELETE -->
<div class="section">
  <div class="danger" onclick="bekreftSlettBruker()">Slett konto</div>
</div>

</div>

<script>
if (!localStorage.getItem("epost")) {
  window.location.href = "Innlogging.html";
}

const navnDisplay = document.getElementById("navnDisplay");
const navnView = document.getElementById("navnView");
const navnInput = document.getElementById("navnInput");
const navnRow = document.getElementById("navnRow");

const epostView = document.getElementById("epostView");
const epostInput = document.getElementById("epostInput");
const epostRow = document.getElementById("epostRow");

// LOAD
navnDisplay.innerText = localStorage.getItem("navn") || "Profil";
navnView.innerText = localStorage.getItem("navn") || "Profil";
epostView.innerText = localStorage.getItem("epost") || "";

const bilde = localStorage.getItem("profilbilde");
if (bilde) document.getElementById("profilbilde").src = bilde;

// PROFILBILDE
function velgProfil() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      localStorage.setItem("profilbilde", reader.result);
      document.getElementById("profilbilde").src = reader.result;
    };

    if (file) reader.readAsDataURL(file);
  };

  input.click();
}

// NAVN
function endreNavn() {
  navnInput.value = navnView.innerText;
  navnView.classList.add("hidden");
  navnRow.querySelector(".hidden").classList.remove("hidden");
}

function lagreNavn() {
  const ny = navnInput.value.trim();
  if (!ny) return;
  localStorage.setItem("navn", ny);
  navnView.innerText = ny;
  navnDisplay.innerText = ny;
  avbrytNavn();
}

function avbrytNavn() {
  navnView.classList.remove("hidden");
  navnRow.querySelector("input").parentElement.classList.add("hidden");
}

// EPOST
function endreEpost() {
  epostInput.value = epostView.innerText;
  epostView.classList.add("hidden");
  epostRow.querySelector(".hidden").classList.remove("hidden");
}

function lagreEpost() {
  const ny = epostInput.value.trim();
  if (!ny.includes("@")) {
    alert("Ugyldig e-post");
    return;
  }
  localStorage.setItem("epost", ny);
  epostView.innerText = ny;
  avbrytEpost();
}

function avbrytEpost() {
  epostView.classList.remove("hidden");
  epostRow.querySelector("input").parentElement.classList.add("hidden");
}

// DELETE
function bekreftSlettBruker() {
  if (!confirm("Slette konto permanent?")) return;
  localStorage.clear();
  window.location.href = "index.html";
}

// LOGG UT
function loggUt() {
  localStorage.removeItem("epost");
  localStorage.removeItem("passord");
  window.location.href = "Innlogging.html";
}
</script>

</body>
</html>
