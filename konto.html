<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konto | Watch Nordic™</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:#141414;
  --muted:#b3b3b3;
  --accent:#00a8e1;
}

* {
  box-sizing:border-box;
  transition: all 0.25s ease;
}

body {
  margin:0;
  background: linear-gradient(180deg,#0e0e0e,#141414);
  color:white;
  font-family:sans-serif;
}

/* HEADER */
header {
  padding:20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
}

button {
  background:none;
  border:1px solid #444;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  transform:scale(1.05);
}

/* LAYOUT */
.container {
  display:grid;
  grid-template-columns:280px 1fr;
  gap:40px;
  padding:40px;
}

/* SIDEBAR */
.sidebar {
  background:#1c1c1c;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

.avatar {
  width:150px;
  height:150px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  cursor:pointer;
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.avatar:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(0,168,225,0.5);
}

/* CARD */
.card {
  background:#1c1c1c;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #333;
}

.row:last-child {
  border-bottom:none;
}

/* EDIT */
.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:white;
  border-radius:6px;
}

input:focus {
  border-color:var(--accent);
}

/* TOAST */
.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  padding:10px 16px;
  border-radius:8px;
  opacity:0;
  transform:translateY(20px);
}

.toast.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <h2>Konto</h2>
  <div>
    <button onclick="loggUt()">Logg ut</button>
  </div>
</header>

<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="avatar" onclick="upload.click()">
    <img id="bilde" src="https://via.placeholder.com/150">
  </div>

  <input type="file" id="upload" hidden accept="image/*">

  <h3 id="navn"></h3>
</aside>

<!-- CONTENT -->
<section>

<div class="card">
<h3>Kontoinfo</h3>

<div class="row">
  <div>
    <div>Navn</div>
    <div id="navnView"></div>
    <input id="navnInput" class="hidden">
  </div>
  <button onclick="editNavn()">Endre</button>
</div>

<div class="row">
  <div>
    <div>E-post</div>
    <div id="epostView"></div>
  </div>
</div>

</div>

<div class="card">
<h3>Abonnement</h3>

<div class="row">
  <div>Plan</div>
  <div id="plan"></div>
</div>

<div class="row">
  <div>Kvalitet</div>
  <div id="kvalitet"></div>
</div>

<div class="row">
  <div>Skjermer</div>
  <div id="skjermer"></div>
</div>

<button onclick="endrePlan('basic')">Basic</button>
<button onclick="endrePlan('premium')">Premium</button>

</div>

</section>
</div>

<script type="module">

// 🔥 FIREBASE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ⚠️ LEGG INN DIN CONFIG HER
const firebaseConfig = {
  apiKey: "DIN_KEY",
  authDomain: "DIN_APP.firebaseapp.com",
  projectId: "DIN_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI
const navn = document.getElementById("navn");
const navnView = document.getElementById("navnView");
const navnInput = document.getElementById("navnInput");
const epostView = document.getElementById("epostView");
const bilde = document.getElementById("bilde");
const upload = document.getElementById("upload");

// TOAST
function toast(msg){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),50);
  setTimeout(()=>t.remove(),2000);
}

// AUTH CHECK
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="Innlogging.html";
    return;
  }

  epostView.innerText=user.email;

  // HENT DATA
  const ref = doc(db,"brukere",user.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();

    navn.innerText=data.navn || "Profil";
    navnView.innerText=data.navn || "Profil";

    if(data.bilde) bilde.src=data.bilde;

    document.getElementById("plan").innerText=data.plan;
    document.getElementById("kvalitet").innerText=data.kvalitet;
    document.getElementById("skjermer").innerText=data.skjermer;
  }
});

// ENDRE NAVN
window.editNavn = ()=>{
  navnInput.classList.remove("hidden");
  navnInput.value=navnView.innerText;
};

window.lagreNavn = async ()=>{
  const user=auth.currentUser;
  const ny=navnInput.value;

  await setDoc(doc(db,"brukere",user.uid),{
    navn:ny
  },{merge:true});

  navn.innerText=ny;
  navnView.innerText=ny;
  navnInput.classList.add("hidden");

  toast("Navn oppdatert");
};

// PROFILBILDE
upload.addEventListener("change",()=>{
  const file=upload.files[0];
  const reader=new FileReader();

  reader.onload=async(e)=>{
    const base64=e.target.result;
    bilde.src=base64;

    const user=auth.currentUser;

    await setDoc(doc(db,"brukere",user.uid),{
      bilde:base64
    },{merge:true});

    toast("Profilbilde lagret");
  };

  reader.readAsDataURL(file);
});

// ABONNEMENT
window.endrePlan = async(plan)=>{
  const user=auth.currentUser;

  const data = plan==="premium"
  ? {plan:"Premium", kvalitet:"4K", skjermer:4}
  : {plan:"Basic", kvalitet:"HD", skjermer:1};

  await setDoc(doc(db,"brukere",user.uid),data,{merge:true});

  location.reload();
};

// LOGOUT
window.loggUt = ()=>{
  signOut(auth);
};

</script>

</body>
</html>
