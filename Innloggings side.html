<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Innlogging / Registrering | Watch Nordic™</title>
  
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ================= RESET & BASE ================= */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background: #091B1E;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
      position: relative;
    }

    /* Fallback bakgrunn hvis JS-postere ikke laster inn */
    .bg-fallback {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(9, 27, 30, 0.85), rgba(9, 27, 30, 0.85)),
                  url('https://static.wixstatic.com/media/fd2fb2_cb01bba1adf84bf1aa5ef6ec7cb2f055~mv2.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }

    /* Overleggsgradient for å gi dybde og sikre at teksten er lesbar */
    .overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(9,27,30,0.6) 0%, rgba(9,27,30,0.95) 100%);
      z-index: 2;
    }

    /* ================= 3D POSTER VEGG ================= */
    .hero-wall {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      transform: perspective(2000px) rotateY(-18deg) rotateX(4deg) scale(1.2);
      transform-origin: right center;
      opacity: 0.25;
    }

    .wall-row {
      display: flex;
      gap: 16px;
      width: max-content;
      margin-bottom: 16px;
    }

    .wall-row img {
      width: 240px;
      height: 135px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .row1 { margin-left: -100px; }
    .row2 { margin-left: -250px; }
    .row3 { margin-left: -50px; }
    .row4 { margin-left: -180px; }

    /* ================= SKJEMA CONTAINER ================= */
    .container {
      background-color: rgba(15, 42, 46, 0.45);
      padding: 45px 40px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
      max-width: 420px;
      width: 100%;
      text-align: center;
      z-index: 10;
      margin: 20px;
      transition: all 0.3s ease;
    }

    .logo-container {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #00FFCC;
      margin-bottom: 25px;
      text-shadow: 0 0 10px rgba(0,255,204,0.5);
    }

    h2 { 
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px; 
    }
    
    p.subtitle {
      font-size: 14px;
      color: #bfc9c9;
      margin-bottom: 25px;
    }

    label { 
      display: block; 
      text-align: left; 
      margin-top: 18px; 
      margin-bottom: 6px; 
      font-size: 13px; 
      font-weight: 600;
      color: #bfc9c9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input { 
      width: 100%; 
      padding: 14px; 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 10px; 
      background: rgba(9, 27, 30, 0.6);
      color: white;
      font-size: 15px;
      transition: 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: #00FFCC;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
    }

    button.submit-btn {
      width: 100%; 
      padding: 15px; 
      background-color: #00FFCC;
      color: #071214; 
      border: none; 
      border-radius: 999px;
      cursor: pointer; 
      font-size: 16px; 
      font-weight: 800;
      margin-top: 25px;
      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(0,255,204,0.25);
    }
    
    button.submit-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,255,204,0.45);
    }

    .error { 
      color: #ff4c4c; 
      margin-top: 12px; 
      min-height: 20px; 
      font-size: 14px;
      font-weight: 600;
    }

    .toggle-text, .forgot-text { 
      margin-top: 18px; 
      font-size: 14px; 
      color: #bfc9c9;
    }
    
    .toggle-text a, .forgot-text a { 
      color: #00FFCC; 
      cursor: pointer; 
      text-decoration: none; 
      font-weight: 700;
    }

    .toggle-text a:hover, .forgot-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .hero-wall {
        opacity: 0.15;
        transform: perspective(1000px) rotateY(-10deg) scale(1.3);
      }
      .wall-row img {
        width: 150px;
        height: 85px;
      }
      .container {
        padding: 35px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-fallback"></div>
  <div class="overlay"></div>

  <div class="hero-wall">
    <div class="wall-row row1"></div>
    <div class="wall-row row2"></div>
    <div class="wall-row row3"></div>
    <div class="wall-row row4"></div>
  </div>

  <div class="container">
    <div class="logo-container">WATCH</div>
    <h2 id="formTitle">Logg inn</h2>
    <p class="subtitle" id="formSubtitle">Vennligst oppgi dine detaljer for å fortsette</p>

    <form id="authForm">
      <div id="navnGruppe" style="display: none;">
        <label for="navn">Navn</label>
        <input type="text" id="navn" placeholder="Ditt fulle navn" autocomplete="name" />
      </div>

      <label for="epost">E-postadresse</label>
      <input type="email" id="epost" placeholder="navn@domene.no" autocomplete="email" required />

      <label for="passord">Passord</label>
      <input type="password" id="passord" placeholder="••••••••" autocomplete="current-password" required />

      <button type="submit" class="submit-btn" id="submitKnapp">Fortsett</button>
      <div class="error" id="feilmelding"></div>
    </form>

    <div class="forgot-text" id="forgotContainer">
      <a href="Passordfeil.html">Glemt passord?</a>
    </div>

    <div class="toggle-text" id="toggleText">
      Er du ikke medlem? <a onclick="visRegistrering()">Registrer deg</a>
    </div>
  </div>

  <script src="Filmdata.js"></script>
  <script src="Seriedata.js"></script>

  <script type="module">
    // 1. Hent den ferdig oppsatte databasen og autentiseringen fra fellesfilen din
    import { auth, db } from "./firebase-oppsett.js";

    // 2. Hent kun funksjonene denne siden trenger fra de offisielle CDN-lenkene (v12.15.0)
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    let registreringsmodus = false;

    // ================= SKJEMABEHANDLING MED FIREBASE =================
    document.getElementById("authForm").addEventListener("submit", async function(event) {
      event.preventDefault(); 
      
      const epost = document.getElementById("epost").value.trim().toLowerCase();
      const passord = document.getElementById("passord").value.trim();
      const navn = document.getElementById("navn").value.trim() || "Hovedprofil";
      const feilmelding = document.getElementById("feilmelding");
      
      feilmelding.textContent = "Laster..."; 

      try {
        if (registreringsmodus) {
          // 1. Opprett bruker i Firebase Auth
          const userCredential = await createUserWithEmailAndPassword(auth, epost, passord);
          const user = userCredential.user;

          // 2. Opprett brukerdokumentet i Firestore med navn med en gang!
          await setDoc(doc(db, "users", user.uid), {
            epost: epost,
            profiler: [
              {
                navn: navn,
                bilde: "https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png",
                isKids: false,
                maksAldersgrense: "12"
              }
            ]
          });

          // Send videre til Hovedside med profilindeks 0
          window.location.href = "Hovedside.html?index=0";
        } else {
          // Firebase Innlogging
          await signInWithEmailAndPassword(auth, epost, passord);
          window.location.href = "Hovedside.html?index=0";
        }
      } catch (error) {
        if (error.code === 'auth/email-already-in-use') {
          feilmelding.textContent = "E-posten er allerede registrert.";
        } else if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          feilmelding.textContent = "Feil e-post eller passord.";
        } else if (error.code === 'auth/weak-password') {
          feilmelding.textContent = "Passordet er for svakt (minst 6 tegn).";
        } else {
          feilmelding.textContent = "En feil oppstod. Prøv igjen.";
          console.error(error); 
        }
      }
    });

    // ================= GRENSESNITTBYTTE =================
    function visRegistrering() {
      registreringsmodus = true;
      document.getElementById("formTitle").textContent = "Registrer deg";
      document.getElementById("formSubtitle").textContent = "Opprett en konto for å starte streamingen";
      document.getElementById("submitKnapp").textContent = "Registrer";
      document.getElementById("forgotContainer").style.display = "none";
      document.getElementById("toggleText").innerHTML =
        'Allerede medlem? <a onclick="visInnlogging()">Logg inn</a>';
      document.getElementById("navnGruppe").style.display = "block";
      document.getElementById("feilmelding").textContent = "";
      document.getElementById("passord").setAttribute("autocomplete", "new-password");
    }

    function visInnlogging() {
      registreringsmodus = false;
      document.getElementById("formTitle").textContent = "Logg inn";
      document.getElementById("formSubtitle").textContent = "Vennligst oppgi dine detaljer for å fortsette";
      document.getElementById("submitKnapp").textContent = "Fortsett";
      document.getElementById("forgotContainer").style.display = "block";
      document.getElementById("toggleText").innerHTML =
        'Er du ikke medlem? <a onclick="visRegistrering()">Registrer deg</a>';
      document.getElementById("navnGruppe").style.display = "none";
      document.getElementById("feilmelding").textContent = "";
      document.getElementById("passord").setAttribute("autocomplete", "current-password");
    }

    // Gjør disse tilgjengelige globalt for onclick i HTML-en siden vi kjører i en modul
    window.visRegistrering = visRegistrering;
    window.visInnlogging = visInnlogging;

    /* ================= 3D GENERATOR FOR PLAKATER ================= */
    const rows = [
      document.querySelector(".row1"),
      document.querySelector(".row2"),
      document.querySelector(".row3"),
      document.querySelector(".row4")
    ];

    let posters = [];

    if(typeof filmer !== "undefined"){
      Object.values(filmer).forEach(f => f.poster && posters.push(f.poster));
    }
    if(typeof serier !== "undefined"){
      Object.values(serier).forEach(s => s.poster && posters.push(s.poster));
    }

    posters.sort(() => Math.random() - 0.5);

    if(posters.length > 0) {
      document.querySelector(".bg-fallback").style.background = "#091B1E";
      rows.forEach(row => {
        if(row) {
          for(let i = 0; i < 3; i++){ 
            posters.forEach(src => {
              const img = document.createElement("img");
              img.src = src;
              img.loading = "lazy";
              row.appendChild(img);
            });
          }
        }
      });
    }
  </script>
</body>
</html>
