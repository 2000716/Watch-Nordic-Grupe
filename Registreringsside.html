<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velg Profilbilde – Watch Nordic</title>

  <style>
    body {
      background: #0d1117;
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .rad-container {
      margin: 0 auto 40px;
      max-width: 900px;
    }

    .bilder-rad {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 20px;
      justify-items: center;
    }

    .bilde-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .bilde-navn {
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .profilbilde-valg {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid transparent;
      transition: 0.3s;
      cursor: pointer;
    }

    .profilbilde-valg:hover {
      border-color: white;
      transform: scale(1.05);
    }

    .profilbilde-valg.selected {
      border-color: white;
      box-shadow: 0 0 12px white;
    }

    .tilbake-knapp {
      margin-top: 40px;
      background: white;
      color: #0d1117;
      padding: 14px 28px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .tilbake-knapp:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Velg Profilbilde</h1>

<div id="hoved-container"></div>

<button class="tilbake-knapp" onclick="tilbakeTilKonto()">Lagre og tilbake</button>

<script>

const rader = [
  {
    bilder: [
      'https://static.wixstatic.com/media/d9ace9_f30eec65f0434128974f59e1bba6d30d~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_ca94b393665e49c98c8432e69a33e49f~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_675337e8909c4b44aa606f634ad6a2ed~mv2.jpg'
    ],
    navn: ["Tiger","Robot","Alien"]
  },
  {
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_4c90736292b44b59929074fa97b847b3~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_bda02652f6384ce59dfaf168afecdb64~mv2.png'
    ],
    navn: []
  },
  {
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_a59115fdde5f427a8f4ef746c6d2a110~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_b5e07231a79b4b9bb6f12790c3160216~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_be285b95911e4afab861aaba9bcb33ef~mv2.jpg'
    ],
    navn: ["Victor","Emely","Victoria"]
  }
];

const container = document.getElementById("hoved-container");

/* HENT FRA RIKTIG KEY */
let valgtBilde = localStorage.getItem("valgtProfilbilde") || null;

/* VIS VALG */
function oppdaterValg() {
  document.querySelectorAll(".profilbilde-valg").forEach(img => {
    img.classList.toggle("selected", img.src === valgtBilde);
  });
}

/* LAG GRID */
function lagRader() {
  rader.forEach(rad => {

    const radDiv = document.createElement("div");
    radDiv.className = "rad-container";

    const grid = document.createElement("div");
    grid.className = "bilder-rad";

    rad.bilder.forEach((url, i) => {

      const box = document.createElement("div");
      box.className = "bilde-container";

      const img = document.createElement("img");
      img.src = url;
      img.className = "profilbilde-valg";

      img.onclick = () => {
        valgtBilde = url;
        oppdaterValg();
      };

      box.appendChild(img);

      if (rad.navn.length) {
        const navn = document.createElement("div");
        navn.className = "bilde-navn";
        navn.innerText = rad.navn[i];
        box.appendChild(navn);
      }

      grid.appendChild(box);
    });

    radDiv.appendChild(grid);
    container.appendChild(radDiv);
  });
}

/* LAGRE OG GÅ TILBAKE */
function tilbakeTilKonto() {
  if (valgtBilde) {
    localStorage.setItem("valgtProfilbilde", valgtBilde);
  }

  window.location.href = "konto.html";
}

lagRader();
oppdaterValg();

</script>

</body>
</html>
