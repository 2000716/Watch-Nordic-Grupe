<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filmvisning</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
    /* ================= SYSTEM RESET & GRUNNOPPSETT ================= */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      user-select: none;
    }
    
    body { 
      background: #000; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      overflow: hidden; 
      width: 100vw;
      height: 100vh;
    }

    .container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Omgivelsene rundt videoen som tilpasser seg og krymper sømløst ved outro */
    #videoWrapper {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      transition: all 0.4s ease-in-out; /* Sørger for glatt overgang ved Netflix-krymping */
    }

    /* Videoen respekterer nå filmens originale bredde og høyde (aspect ratio) */
    video {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* Sikrer at filmen aldri strekkes eller kuttes, men fyller optimalt */
      background: #000;
    }

    /* ================= PREMIUM UNDERTEKSTER ================= */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    video::cue {
      font-family: 'Inter', sans-serif;
      font-size: 24px !important;
      font-weight: 400;
      color: #ffffff;
      background: transparent !important;
      text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      letter-spacing: 0.5px;
      line-height: 1.4;
    }

    .subtitle-overlay {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      text-align: center;
      pointer-events: none;
      z-index: 5;
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: #FFFFFF;
      text-shadow: 0px 2px 6px rgba(0,0,0,1), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      line-height: 1.4;
      white-space: pre-wrap;
      transition: bottom 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .subtitle-overlay.subtitle-up {
      bottom: 16%;
    }

    /* ================= STRØMME-UI & KONTROLLER ================= */
    .ui {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease-in-out;
      z-index: 20;
    }

    .ui.hidden { 
      opacity: 0; 
      pointer-events: none; 
    }

    .ui:not(.hidden) .top-bar,
    .ui:not(.hidden) .controls,
    .ui:not(.hidden) .progress-container,
    .ui:not(.hidden) .caption-menu {
      pointer-events: auto;
    }

    /* Toppbar med gradient-skygge */
    .top-bar {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 25px 30px 60px 30px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
      display: flex;
      align-items: center;
    }

    .back-button { 
      background: none; 
      border: none; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }
    .back-button:hover { transform: scale(1.1); }

    .movie-title {
      color: #fff;
      font-size: 20px;
      font-weight: 400;
      margin-left: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* Kontrollbar i bunn */
    .controls {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 40px 25px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 100%);
    }

    .left-controls, .right-controls {
      display: flex;
      gap: 24px;
      align-items: center;
      min-width: 150px;
    }
    .right-controls { justify-content: flex-end; }

    .center-controls {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 35px;
    }

    /* Justert for å passe FontAwesome vector-ikoner perfekt */
    .btn { 
      background: none; 
      border: none; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
      padding: 5px;
    }
    .btn:hover { transform: scale(1.15); }
    .btn:active { transform: scale(0.95); }

    /* ================= PROGRESS BAR (TIDSSTRIPEN) ================= */
    .progress-container {
      position: absolute;
      bottom: 85px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      z-index: 22;
    }

    .progress {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      transition: height 0.1s ease;
    }
    .progress-container:hover .progress { 
      height: 6px; 
    }

    .progress-filled {
      width: 0%;
      height: 100%;
      background: #0fddcb;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(15, 221, 203, 0.6);
      transition: width 0.1s linear;
    }

    .thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      background: #0fddcb;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      box-shadow: 0 0 12px rgba(15, 221, 203, 0.9);
      transition: transform 0.15s ease;
      z-index: 30;
    }
    .progress-container:hover .thumb { 
      transform: translate(-50%, -50%) scale(1); 
    }
    .thumb:hover {
      transform: translate(-50%, -50%) scale(1.25) !important;
    }

    .time-display {
      position: absolute;
      bottom: 100px;
      right: 40px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      font-weight: 500;
      z-index: 22;
      font-variant-numeric: tabular-nums;
    }

    /* ================= POPUP MENYER OG OVERLAYS ================= */
    .caption-menu {
      position: absolute;
      bottom: 95px;
      right: 40px;
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: none;
      min-width: 200px;
      z-index: 100;
    }

    .caption-menu strong {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
    }
    .caption-menu strong:first-of-type { margin-top: 0; }

    .caption-menu button {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin: 3px 0;
      background: transparent;
      color: #eee;
      border: none;
      text-align: left;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .caption-menu button:hover, .caption-menu button.active {
      background: #0fddcb;
      color: #000;
      font-weight: 600;
    }

    /* Forhåndsvisning ved søking */
    .preview-box {
      position: absolute;
      bottom: 110px;
      width: 220px;
      height: 124px;
      background: #000;
      border: 2px solid #0fddcb;
      border-radius: 6px;
      overflow: hidden;
      display: none;
      z-index: 50;
      pointer-events: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .preview-time {
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      padding: 3px 0;
      background: rgba(0,0,0,0.7);
      position: absolute;
      bottom: 0; width: 100%;
      text-align: center;
    }

    /* System spinner */
    .loading-spinner {
      position: absolute;
      top: 50%; left: 50%;
      width: 65px; height: 65px;
      margin: -32.5px 0 0 -32.5px;
      border: 5px solid rgba(255,255,255,0.1);
      border-top: 5px solid #0fddcb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      z-index: 4;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fortsett-samtaleboks */
    .resume-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
    }
    .resume-box {
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 35px 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .resume-box p { font-size: 19px; color: #fff; margin-bottom: 25px; font-weight: 300; }
    .resume-buttons { display: flex; gap: 15px; justify-content: center; }
    .resume-buttons button {
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .resume-buttons button:active { transform: scale(0.97); }
    #continueBtn { background: #0fddcb; color: #000; }
    #continueBtn:hover { background: #0bc4b4; }
    #restartBtn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    #restartBtn:hover { background: rgba(255,255,255,0.2); }

    .watermark {
      position: absolute;
      top: 25px; right: 30px;
      width: 55px;
      opacity: 0.4;
      z-index: 10;
      pointer-events: none;
    }

    /* ================= RESPONSIVITET & MOBIL (100% SØMLØS) ================= */
    @media (max-width: 768px) {
      .top-bar { padding: 15px 20px; }
      .movie-title { font-size: 16px; margin-left: 12px; }

      .controls { padding: 15px 20px; }
      .center-controls { gap: 20px; }
      
      .progress-container { bottom: 65px; padding: 0 20px; }
      .time-display { bottom: 78px; right: 20px; font-size: 11px; }

      .subtitle-overlay {
        font-size: 18px;
        width: 90%;
        bottom: 6%;
      }
      .subtitle-overlay.subtitle-up { bottom: 18%; }
      
      .caption-menu { bottom: 80px; right: 20px; min-width: 160px; padding: 12px; }
      .caption-menu button { font-size: 13px; padding: 6px 10px; }
      
      .preview-box { width: 160px; height: 90px; bottom: 85px; }
    }

    @media (max-width: 480px) {
      .center-controls { gap: 15px; }
      .movie-title { max-width: 180px; }
      .right-controls { gap: 14px; }
      #nextEpisodeBtn { font-size: 12px !important; margin-right: 5px !important; }
    }
</style>
</head>
<body>
  
  <div class="container" id="container">
    
    <div id="videoWrapper">
      <video id="video" preload="metadata" playsinline>
        <source src="" type="video/mp4">
        <track label="Norsk" kind="subtitles" srclang="no" src="" default>
        Din nettleser støtter ikke videoavspilling.
      </video>
    </div>

    <div class="subtitle-overlay" id="subtitleOverlay"></div>
    <div class="loading-spinner" id="loadingSpinner"></div>

    <button id="skipIntroBtn" style="
      position: absolute;
      right: 30px;
      bottom: 110px;
      display: none;
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      z-index: 25;
      transition: all 0.2s;
    " onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(15,15,15,0.85)'">
      ⏭️ Hopp over intro
    </button>

    <button id="skipOutroBtn" style="
      position: absolute; 
      right: 30px; 
      bottom: 110px; 
      display: none; 
      padding: 12px 24px; 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 4px; 
      background: rgba(15, 15, 15, 0.85); 
      backdrop-filter: blur(10px);
      color: white; 
      font-weight: bold; 
      font-size: 14px; 
      letter-spacing: 0.5px;
      cursor: pointer; 
      z-index: 25;
      transition: all 0.2s;
    " onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(15,15,15,0.85)'">
      ⏭️ Neste episode
    </button>

    <div id="autoplayOverlay" style="
      display: none; 
      position: absolute; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: linear-gradient(to right, rgba(0,0,0,0.95) 45%, rgba(0,0,0,0.6) 100%); 
      z-index: 10; 
      flex-direction: column; 
      justify-content: center; 
      align-items: flex-start; 
      padding-left: 8%;
      color: white; 
    ">
      <span style="text-transform: uppercase; color: #aaa; font-size: 13px; font-weight: 600; letter-spacing: 2px;">Neste episode starter om</span>
      <div id="autoplayCountdown" style="font-size: 96px; font-weight: 800; color: #fff; margin: 5px 0; line-height: 1;">8</div>
      
      <div style="margin-top: 20px; display: flex; gap: 15px;">
        <button id="autoplayPlayNextBtn" style="padding: 14px 35px; background: #fff; color: #000; border: none; cursor: pointer; border-radius: 4px; font-size: 15px; font-weight: bold; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">Spill nå</button>
        <button id="autoplayCancelBtn" style="padding: 14px 35px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; border-radius: 4px; font-size: 15px; font-weight: bold; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">Avbryt</button>
      </div>
    </div>

    <div id="resumeOverlay" class="resume-overlay">
      <div class="resume-box">
        <p>Vil du fortsette der du slapp?</p>
        <div class="resume-buttons">
          <button id="continueBtn">Fortsett</button>
          <button id="restartBtn">Start på nytt</button>
        </div>
      </div>
    </div>

    <div class="ui" id="ui">
      
      <div class="top-bar">
        <a href="#" class="back-button" id="backButton"></a>
        <div class="movie-title">Laster tittel...</div>
      </div>

      <div class="progress-container">
        <div class="progress" id="progress">
          <div class="progress-filled" id="progressFilled"></div>
          <div class="thumb" id="thumb"></div>
        </div>
      </div>

      <div class="preview-box" id="previewBox">
        <img id="previewImage" src="" alt="Forhåndsvisning">
        <div class="preview-time" id="previewTime">00:00</div>
      </div>

      <span class="time-display" id="timeDisplay">00:00</span>

      <div class="controls">
        <div class="left-controls"></div>

        <div class="center-controls">
          <button class="btn" id="rewindBtn" title="10 sekunder tilbake"></button>
          <button class="btn" id="playPauseBtn" title="Spill / Pause"></button>
          <button class="btn" id="forwardBtn" title="10 sekunder frem"></button>
        </div>

        <div class="right-controls">
          <button id="nextEpisodeBtn" class="btn" style="display: none; color: white; font-weight: bold; background: none; border: none; cursor: pointer; font-size: 14px; margin-right: 15px;">
            Neste ⏭️
          </button>
          <button class="btn" id="muteBtn" title="Lyd av/på"></button>
          <button class="btn" id="captionsBtn" title="Undertekster og lydspråk"></button>
          <button class="btn" id="fullscreenBtn" title="Fullskjerm"></button>
        </div>
      </div>

      <div class="caption-menu" id="captionMenu">
        <strong>Lydspråk</strong>
        <div id="audioTracks"></div>
        <strong>Undertekster</strong>
        <div id="subtitleTracks"></div>
      </div>

    </div>
  </div>

<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>
<script type="module">
/* ==========================================================================
   UNIVERSELL SPINNER & PLAYER – OPTIMALISERT FOR STRØMMING OG GRATIS FIREBASE
   ========================================================================== */
import { db, auth } from './firebase-oppsett.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const navn = urlParams.get("navn") || urlParams.get("id");
const sesong = urlParams.get("sesong") || urlParams.get("s");
const episode = urlParams.get("episode") || urlParams.get("e");

let film;
let filmId = "";
let tilbakeUrl = "";
let isSerie = false;
let currentUser = null;
let heleProfilArrayet = [];

/* ================= 1. MEDIA RESOLVER ================= */
if (navn && typeof filmer !== "undefined" && filmer?.[navn] && !sesong && !episode) {
  film = filmer[navn];
  filmId = `film-${navn}`;
  tilbakeUrl = film.tilbakeUrl || `film.html?navn=${navn}`;
  isSerie = false;
} else if (navn && typeof serier !== "undefined" && serier?.[navn] && sesong && episode && serier[navn].sesonger?.[sesong]?.episoder?.[episode]) {
  const serie = serier[navn];
  const ep = serie.sesonger[sesong].episoder[episode];
  film = {
    ...ep,
    audioLanguages: serie.audioLanguages || [],
    subtitleLanguages: serie.subtitleLanguages || [],
    tittel: `${serie.tittel} – S${sesong}E${episode}: ${ep.tittel}`
  };
  filmId = `serie-${navn}-s${sesong}-e${episode}`;
  tilbakeUrl = `film.html?navn=${navn}`; 
  isSerie = true;
} else {
  alert("Ugyldig innhold");
  window.location.href = "Hovedside.html";
}

document.title = film.tittel;
const movieTitleEl = document.querySelector(".movie-title");
if (movieTitleEl && film?.tittel) movieTitleEl.textContent = film.tittel;

// Tilbakeknapp med fungerende FontAwesome lukk-ikon
const backButton = document.getElementById("backButton");
if (backButton) {
  backButton.innerHTML = '<i class="fa-solid fa-xmark" style="color: #ffffff; font-size: 26px; padding: 5px;"></i>';
  backButton.addEventListener("click", async (e) => {
    e.preventDefault();
    await lagreSistePosisjonEkspress();
    window.location.href = tilbakeUrl;
  });
}

const video = document.getElementById("video");
const videoWrapper = document.getElementById("videoWrapper");
video.querySelector("source").src = film.videoUrl || film.video || film.src;
const track = video.querySelector("track");
if (track && film.subtitleUrl) track.src = film.subtitleUrl;
video.load();

/* ================= 2. DOM-ELEMENTER ================= */
const ui = document.getElementById("ui");
const playBtn = document.getElementById("playPauseBtn");
const muteBtn = document.getElementById("muteBtn");
const rewindBtn = document.getElementById("rewindBtn");
const forwardBtn = document.getElementById("forwardBtn");
const progress = document.getElementById("progress");
const progressFilled = document.getElementById("progressFilled");
const thumb = document.getElementById("thumb");
const timeDisplay = document.getElementById("timeDisplay");
const captionsBtn = document.getElementById("captionsBtn");
const captionMenu = document.getElementById("captionMenu");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const container = document.getElementById("container");
const loadingSpinner = document.getElementById("loadingSpinner");
const previewBox = document.getElementById("previewBox");
const previewImage = document.getElementById("previewImage");
const previewTime = document.getElementById("previewTime");
const subtitleOverlay = document.getElementById("subtitleOverlay");
const resumeOverlay = document.getElementById("resumeOverlay");
const continueBtn = document.getElementById("continueBtn");
const restartBtn = document.getElementById("restartBtn");

const nextEpisodeBtn = document.getElementById("nextEpisodeBtn");
const autoplayOverlay = document.getElementById("autoplayOverlay");
const autoplayCountdown = document.getElementById("autoplayCountdown");
const autoplayCancelBtn = document.getElementById("autoplayCancelBtn");
const autoplayPlayNextBtn = document.getElementById("autoplayPlayNextBtn");

let isDragging = false;
let hideTimeout;
let subtitlesEnabled = true;
let autoplayTriggered = false;
let lokalLagringsInterval;
let autoplayTimer;

// Plasserer solide/standard ikoner slik at de garantert laster i gratisversjonen av FontAwesome
if (rewindBtn) rewindBtn.innerHTML = '<i class="fa-solid fa-rotate-left" style="color: #ffffff; font-size: 22px;"></i>';
if (forwardBtn) forwardBtn.innerHTML = '<i class="fa-solid fa-rotate-right" style="color: #ffffff; font-size: 22px;"></i>';
if (captionsBtn) captionsBtn.innerHTML = '<i class="fa-solid fa-closed-captioning" style="color: #ffffff; font-size: 22px;"></i>';
if (fullscreenBtn) fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand" style="color: #ffffff; font-size: 22px;"></i>';
if (playBtn) playBtn.innerHTML = '<i class="fa-solid fa-play" style="color: #ffffff; font-size: 26px;"></i>';
if (muteBtn) muteBtn.innerHTML = '<i class="fa-solid fa-volume-high" style="color: #ffffff; font-size: 22px;"></i>';

// Henter URL-en for neste episode basert på filmnavnet i malen din
function hentNesteEpisodeUrl() {
  if (navn && sesong && episode && typeof serier !== "undefined" && serier?.[navn]) {
    const s = parseInt(sesong);
    const e = parseInt(episode);
    const serie = serier[navn];
    
    // Sjekk om neste episode finnes i samme sesong
    if (serie.sesonger[s]?.episoder?.[e + 1]) {
      return `film-mal.html?navn=${navn}&sesong=${s}&episode=${e + 1}`;
    }
    // Sjekk om første episode i neste sesong finnes
    if (serie.sesonger[s + 1]?.episoder?.[1]) {
      return `film-mal.html?navn=${navn}&sesong=${s + 1}&episode=1`;
    }
  }
  return null;
}
const nesteEpisodeUrl = hentNesteEpisodeUrl();

if (nextEpisodeBtn) {
  if (isSerie && nesteEpisodeUrl) {
    nextEpisodeBtn.style.display = "inline-block";
    nextEpisodeBtn.onclick = () => { ryddeOgNeste(); };
  } else {
    nextEpisodeBtn.style.display = "none";
  }
}

function formatTime(time) {
  if (isNaN(time)) return "00:00";
  const m = Math.floor(time / 60);
  const s = Math.floor(time % 60);
  return `${m}:${s < 10 ? '0' + s : s}`;
}

/* ================= 3. DB-LOGIKK ================= */
const aktivProfilNavn = localStorage.getItem("aktivProfil") || "Hovedprofil";

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const cacheData = localStorage.getItem("watch_nordic_profiles_cache");
    if (cacheData) {
      heleProfilArrayet = JSON.parse(cacheData);
    }
    try {
      const userDocRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(userDocRef);
      if (docSnap.exists()) {
        heleProfilArrayet = docSnap.data().profiler || [];
        localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(heleProfilArrayet));
      }
    } catch (err) {
      console.error("Feil ved bakgrunnssynk:", err);
    }
    sjekkLagretFremdrift();
  } else {
    window.location.href = "index.html";
  }
});

function sjekkLagretFremdrift() {
  const profil = heleProfilArrayet.find(p => p.navn === aktivProfilNavn);
  if (!profil) {
    startVideoFraStart();
    return;
  }
  const fremdriftInfo = profil.fremdrift?.[filmId];
  if (fremdriftInfo && fremdriftInfo.currentTime > 10 && fremdriftInfo.status !== "ferdig") {
    video.currentTime = parseFloat(fremdriftInfo.currentTime);
    resumeOverlay.style.display = "flex";
    
    continueBtn.onclick = () => { resumeOverlay.style.display = "none"; video.play().catch(w => {}); startLokalLagringsLoop(); };
    restartBtn.onclick = () => { video.currentTime = 0; resumeOverlay.style.display = "none"; video.play().catch(w => {}); startLokalLagringsLoop(); };
  } else {
    startVideoFraStart();
  }
}

function startVideoFraStart() {
  video.currentTime = 0;
  video.play().catch(w => {});
  startLokalLagringsLoop();
}

function startLokalLagringsLoop() {
  clearInterval(lokalLagringsInterval);
  lokalLagringsInterval = setInterval(() => {
    oppdaterFremdriftILokalMatrise("paabegynt");
  }, 5000);
}

function oppdaterFremdriftILokalMatrise(status) {
  if (isNaN(video.currentTime) || video.currentTime <= 0 || isNaN(video.duration)) return;
  
  const percent = parseFloat(((video.currentTime / video.duration) * 100).toFixed(1));
  let profilIdx = heleProfilArrayet.findIndex(p => p.navn === aktivProfilNavn);
  if (profilIdx === -1) return;

  if (!heleProfilArrayet[profilIdx].fremdrift) heleProfilArrayet[profilIdx].fremdrift = {};
  if (!heleProfilArrayet[profilIdx].historikk) heleProfilArrayet[profilIdx].historikk = [];

  if (status === "ferdig") {
    delete heleProfilArrayet[profilIdx].fremdrift[filmId];
    if (!heleProfilArrayet[profilIdx].historikk.includes(filmId)) {
      heleProfilArrayet[profilIdx].historikk.push(filmId);
    }
  } else {
    if (percent > 96) {
      delete heleProfilArrayet[profilIdx].fremdrift[filmId];
      if (!heleProfilArrayet[profilIdx].historikk.includes(filmId)) {
        heleProfilArrayet[profilIdx].historikk.push(filmId);
      }
    } else {
      heleProfilArrayet[profilIdx].fremdrift[filmId] = {
        currentTime: video.currentTime,
        percent: percent,
        status: "paabegynt",
        sistOppdatert: new Date().toISOString(),
        tittel: film.tittel,
        id: filmId,
        navn: navn,
        sesong: sesong || null,
        episode: episode || null
      };
    }
  }
  localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(heleProfilArrayet));
}

async function lagreSistePosisjonEkspress() {
  clearInterval(lokalLagringsInterval);
  oppdaterFremdriftILokalMatrise(video.currentTime / video.duration > 0.96 ? "ferdig" : "paabegynt");
  if (currentUser) {
    try {
      const userDocRef = doc(db, "users", currentUser.uid);
      await setDoc(userDocRef, { profiler: heleProfilArrayet }, { merge: true });
    } catch (err) {
      console.error("Feil ved ekspresslagring til skyen:", err);
    }
  }
}

async function ryddeOgNeste() {
  video.pause();
  clearInterval(lokalLagringsInterval);
  clearInterval(autoplayTimer);
  oppdaterFremdriftILokalMatrise("ferdig");
  if (currentUser) {
    try {
      const userDocRef = doc(db, "users", currentUser.uid);
      await setDoc(userDocRef, { profiler: heleProfilArrayet }, { merge: true });
    } catch (e) { console.error(e); }
  }
  window.location.href = nesteEpisodeUrl ? nesteEpisodeUrl : tilbakeUrl;
}

window.addEventListener('beforeunload', () => {
  oppdaterFremdriftILokalMatrise(video.currentTime / video.duration > 0.96 ? "ferdig" : "paabegynt");
  if (currentUser && navigator.sendBeacon) {
    const userDocRef = doc(db, "users", currentUser.uid);
    setDoc(userDocRef, { profiler: heleProfilArrayet }, { merge: true }).catch(w => {});
  }
});

/* ================= 4. MEDIEKONTROLLER OG UI-LOGIKK ================= */
function updateProgress() {
  if (!isDragging) {
    const percent = (video.currentTime / video.duration) * 100;
    progressFilled.style.width = percent + '%';
    thumb.style.left = percent + '%';
  }
  timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
}

video.addEventListener('timeupdate', updateProgress);
video.addEventListener('loadedmetadata', updateProgress);

playBtn.addEventListener('click', () => video.paused ? video.play() : video.pause());
video.addEventListener('click', () => video.paused ? video.play() : video.pause());

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
  if (e.key === 'ArrowRight') video.currentTime += 10;
  if (e.key === 'ArrowLeft') video.currentTime -= 10;
});

video.addEventListener('play', () => { 
  playBtn.innerHTML = '<i class="fa-solid fa-pause" style="color: #ffffff; font-size: 26px;"></i>'; 
  showUI(); 
});
video.addEventListener('pause', () => { 
  playBtn.innerHTML = '<i class="fa-solid fa-play" style="color: #ffffff; font-size: 26px;"></i>'; 
  showUI(); 
});

muteBtn.addEventListener('click', () => {
  video.muted = !video.muted;
  muteBtn.innerHTML = video.muted
    ? '<i class="fa-solid fa-volume-xmark" style="color: #ffffff; font-size: 22px;"></i>'
    : '<i class="fa-solid fa-volume-high" style="color: #ffffff; font-size: 22px;"></i>';
});

rewindBtn.addEventListener('click', () => video.currentTime = Math.max(0, video.currentTime - 10));
forwardBtn.addEventListener('click', () => video.currentTime = Math.min(video.duration, video.currentTime + 10));
captionsBtn.addEventListener('click', () => { captionMenu.style.display = captionMenu.style.display === 'block' ? 'none' : 'block'; });

/* ================= 5. UNDERTEKSTER & LYDVALG ================= */
const audioTracksDiv = document.getElementById("audioTracks");
audioTracksDiv.innerHTML = "";
if (film.audioLanguages && film.audioLanguages.length > 0) {
  film.audioLanguages.forEach(lang => {
    const btn = document.createElement("button");
    btn.textContent = lang.label;
    btn.addEventListener("click", () => { captionMenu.style.display = "none"; });
    audioTracksDiv.appendChild(btn);
  });
} else { audioTracksDiv.innerHTML = "<em style='color:gray;'>Standard lydspor</em>"; }

const subtitleTracksDiv = document.getElementById("subtitleTracks");
subtitleTracksDiv.innerHTML = "";
if (film.subtitleLanguages && film.subtitleLanguages.length > 0) {
  film.subtitleLanguages.forEach(sub => {
    const btn = document.createElement("button");
    btn.textContent = sub.label; btn.dataset.lang = sub.code;
    btn.addEventListener("click", () => {
      const selectedLang = sub.code; globalSubtitleSetting = selectedLang; localStorage.setItem("global-subtitle-setting", selectedLang);
      if (selectedLang === "off") {
        subtitlesEnabled = false; for (let i = 0; i < video.textTracks.length; i++) video.textTracks[i].mode = "hidden"; subtitleOverlay.textContent = "";
      } else {
        subtitlesEnabled = true;
        for (let i = 0; i < video.textTracks.length; i++) {
          const track = video.textTracks[i];
          if (track.language === selectedLang || track.label.toLowerCase() === selectedLang) {
            track.mode = "hidden";
            track.addEventListener("cuechange", () => {
              if (!subtitlesEnabled) { subtitleOverlay.textContent = ""; return; }
              const cues = track.activeCues; subtitleOverlay.textContent = cues && cues.length > 0 ? cues[0].text : "";
            });
          }
        }
      }
      updateSubtitleButtons(selectedLang); captionMenu.style.display = "none";
    });
    subtitleTracksDiv.appendChild(btn);
  });
} else { subtitleTracksDiv.innerHTML = "<em style='color:gray;'>Ingen teksting tilgjengelig</em>"; }

function scrubTo(e) {
  const rect = progress.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const percent = Math.min(Math.max(0, x / rect.width), 1);
  progressFilled.style.width = percent * 100 + '%';
  thumb.style.left = percent * 100 + '%';
  return percent;
}
progress.addEventListener('mousedown', e => { isDragging = true; scrubTo(e); });
document.addEventListener('mouseup', e => { if (isDragging) { const percent = scrubTo(e); video.currentTime = percent * video.duration; isDragging = false; hidePreview(); } });
document.addEventListener('mousemove', e => { if (isDragging) { scrubTo(e); showPreview(e); } });

const hiddenVideo = document.createElement("video");
hiddenVideo.src = film.videoUrl || film.video || film.src; hiddenVideo.muted = true; hiddenVideo.crossOrigin = "anonymous";
const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d");

function showPreview(e) {
  const rect = progress.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const percent = Math.min(Math.max(0, x / rect.width), 1);
  const time = percent * video.duration;
  previewBox.style.left = `${x - 120}px`; previewBox.style.display = "block"; previewTime.textContent = formatTime(time);
  hiddenVideo.currentTime = time;
  hiddenVideo.addEventListener("seeked", function handler() {
    canvas.width = 240; canvas.height = 135; ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
    previewImage.src = canvas.toDataURL("image/jpeg"); hiddenVideo.removeEventListener("seeked", handler);
  });
}
function hidePreview() { previewBox.style.display = "none"; }
progress.addEventListener("mousemove", showPreview);
progress.addEventListener("mouseleave", hidePreview);

function showUI() {
  ui.classList.remove('hidden'); subtitleOverlay.classList.add("subtitle-up"); clearTimeout(hideTimeout);
  hideTimeout = setTimeout(() => { if (!video.paused) { ui.classList.add('hidden'); subtitleOverlay.classList.remove("subtitle-up"); } }, 3000);
}
document.addEventListener('mousemove', showUI);
document.addEventListener('keydown', showUI);

fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) { container.requestFullscreen(); } else { document.exitFullscreen(); } });
document.addEventListener('fullscreenchange', () => {
  fullscreenBtn.innerHTML = document.fullscreenElement 
    ? '<i class="fa-solid fa-compress" style="color: #ffffff; font-size: 22px;"></i>' 
    : '<i class="fa-solid fa-expand" style="color: #ffffff; font-size: 22px;"></i>';
});

video.addEventListener('waiting', () => loadingSpinner.style.display = 'block');
video.addEventListener('playing', () => loadingSpinner.style.display = 'none');
video.addEventListener('ended', async () => { await ryddeOgNeste(); });

let globalSubtitleSetting = localStorage.getItem("global-subtitle-setting") || "off";
function updateSubtitleButtons(activeLang) {
  document.querySelectorAll("#subtitleTracks button").forEach(btn => {
    if (btn.dataset.lang === activeLang) { btn.classList.add("active"); } else { btn.classList.remove("active"); }
  });
}

/* ================= 6. PREMIUM NETFLIX-FLYTT & INTRO/OUTRO ================= */
const skipIntroBtn = document.getElementById("skipIntroBtn");
const skipOutroBtn = document.getElementById("skipOutroBtn");

video.addEventListener("timeupdate", () => {
  const tid = video.currentTime;

  if (isSerie && film.introStart != null && film.introEnd != null) {
    if (tid >= film.introStart && tid <= film.introEnd) {
      if (skipIntroBtn) skipIntroBtn.style.display = "block";
    } else {
      if (skipIntroBtn) skipIntroBtn.style.display = "none";
    }
  }

  const triggerTid = film.outroStart != null ? film.outroStart : (video.duration - 15);
  if (tid >= triggerTid && !autoplayTriggered && !video.paused && nesteEpisodeUrl) {
    autoplayTriggered = true;
    startPremiumAutoplay();
  }
});

if (skipIntroBtn) { skipIntroBtn.addEventListener("click", () => { video.currentTime = film.introEnd; }); }
if (skipOutroBtn) { skipOutroBtn.addEventListener("click", () => { ryddeOgNeste(); }); }
if (autoplayPlayNextBtn) { autoplayPlayNextBtn.addEventListener("click", () => { ryddeOgNeste(); }); }

function startPremiumAutoplay() {
  if (!autoplayOverlay) return;
  
  videoWrapper.style.transform = "scale(0.45)";
  videoWrapper.style.transformOrigin = "bottom right";
  videoWrapper.style.position = "absolute";
  videoWrapper.style.right = "40px";
  videoWrapper.style.bottom = "90px";
  videoWrapper.style.width = "400px";
  videoWrapper.style.height = "225px";
  videoWrapper.style.borderRadius = "8px";
  videoWrapper.style.boxShadow = "0 10px 30px rgba(0,0,0,0.8)";
  
  autoplayOverlay.style.display = "flex";
  
  let teller = 8; 
  autoplayCountdown.textContent = teller;

  autoplayTimer = setInterval(() => {
    teller--;
    autoplayCountdown.textContent = teller;
    if (teller <= 0) {
      clearInterval(autoplayTimer);
      ryddeOgNeste();
    }
  }, 1000);
}

if (autoplayCancelBtn) {
  autoplayCancelBtn.addEventListener("click", () => {
    clearInterval(autoplayTimer);
    autoplayOverlay.style.display = "none";
    
    videoWrapper.style.transform = "none";
    videoWrapper.style.position = "absolute";
    videoWrapper.style.width = "100%";
    videoWrapper.style.height = "100%";
    videoWrapper.style.right = "0px";
    videoWrapper.style.bottom = "0px";
    videoWrapper.style.borderRadius = "0px";
    
    if (skipOutroBtn) skipOutroBtn.style.display = "block";
  });
}

document.addEventListener("contextmenu", e => e.preventDefault());
</script>
