<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Nordic</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#091B1E;
  color:white;
}

/* NAVBAR */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:rgba(9,27,30,0.9);
  z-index:100;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#00FFCC;
}

.nav-links{
  display:flex;
  gap:25px;
}

.nav-links a{
  color:#ccc;
  text-decoration:none;
}

.nav-links a:hover{
  color:white;
}

/* HERO */

.hero{
  height:70vh;
  display:flex;
  align-items:flex-end;
  padding:40px;
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:48px;
  margin:0;
}

.hero button{
  margin-top:10px;
  padding:10px 30px;
  border:none;
  background:#00FFCC;
  font-weight:bold;
}

/* SEKSJONER */

.section{
  margin-top:40px;
  padding:0 40px;
}

.section h2{
  color:#00FFCC;
  margin-bottom:15px;
}

/* GALLERI */

.gallery{
  display:flex;
  gap:15px;
  overflow-x:auto;
}

.gallery img{
  width:300px;
  border-radius:6px;
}

.gallery a{
  text-decoration:none;
  color:white;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">WATCH</div>

<div class="nav-links">
<a href="#">Startside</a>
<a href="#">Serier</a>
<a href="#">Filmer</a>
<a href="#">Min liste</a>
</div>

</div>


<!-- HERO -->

<div class="hero" id="hero">
<div>
<h1 id="hero-title"></h1>
<button id="hero-button">Se nå</button>
</div>
</div>


<!-- Nye filmer -->

<div class="section">

<h2>Nye filmer</h2>

<div class="gallery" id="film-gallery"></div>

</div>


<!-- Serier -->

<div class="section">

<h2>Populære serier</h2>

<div class="gallery" id="serie-gallery"></div>

</div>


<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

/* HERO FILM */

function loadHero(){

const keys = Object.keys(filmer)
const random = keys[Math.floor(Math.random()*keys.length)]
const film = filmer[random]

document.getElementById("hero").style.backgroundImage =
`url(${film.banner || film.poster})`

document.getElementById("hero-title").innerText = film.tittel

document.getElementById("hero-button").onclick = () => {
location.href = "film.html?navn="+random
}

}


/* FILM GALLERI */

function loadFilms(){

const gallery = document.getElementById("film-gallery")

Object.keys(filmer).slice(0,10).forEach(key=>{

const film = filmer[key]

const a = document.createElement("a")
a.href = "film.html?navn="+key

a.innerHTML = `
<img src="${film.poster}">
`

gallery.appendChild(a)

})

}


/* SERIER */

function loadSeries(){

const gallery = document.getElementById("serie-gallery")

Object.keys(serier).slice(0,10).forEach(key=>{

const serie = serier[key]

const a = document.createElement("a")
a.href = "film.html?navn="+key

a.innerHTML = `
<img src="${serie.poster}">
`

gallery.appendChild(a)

})

}


/* START */

loadHero()
loadFilms()
loadSeries()

</script>

</body>
</html>
