<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Nordic™</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #091B1E;
      color: white;
    }

    .top-nav {
      position: fixed;
      width: 100%;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      z-index: 100;
    }

    .watch-logo-text {
      font-weight: bold;
      color: #00FFCC;
      cursor: pointer;
    }

    .hero-banner {
      height: 70vh;
      position: relative;
      overflow: hidden;
    }

    .hero-banner img,
    .hero-banner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
    }

    .banner-content {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 2;
    }

    .image-gallery {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 20px;
    }

    .image-gallery img {
      width: 250px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<header class="top-nav">
  <div class="watch-logo-text" onclick="location.href='Hovedside.html'">
    WATCH
  </div>

  <div>
    <i class="fas fa-search"></i>
    <img id="menyProfilbilde" src="https://via.placeholder.com/100" style="width:40px;border-radius:50%;">
  </div>
</header>

<!-- HERO -->
<section class="hero-banner">
  <img id="banner-bilde">
  <video id="banner-video" muted></video>

  <div class="banner-content">
    <img id="banner-logo" style="width:200px">
    <p id="banner-beskrivelse"></p>
    <div id="banner-metadata"></div>

    <button id="banner-se-na">Se nå</button>
    <button id="banner-add">+</button>
  </div>
</section>

<!-- GALLERIER -->
<h2 style="padding-left:20px;">Nye filmer</h2>
<div class="image-gallery" id="nye-filmer-galleri"></div>

<h2 style="padding-left:20px;">Serier</h2>
<div class="image-gallery" id="serier-galleri"></div>

<h2 style="padding-left:20px;">Fortsett å se</h2>
<div class="image-gallery" id="fortsett-galleri"></div>

<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>
// ================= AUTH =================
if (!localStorage.getItem("epost")) {
  location.href = "Starts side.html";
}

// ================= PROFIL =================
const bilde = localStorage.getItem("profilbilde");
if (bilde) document.getElementById("menyProfilbilde").src = bilde;

// ================= HERO =================
function hentTimeFilm() {
  const keys = Object.keys(filmer);
  return filmer[keys[new Date().getHours() % keys.length]];
}

function oppdaterBanner() {
  const film = hentTimeFilm();
  if (!film) return;

  const bilde = document.getElementById("banner-bilde");
  const video = document.getElementById("banner-video");

  bilde.src = film.banner;
  video.src = film.trailer || "";

  document.getElementById("banner-logo").src = film.logo || "";
  document.getElementById("banner-beskrivelse").textContent = film.beskrivelse || "";
  document.getElementById("banner-metadata").textContent = (film.metadata || []).join(" • ");

  document.getElementById("banner-se-na").onclick = () =>
    location.href = "film-mal.html?id=" + film.tittel;

  // min liste
  const key = film.tittel.toLowerCase();
  const btn = document.getElementById("banner-add");

  let liste = JSON.parse(localStorage.getItem("minListe")) || [];
  btn.textContent = liste.includes(key) ? "✓" : "+";

  btn.onclick = () => {
    if (liste.includes(key)) {
      liste = liste.filter(x => x !== key);
      btn.textContent = "+";
    } else {
      liste.push(key);
      btn.textContent = "✓";
    }
    localStorage.setItem("minListe", JSON.stringify(liste));
  };

  // autoplay trailer
  setTimeout(() => {
    if (film.trailer) {
      bilde.style.display = "none";
      video.style.display = "block";
      video.play();
    }
  }, 4000);
}

// ================= GALLERI =================
function createMovie(filmKey, film) {
  const a = document.createElement("a");
  a.href = "film.html?navn=" + filmKey;

  const img = document.createElement("img");
  img.src = film.poster;

  a.appendChild(img);
  return a;
}

function renderGallery(id, filter = null) {
  const gallery = document.getElementById(id);
  gallery.innerHTML = "";

  Object.keys(filmer).forEach(key => {
    const film = filmer[key];

    if (filter && !filter(film)) return;

    gallery.appendChild(createMovie(key, film));
  });
}

// ================= SERIER =================
function renderSeries() {
  const gallery = document.getElementById("serier-galleri");

  Object.keys(serier).forEach(key => {
    const serie = serier[key];

    const img = document.createElement("img");
    img.src = serie.poster;

    gallery.appendChild(img);
  });
}

// ================= FORTSETT =================
function renderContinue() {
  const gallery = document.getElementById("fortsett-galleri");

  Object.keys(filmer).forEach(key => {
    const progress = localStorage.getItem("progress_" + key);
    if (!progress || progress == 0 || progress == 100) return;

    const film = filmer[key];
    const img = document.createElement("img");
    img.src = film.poster;

    gallery.appendChild(img);
  });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  oppdaterBanner();
  renderGallery("nye-filmer-galleri");
  renderSeries();
  renderContinue();
});
</script>

</body>
</html>
