<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Nordic</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#091B1E;
  color:white;
}

/* ===== TOPPMENY ===== */
.top-nav {
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 30px;
  z-index:100;
  background:linear-gradient(to bottom, rgba(9,27,30,0.9), transparent);
}

.nav-links a {
  margin:0 10px;
  color:#ccc;
  text-decoration:none;
}

.nav-links a.active {
  color:#00FFCC;
}

/* ===== HERO ===== */
.hero-banner {
  height:70vh;
  position:relative;
}

.hero-banner img,
.hero-banner video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner-content {
  position:absolute;
  bottom:40px;
  left:40px;
}

.film-logo {
  width:300px;
}

.watch-button {
  background:#00FFCC;
  border:none;
  padding:12px 30px;
  border-radius:30px;
}

/* ===== GALLERI ===== */
.gallery-section {
  margin:30px;
}

.image-gallery {
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.image-gallery img {
  width:220px;
  height:120px;
  object-fit:cover;
  border-radius:6px;
}

/* ===== FORTSETT ===== */
.image-with-progress {
  position:relative;
}

.progress-bar {
  position:absolute;
  bottom:0;
  height:4px;
  width:100%;
  background:rgba(255,255,255,0.2);
}

.progress-bar::after {
  content:'';
  position:absolute;
  height:100%;
  background:#00FFCC;
  width:var(--progress);
}
</style>
</head>

<body>

<!-- TOPPMENY -->
<header class="top-nav">
  <div>WATCH</div>
  <nav class="nav-links">
    <a class="active">Startside</a>
    <a>Serier</a>
    <a>Filmer</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero-banner">
  <img id="banner-bilde">
  <video id="banner-video" muted></video>

  <div class="banner-content">
    <img id="banner-logo" class="film-logo">
    <div id="banner-metadata"></div>

    <button id="banner-se-na" class="watch-button">
      ▶ Se nå
    </button>
  </div>
</section>

<!-- NYE FILMER -->
<section class="gallery-section">
  <h2>Nye filmer</h2>
  <div id="nye-filmer-galleri" class="image-gallery"></div>
</section>

<!-- FORTSETT -->
<section class="gallery-section" id="fortsett-section" style="display:none;">
  <h2>Fortsett å se</h2>
  <div id="fortsett-galleri" class="image-gallery"></div>
</section>

<!-- JS DATA (BEHOLDT) -->
<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

/* ===== HERO ===== */
function hentTimeFilm() {
  const keys = Object.keys(filmer);
  const index = new Date().getHours() % keys.length;
  return filmer[keys[index]];
}

function oppdaterBanner() {
  const film = hentTimeFilm();

  document.getElementById("banner-bilde").src = film.banner;
  document.getElementById("banner-logo").src = film.logo;
  document.getElementById("banner-metadata").innerText = film.metadata.join(" • ");

  document.getElementById("banner-se-na").onclick = () => {
    window.location.href = "film-mal.html?id=" + film.tittel;
  };
}

/* ===== NYE FILMER ===== */
function renderNyeFilmer() {
  const galleri = document.getElementById("nye-filmer-galleri");

  Object.keys(filmer).slice(0,10).forEach(key => {
    const film = filmer[key];

    const img = document.createElement("img");
    img.src = film.poster;

    galleri.appendChild(img);
  });
}

/* ===== FORTSETT ===== */
function renderFortsett() {
  const galleri = document.getElementById("fortsett-galleri");
  const section = document.getElementById("fortsett-section");

  let finnes = false;

  Object.keys(filmer).forEach(key => {
    const progress = localStorage.getItem("progress_" + key);

    if(progress && progress < 100) {
      finnes = true;

      const div = document.createElement("div");
      div.className = "image-with-progress";

      const img = document.createElement("img");
      img.src = filmer[key].poster;

      const bar = document.createElement("div");
      bar.className = "progress-bar";
      bar.style.setProperty("--progress", progress + "%");

      div.appendChild(img);
      div.appendChild(bar);

      galleri.appendChild(div);
    }
  });

  if(finnes) section.style.display = "block";
}

/* ===== START ===== */
document.addEventListener("DOMContentLoaded", () => {
  oppdaterBanner();
  renderNyeFilmer();
  renderFortsett();
});
</script>

</body>
</html>
