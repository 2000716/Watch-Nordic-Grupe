<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Nordic</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== BASE ===== */
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#000;
  color:white;
}

/* ===== TOP NAV ===== */
.top-nav {
  position:fixed;
  top:0;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
  background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
}

.logo {
  font-size:22px;
  font-weight:600;
}

.nav-links a {
  margin-left:20px;
  color:#aaa;
  text-decoration:none;
  font-size:14px;
}

.nav-links a:hover {
  color:white;
}

/* ===== HERO ===== */
.hero {
  height:80vh;
  position:relative;
}

.hero img, .hero video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, #000 10%, transparent 60%);
}

.hero-content {
  position:absolute;
  bottom:80px;
  left:60px;
  z-index:2;
  max-width:500px;
}

.hero-content img {
  width:300px;
  margin-bottom:20px;
}

.hero-meta {
  color:#ccc;
  font-size:14px;
  margin-bottom:20px;
}

.hero-buttons button {
  margin-right:10px;
  padding:12px 24px;
  border-radius:30px;
  border:none;
  font-size:14px;
}

.play-btn {
  background:white;
  color:black;
}

.add-btn {
  background:rgba(255,255,255,0.2);
  color:white;
}

/* ===== ROWS ===== */
.section {
  padding:40px 60px;
}

.section h2 {
  font-size:18px;
  margin-bottom:15px;
  color:#ddd;
}

.row {
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.row::-webkit-scrollbar {
  display:none;
}

.card {
  min-width:220px;
  height:125px;
  border-radius:8px;
  overflow:hidden;
  transition:transform 0.3s;
}

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.card:hover {
  transform:scale(1.05);
}

/* ===== CONTINUE ===== */
.progress {
  position:absolute;
  bottom:0;
  height:3px;
  width:100%;
  background:rgba(255,255,255,0.2);
}

.progress::after {
  content:"";
  position:absolute;
  height:100%;
  background:white;
  width:var(--progress);
}
</style>
</head>

<body>

<!-- NAV -->
<header class="top-nav">
  <div class="logo">Watch</div>
  <nav class="nav-links">
    <a>Startside</a>
    <a>Filmer</a>
    <a>Serier</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <img id="hero-img">
  <video id="hero-video" muted></video>

  <div class="hero-content">
    <img id="hero-logo">
    <div id="hero-meta" class="hero-meta"></div>

    <div class="hero-buttons">
      <button class="play-btn" id="playBtn">▶ Se nå</button>
      <button class="add-btn" id="addBtn">＋</button>
    </div>
  </div>
</section>

<!-- NYE -->
<section class="section">
  <h2>Nye filmer</h2>
  <div id="newRow" class="row"></div>
</section>

<!-- FORTSETT -->
<section class="section" id="continueSection" style="display:none;">
  <h2>Fortsett å se</h2>
  <div id="continueRow" class="row"></div>
</section>

<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

/* ===== HERO ===== */
function setHero() {
  const keys = Object.keys(filmer);
  const film = filmer[keys[new Date().getHours() % keys.length]];

  heroImg.src = film.banner;
  heroLogo.src = film.logo;
  heroMeta.innerText = film.metadata.join(" • ");

  playBtn.onclick = () => {
    window.location.href = "film-mal.html?id=" + film.tittel;
  };
}

/* ===== ROW ===== */
function createCard(film) {
  const div = document.createElement("div");
  div.className = "card";

  const img = document.createElement("img");
  img.src = film.poster;

  div.appendChild(img);
  return div;
}

/* ===== NYE ===== */
function renderNew() {
  Object.keys(filmer).slice(0,10).forEach(key => {
    newRow.appendChild(createCard(filmer[key]));
  });
}

/* ===== CONTINUE ===== */
function renderContinue() {
  let found = false;

  Object.keys(filmer).forEach(key => {
    const progress = localStorage.getItem("progress_" + key);

    if(progress && progress < 100) {
      found = true;

      const div = createCard(filmer[key]);

      const bar = document.createElement("div");
      bar.className = "progress";
      bar.style.setProperty("--progress", progress + "%");

      div.appendChild(bar);
      continueRow.appendChild(div);
    }
  });

  if(found) continueSection.style.display = "block";
}

/* ===== INIT ===== */
setHero();
renderNew();
renderContinue();

</script>

</body>
</html>
