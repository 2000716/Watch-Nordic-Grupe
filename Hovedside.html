```html
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Nordic</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#091B1E;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 50px;
background:rgba(9,27,30,0.7);
backdrop-filter:blur(10px);
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00FFCC;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:#ccc;
text-decoration:none;
font-size:15px;
transition:0.2s;
}

.nav-links a:hover{
color:white;
}

/* HERO SLIDER */

.hero{
height:85vh;
position:relative;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:70px;
margin-top:70px;
transition:background-image 1s ease;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(9,27,30,1),
rgba(9,27,30,0.7),
rgba(9,27,30,0.3),
transparent
);
}

.hero-content{
position:relative;
max-width:600px;
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
margin-top:10px;
color:#ccc;
line-height:1.4;
}

.hero-buttons{
margin-top:20px;
display:flex;
gap:10px;
}

.play{
background:#00FFCC;
border:none;
padding:12px 35px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.info{
background:rgba(255,255,255,0.2);
border:none;
padding:12px 30px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* SECTIONS */

.section{
margin-top:50px;
padding:0 50px;
}

.section h2{
color:#00FFCC;
margin-bottom:15px;
}

/* SLIDER */

.slider{
position:relative;
}

.gallery{
display:flex;
gap:15px;
overflow-x:auto;
scroll-behavior:smooth;
}

.gallery::-webkit-scrollbar{
display:none;
}

/* POSTER */

.card{
position:relative;
}

.card img{
width:240px;
border-radius:10px;
transition:0.25s;
}

.card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:15px;
background:linear-gradient(
to top,
rgba(0,0,0,0.9),
transparent
);
opacity:0;
transition:0.25s;
border-radius:0 0 10px 10px;
}

.card:hover .overlay{
opacity:1;
}

.overlay h3{
margin:0;
font-size:16px;
}

/* ARROWS */

.arrow{
position:absolute;
top:40%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
border:none;
color:white;
font-size:22px;
width:45px;
height:45px;
border-radius:50%;
cursor:pointer;
z-index:10;
}

.arrow:hover{
background:#00FFCC;
color:black;
}

.arrow.left{
left:-10px;
}

.arrow.right{
right:-10px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">WATCH</div>

<div class="nav-links">
<a href="#">Startside</a>
<a href="#">Serier</a>
<a href="#">Filmer</a>
<a href="#">Min liste</a>
</div>

</div>

<!-- HERO -->

<div class="hero" id="hero">

<div class="hero-content">

<h1 id="hero-title"></h1>
<p id="hero-desc"></p>

<div class="hero-buttons">
<button class="play" id="hero-play">
<i class="fa fa-play"></i> Se nå
</button>

<button class="info">
<i class="fa fa-circle-info"></i> Info
</button>
</div>

</div>

</div>

<!-- FILMER -->

<div class="section">

<h2>Nye filmer</h2>

<div class="slider">

<button class="arrow left" onclick="scrollGallery('film-gallery',-400)">
<i class="fa fa-chevron-left"></i>
</button>

<div class="gallery" id="film-gallery"></div>

<button class="arrow right" onclick="scrollGallery('film-gallery',400)">
<i class="fa fa-chevron-right"></i>
</button>

</div>

</div>

<!-- SERIER -->

<div class="section">

<h2>Populære serier</h2>

<div class="slider">

<button class="arrow left" onclick="scrollGallery('serie-gallery',-400)">
<i class="fa fa-chevron-left"></i>
</button>

<div class="gallery" id="serie-gallery"></div>

<button class="arrow right" onclick="scrollGallery('serie-gallery',400)">
<i class="fa fa-chevron-right"></i>
</button>

</div>

</div>


<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

/* HERO SLIDER */

let heroIndex = 0
let heroKeys = []

function loadHero(){

heroKeys = Object.keys(filmer)

updateHero()

setInterval(()=>{
heroIndex++
if(heroIndex >= heroKeys.length) heroIndex = 0
updateHero()
},7000)

}

function updateHero(){

const key = heroKeys[heroIndex]
const film = filmer[key]

document.getElementById("hero").style.backgroundImage =
`url(${film.banner || film.poster})`

document.getElementById("hero-title").innerText = film.tittel

document.getElementById("hero-desc").innerText =
film.beskrivelse || ""

document.getElementById("hero-play").onclick = ()=>{
location.href = "film.html?navn="+key
}

}


/* FILM GALLERI */

function loadFilms(){

const gallery = document.getElementById("film-gallery")

Object.keys(filmer).slice(0,12).forEach(key=>{

const film = filmer[key]

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<a href="film.html?navn=${key}">
<img src="${film.poster}">
<div class="overlay">
<h3>${film.tittel}</h3>
</div>
</a>
`

gallery.appendChild(card)

})

}


/* SERIER */

function loadSeries(){

const gallery = document.getElementById("serie-gallery")

Object.keys(serier).slice(0,12).forEach(key=>{

const serie = serier[key]

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<a href="film.html?navn=${key}">
<img src="${serie.poster}">
<div class="overlay">
<h3>${serie.tittel}</h3>
</div>
</a>
`

gallery.appendChild(card)

})

}


/* SCROLL */

function scrollGallery(id,amount){

document.getElementById(id).scrollBy({
left:amount,
behavior:"smooth"
})

}


/* START */

loadHero()
loadFilms()
loadSeries()

</script>

</body>
</html>
