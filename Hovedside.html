<!DOCTYPE html>
<html lang="no">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Nordic</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Segoe UI",system-ui;
background:#000;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.top-nav{

position:fixed;
top:0;
width:100%;
height:70px;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 50px;

background:rgba(10,15,18,.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.05);

z-index:1000;
}

.logo{

font-size:28px;
font-weight:900;
letter-spacing:3px;

color:#00ffcc;

text-shadow:
0 0 8px rgba(0,255,204,.5);
}

.nav-links{

display:flex;
gap:30px;
}

.nav-links a{

text-decoration:none;
color:#bfbfbf;

font-size:15px;

transition:.3s;
}

.nav-links a:hover{
color:white;
}

/* HERO */

.hero{

height:100vh;
position:relative;

display:flex;
align-items:flex-end;

padding:80px;

background-size:cover;
background-position:center;

}

.hero::before{

content:"";

position:absolute;
inset:0;

background:

linear-gradient(to top,
rgba(0,0,0,.9),
rgba(0,0,0,.5),
transparent);

}

/* HERO CONTENT */

.hero-content{

position:relative;

max-width:700px;

background:rgba(10,15,18,.55);

backdrop-filter:blur(20px);

padding:40px;

border-radius:24px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 60px rgba(0,0,0,.7);

}

.hero h1{

font-size:55px;
margin-bottom:10px;
}

.hero p{

color:#ddd;
line-height:1.6;
}

/* BUTTONS */

.hero-buttons{

margin-top:20px;
display:flex;
gap:15px;
}

.btn{

border:none;
padding:14px 32px;

border-radius:999px;

font-weight:600;
cursor:pointer;

display:flex;
align-items:center;
gap:8px;

transition:.25s;
}

.play{

background:white;
color:black;
}

.play:hover{

transform:scale(1.05);
background:#e5e5e5;
}

.add{

background:rgba(255,255,255,.15);
color:white;
}

.add:hover{

background:rgba(255,255,255,.25);
}

/* SECTIONS */

.section{

padding:70px 100px;
}

.section h2{

font-size:24px;
margin-bottom:20px;
}

/* SLIDER */

.slider{

display:flex;
gap:18px;

overflow-x:auto;
scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
display:none;
}

/* CARDS */

.card{

min-width:260px;
position:relative;

cursor:pointer;
}

.card img{

width:100%;
height:150px;

object-fit:cover;

border-radius:12px;

transition:.35s;
}

.card:hover img{

transform:scale(1.08);

box-shadow:
0 20px 40px rgba(0,0,0,.8);
}

/* FOOTER */

footer{

padding:40px;

text-align:center;

color:#888;
}

</style>
</head>

<body>

<header class="top-nav">

<div class="logo">WATCH</div>

<nav class="nav-links">

<a href="#">Startside</a>
<a href="#">Serier</a>
<a href="#">Filmer</a>
<a href="#">Min liste</a>

</nav>

</header>


<!-- HERO -->

<div class="hero" id="hero">

<div class="hero-content">

<h1 id="hero-title"></h1>

<p id="hero-desc"></p>

<div class="hero-buttons">

<button class="btn play" id="hero-play">
<i class="fas fa-play"></i> Se nå
</button>

<button class="btn add">
<i class="fas fa-plus"></i> Min liste
</button>

</div>

</div>

</div>


<!-- FILMER -->

<div class="section">

<h2>Nye filmer</h2>

<div class="slider" id="film-gallery"></div>

</div>


<!-- SERIER -->

<div class="section">

<h2>Populære serier</h2>

<div class="slider" id="serie-gallery"></div>

</div>


<footer>

© 2026 Watch Nordic™

</footer>


<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

/* HERO */

function loadHero(){

const keys = Object.keys(filmer)

const random = keys[Math.floor(Math.random()*keys.length)]

const film = filmer[random]

document.getElementById("hero").style.backgroundImage =
`url(${film.bakgrunn || film.poster})`

document.getElementById("hero-title").innerText = film.tittel

document.getElementById("hero-desc").innerText =
film.beskrivelse || ""

document.getElementById("hero-play").onclick = ()=>{

location.href = "film.html?navn="+random

}

}

/* FILMER */

function loadFilms(){

const gallery = document.getElementById("film-gallery")

Object.keys(filmer).slice(0,10).forEach(key=>{

const film = filmer[key]

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<img src="${film.posterHorisontal || film.poster}">

`

card.onclick = ()=>{

location.href = "film.html?navn="+key

}

gallery.appendChild(card)

})

}

/* SERIER */

function loadSeries(){

const gallery = document.getElementById("serie-gallery")

Object.keys(serier).slice(0,10).forEach(key=>{

const serie = serier[key]

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<img src="${serie.posterHorisontal || serie.poster}">

`

card.onclick = ()=>{

location.href = "film.html?navn="+key

}

gallery.appendChild(card)

})

}

/* START */

loadHero()

loadFilms()

loadSeries()

</script>

</body>
</html>
