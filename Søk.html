<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Søk | Watch Nordic™</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#091B1E;
  color:white;
  overflow-x:hidden;
}

/* ===== TOP NAV ===== */

.top-nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 40px;
  z-index:1000;

  background:rgba(9,27,30,0.95);
  backdrop-filter:blur(8px);
}

.nav-left{
  display:flex;
  align-items:center;
}

.watch-logo-text{
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
  color:#00FFCC;
  cursor:pointer;
}

.nav-links{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:30px;
}

.nav-links a{
  color:#bfbfbf;
  text-decoration:none;
  font-size:15px;
  font-weight:500;
}

.nav-links a.active{
  color:#00FFCC;
}

.nav-links a:hover{
  color:white;
}

.nav-links i{
  margin-right:6px;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:15px;
}

.nav-search{
  color:#00FFCC;
  font-size:20px;
}

.profilmeny img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid white;
}

/* ===== MAIN ===== */

.search-page{
  padding-top:120px;
  width:92%;
  max-width:1400px;
  margin:auto;
}

.search-title{
  font-size:40px;
  margin-bottom:30px;
  color:#00FFCC;
}

.search-box{
  position:relative;
  margin-bottom:50px;
}

.search-box input{
  width:100%;
  height:70px;
  border:none;
  outline:none;

  background:#10282C;
  color:white;

  border-radius:20px;

  padding:0 70px 0 25px;

  font-size:20px;
}

.search-box i{
  position:absolute;
  right:25px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  color:#00FFCC;
}

/* ===== RESULTATER ===== */

.results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:24px;
}

.result-card{
  position:relative;
  overflow:hidden;
  border-radius:12px;
  cursor:pointer;
  transition:transform .3s ease;
}

.result-card:hover{
  transform:scale(1.03);
}

.result-card img{
  width:100%;
  height:160px;
  object-fit:cover;
  display:block;
}

.result-overlay{
  position:absolute;
  inset:0;

  background:linear-gradient(
    to top,
    rgba(0,0,0,0.9),
    rgba(0,0,0,0)
  );

  display:flex;
  flex-direction:column;
  justify-content:flex-end;

  padding:15px;
}

.result-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:5px;
}

.result-meta{
  font-size:13px;
  color:#d7d7d7;
}

.result-type{
  position:absolute;
  top:12px;
  right:12px;

  background:#00FFCC;
  color:#001F1B;

  font-size:12px;
  font-weight:bold;

  padding:6px 10px;
  border-radius:30px;
}

/* ===== MOBIL ===== */

@media(max-width:768px){

  .nav-links{
    display:none;
  }

  .search-title{
    font-size:28px;
  }

  .search-box input{
    height:60px;
    font-size:17px;
  }

  .results-grid{
    grid-template-columns:1fr;
  }

}

  </style>
</head>
<body>

<!-- ===== MENY ===== -->

<header class="top-nav">

  <div class="nav-left">
    <div class="watch-logo-text" onclick="window.location.href='Hovedside.html'">
      WATCH
    </div>
  </div>

  <nav class="nav-links">
    <a href="Hovedside.html"><i class="fas fa-house"></i> STARTSIDE</a>
    <a href="Serier.html"><i class="fas fa-tv"></i> SERIER</a>
    <a href="Film.html"><i class="fas fa-clapperboard"></i> FILMER</a>
    <a href="Nyheter.html"><i class="fas fa-star"></i> WATCH ORIGINALS</a>
    <a href="Min-Liste.html"><i class="fas fa-bookmark"></i> MIN LISTE</a>
  </nav>

  <div class="nav-right">

    <a href="Søk.html" class="nav-search">
      <i class="fas fa-search"></i>
    </a>

    <a href="hvem-ser-på.html" class="profilmeny">
      <img id="menyProfilbilde" src="https://via.placeholder.com/100"/>
    </a>

  </div>

</header>

<!-- ===== SØK ===== -->

<main class="search-page">

  <h1 class="search-title">Søk etter filmer og serier</h1>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="Søk etter filmer, serier, sjangere..."
    />
    <i class="fas fa-search"></i>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

</main>

<script src="Filmdata.js"></script>
<script src="Seriedata.js"></script>

<script>

// ===== PROFILBILDE =====

const lagretBilde = localStorage.getItem("profilbilde");

if(lagretBilde){
  document.getElementById("menyProfilbilde").src = lagretBilde;
}

// ===== SØK =====

const input = document.getElementById("searchInput");
const resultsGrid = document.getElementById("resultsGrid");

// Kombiner filmer + serier
let allContent = [];

// FILMER
Object.keys(filmer).forEach(key => {

  allContent.push({
    type:"Film",
    key:key,
    ...filmer[key]
  });

});

// SERIER
if(typeof serier !== "undefined"){

  Object.keys(serier).forEach(key => {

    allContent.push({
      type:"Serie",
      key:key,
      ...serier[key]
    });

  });

}

// ===== RENDER =====

function renderResults(searchTerm = ""){

  resultsGrid.innerHTML = "";

  const filtered = allContent.filter(item => {

    const title = item.tittel?.toLowerCase() || "";
    const metadata = (item.metadata || []).join(" ").toLowerCase();

    return (
      title.includes(searchTerm.toLowerCase()) ||
      metadata.includes(searchTerm.toLowerCase())
    );

  });

  if(filtered.length === 0){

    resultsGrid.innerHTML = `
      <p style="color:#bdbdbd;font-size:18px;">
        Ingen resultater funnet.
      </p>
    `;

    return;
  }

  filtered.forEach(item => {

    const card = document.createElement("a");

    card.classList.add("result-card");

    card.href = `film.html?navn=${item.key}`;

    card.innerHTML = `

      <img src="${item.poster}" alt="${item.tittel}">

      <div class="result-overlay">

        <div class="result-title">
          ${item.tittel}
        </div>

        <div class="result-meta">
          ${(item.metadata || []).join(" • ")}
        </div>

      </div>

      <div class="result-type">
        ${item.type}
      </div>

    `;

    resultsGrid.appendChild(card);

  });

}

// ===== LIVE SEARCH =====

input.addEventListener("input", (e) => {

  renderResults(e.target.value);

});

// Vis alt ved start
renderResults();

</script>

</body>
</html>
