<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velg Profilbilde | Watch Nordic™</title>
  
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #0b0e14;
      --surface: #141b24;
      --accent: #ffffff;
      --accent-hover: #e0e0e0;
      --muted: #8c9ba5;
      --border: rgba(255, 255, 255, 0.08);
      --border-active: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      padding: 60px 20px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 50px;
    }

    #hoved-container {
      width: 100%;
      max-width: 950px;
    }

    .rad-container {
      margin: 0 auto 40px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 30px 24px 24px;
      border-radius: 16px;
      position: relative;
    }

    .rad-tittel {
      font-size: 0.95rem;
      margin-bottom: 25px;
      font-weight: 700;
      text-align: left;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .bilder-rad {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 30px;
      justify-items: center;
      overflow: visible; /* Lar elementene bryte ut av rammen ved behov */
    }

    .bilde-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: visible;
    }

    .bilde-navn {
      margin-top: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      color: var(--muted);
      transition: color 0.2s ease;
    }

    .profilbilde-valg {
      width: 120px;
      height: 120px;
      border-radius: 12px; /* SkyShowtime-stil avrundede hjørner istedenfor helt runde */
      object-fit: cover;
      border: 3px solid transparent;
      transition: transform 0.25s cubic-bezier(0.2, 0, 0.2, 1), border-color 0.25s ease;
      cursor: pointer;
      background: #1e2631;
      position: relative;
      margin-top: -10px; /* Gjør at figurene trekkes litt oppover */
    }

    .bilde-container:hover .profilbilde-valg {
      transform: translateY(-6px) scale(1.03);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .bilde-container:hover .bilde-navn {
      color: #fff;
    }

    .profilbilde-valg.selected {
      border-color: var(--border-active);
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .tilbake-knapp {
      margin-top: 20px;
      background-color: var(--accent);
      color: #0b0e14;
      padding: 14px 36px;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .tilbake-knapp:hover {
      background-color: var(--accent-hover);
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .profilbilde-valg { width: 100px; height: 100px; }
      .bilder-rad { grid-template-columns: repeat(3, 1fr); gap: 15px; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .profilbilde-valg { width: 80px; height: 80px; border-radius: 8px; }
      .bilde-navn { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<h1>Velg profilbilde</h1>
<p class="subtitle">Velg en av figurene nedenfor for å tilpasse profilen din</p>

<div id="hoved-container"></div>

<button class="tilbake-knapp" onclick="tilbakeTilKonto()"><i class="fa-solid fa-check"></i> Lagre og fortsett</button>

<script type="module">
import { auth, db } from "./firebase-oppsett.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const aktivProfilIndex = parseInt(urlParams.get('index')) || 0;

const rader = [
  {
    tittel: "Karakterer & Ikoner",
    bilder: [
      'https://static.wixstatic.com/media/d9ace9_f30eec65f0434128974f59e1bba6d30d~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_ca94b393665e49c98c8432e69a33e49f~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_675337e8909c4b44aa606f634ad6a2ed~mv2.jpg'
    ],
    navn: ["Tiger", "Robot", "Alien"]
  },
  {
    tittel: "Klassiske farger",
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_4c90736292b44b59929074fa97b847b3~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_bda02652f6384ce59dfaf168afecdb64~mv2.png'
    ],
    navn: []
  },
  {
    tittel: "Detektiv Muffins på eventyr",
    bilder: [
      'https://static.wixstatic.com/media/d9ace9_dde4cb57bbe74a6d878ba8647651a584~mv2.jpg'
    ],
    navn: ["Detektiv Muffins"]
  }
];

const hovedContainer = document.getElementById('hoved-container');
let valgtBilde = null;
let profiler = [];
let docRef = null;

const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
if (cachedProfiles) {
  try {
    profiler = JSON.parse(cachedProfiles);
    if (profiler[aktivProfilIndex]) {
      valgtBilde = profiler[aktivProfilIndex].bilde || null;
    }
  } catch (e) {
    console.error("Kunne ikke lese profil-cache:", e);
  }
}

lagRader();
oppdaterValg();

onAuthStateChanged(auth, (user) => {
  if (user) {
    docRef = doc(db, "users", user.uid);
    hentGjeldendeProfilbilde();
  } else {
    window.location.href = "Innlogging.html";
  }
});

async function hentGjeldendeProfilbilde() {
  try {
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      profiler = docSnap.data().profiler || [];
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      
      if (profiler[aktivProfilIndex]) {
        valgtBilde = profiler[aktivProfilIndex].bilde || null;
        oppdaterValg();
      }
    }
  } catch (error) {
    console.error("Feil ved henting av profilbilde:", error);
  }
}

function oppdaterValg() {
  document.querySelectorAll('.profilbilde-valg').forEach(img => {
    const currentSrc = img.src;
    const attrSrc = img.getAttribute('src');
    img.classList.toggle('selected', currentSrc === valgtBilde || attrSrc === valgtBilde);
  });
}

function lagRader() {
  hovedContainer.innerHTML = ""; 
  rader.forEach(rad => {
    const radWrapper = document.createElement('div');
    radWrapper.className = 'rad-container';

    const tittelEl = document.createElement('div');
    tittelEl.className = 'rad-tittel';
    tittelEl.textContent = rad.tittel;

    const bilderRad = document.createElement('div');
    bilderRad.className = 'bilder-rad';

    rad.bilder.forEach((url, i) => {
      const container = document.createElement('div');
      container.className = 'bilde-container';

      const img = document.createElement('img');
      img.src = url;
      img.alt = `Profilbilde`;
      img.className = 'profilbilde-valg';
      img.addEventListener('click', () => {
        valgtBilde = url;
        oppdaterValg();
      });

      container.appendChild(img);

      if (rad.navn && rad.navn[i]) {
        const navn = document.createElement('div');
        navn.className = 'bilde-navn';
        navn.textContent = rad.navn[i];
        container.appendChild(navn);
      }

      bilderRad.appendChild(container);
    });

    radWrapper.appendChild(tittelEl);
    radWrapper.appendChild(bilderRad);
    hovedContainer.appendChild(radWrapper);
  });
}

async function tilbakeTilKonto() {
  if (profiler[aktivProfilIndex] && valgtBilde) {
    profiler[aktivProfilIndex].bilde = valgtBilde;
    
    localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));

    const gjeldendeAktivIndex = localStorage.getItem("aktivProfilIndex");
    if (gjeldendeAktivIndex !== null && parseInt(gjeldendeAktivIndex) === aktivProfilIndex) {
      localStorage.setItem("profilbilde", valgtBilde);
    }
    
    if (docRef) {
      try {
        await setDoc(docRef, { profiler: profiler }, { merge: true });
      } catch (error) {
        console.error("Feil ved lagring av profilbilde i Firestore:", error);
      }
    }
  }
  
  window.location.href = `konto.html?index=${aktivProfilIndex}`;
}

window.tilbakeTilKonto = tilbakeTilKonto;
</script>

</body>
</html>
