<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velg Profilbilde | Watch Nordic™</title>
  
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #091B1E;
      --accent: #00FFCC;
      --muted: #bfc9c9;
      --card-bg: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      padding: 40px 20px;
      text-align: center;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top center, rgba(0,255,204,0.06), transparent 45%);
      z-index: -1;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 1px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 40px;
    }

    .rad-container {
      margin: 0 auto 35px;
      max-width: 900px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 20px;
    }

    .rad-tittel {
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-weight: 700;
      text-align: left;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 8px;
    }

    .bilder-rad {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 25px;
      justify-items: center;
    }

    .bilde-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.25s ease;
    }

    .bilde-navn {
      margin-top: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      color: #fff;
    }

    .profilbilde-valg {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      overflow: hidden;
      border: 4px solid transparent;
      transition: border 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
      cursor: pointer;
      background: rgba(0,0,0,0.2);
    }

    .profilbilde-valg:hover {
      border-color: rgba(0, 255, 204, 0.5);
      transform: scale(1.06);
    }

    .profilbilde-valg.selected {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
      transform: scale(1.04);
    }

    .tilbake-knapp {
      margin-top: 20px;
      background-color: var(--accent);
      color: #071214;
      padding: 16px 40px;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,204,0.25);
      transition: all 0.25s ease;
    }

    .tilbake-knapp:hover {
      background-color: #00e6b8;
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,255,204,0.45);
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.8rem; }
      .profilbilde-valg { width: 110px; height: 110px; }
      .bilder-rad { grid-template-columns: repeat(3, 1fr); gap: 15px; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .profilbilde-valg { width: 85px; height: 85px; }
      .bilde-navn { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<h1>Velg Profilbilde</h1>
<p class="subtitle">Personaliser kontoen din med en unik karakter</p>

<div id="hoved-container"></div>

<button class="tilbake-knapp" onclick="tilbakeTilKonto()"><i class="fa-solid fa-floppy-disk"></i> Lagre og tilbake</button>

<script type="module">
import { auth, db } from "./firebase-oppsett.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const aktivProfilIndex = parseInt(urlParams.get('index')) || 0;

const rader = [
  {
    tittel: "Karakterer & Ikoner",
    bilder: [
      'https://static.wixstatic.com/media/d9ace9_f30eec65f0434128974f59e1bba6d30d~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_ca94b393665e49c98c8432e69a33e49f~mv2.jpg',
      'https://static.wixstatic.com/media/d9ace9_675337e8909c4b44aa606f634ad6a2ed~mv2.jpg'
    ],
    navn: ["Tiger", "Robot", "Alien"]
  },
  {
    tittel: "Klassiske farger",
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_4c90736292b44b59929074fa97b847b3~mv2.png',
      'https://static.wixstatic.com/media/fd2fb2_bda02652f6384ce59dfaf168afecdb64~mv2.png'
    ],
    navn: []
  },
  {
    tittel: "Nordiske Profiler",
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_a59115fdde5f427a8f4ef746c6d2a110~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_b5e07231a79b4b9bb6f12790c3160216~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_be285b95911e4afab861aaba9bcb33ef~mv2.jpg'
    ],
    navn: ["Victor", "Emely", "Victoria"]
  },
  {
    tittel: "Hakkebakkeskogen",
    bilder: [
      'https://static.wixstatic.com/media/fd2fb2_23d60dafae70488987c6dae5e236ed57~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_4e3da719249a405b98066d613854c98d~mv2.jpg',
      'https://static.wixstatic.com/media/fd2fb2_f0b2ad82bc114a4f9f4ce884236d533d~mv2.jpg'
    ],
    navn: ["Klatremus", "Mikkel Rev", "Morten"]
  }
];

const hovedContainer = document.getElementById('hoved-container');
let valgtBilde = null;
let profiler = [];
let docRef = null;

// ================= LYNRAST OPPSTART (Mellomlagring) =================
const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
if (cachedProfiles) {
  try {
    profiler = JSON.parse(cachedProfiles);
    if (profiler[aktivProfilIndex]) {
      valgtBilde = profiler[aktivProfilIndex].bilde || null;
    }
  } catch (e) {
    console.error("Kunne ikke lese profil-cache:", e);
  }
}

// Bygg opp rader og marker bildet fra cachen umiddelbart
lagRader();
oppdaterValg();

onAuthStateChanged(auth, (user) => {
  if (user) {
    docRef = doc(db, "users", user.uid);
    hentGjeldendeProfilbilde();
  } else {
    window.location.href = "Innlogging.html";
  }
});

async function hentGjeldendeProfilbilde() {
  try {
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      profiler = docSnap.data().profiler || [];
      // Lagre oppdaterte data i cache til neste gang
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      
      if (profiler[aktivProfilIndex]) {
        valgtBilde = profiler[aktivProfilIndex].bilde || null;
        oppdaterValg();
      }
    }
  } catch (error) {
    console.error("Feil ved henting av profilbilde:", error);
  }
}

function oppdaterValg() {
  document.querySelectorAll('.profilbilde-valg').forEach(img => {
    const currentSrc = img.src;
    const attrSrc = img.getAttribute('src');
    img.classList.toggle('selected', currentSrc === valgtBilde || attrSrc === valgtBilde);
  });
}

function lagRader() {
  hovedContainer.innerHTML = ""; // Tømmer hvis den kalles flere ganger
  rader.forEach(rad => {
    const radWrapper = document.createElement('div');
    radWrapper.className = 'rad-container';

    const tittelEl = document.createElement('div');
    tittelEl.className = 'rad-tittel';
    tittelEl.textContent = rad.tittel;

    const bilderRad = document.createElement('div');
    bilderRad.className = 'bilder-rad';

    rad.bilder.forEach((url, i) => {
      const container = document.createElement('div');
      container.className = 'bilde-container';

      const img = document.createElement('img');
      img.src = url;
      img.alt = `Profilbilde`;
      img.className = 'profilbilde-valg';
      img.addEventListener('click', () => {
        valgtBilde = url;
        oppdaterValg();
      });

      container.appendChild(img);

      if (rad.navn && rad.navn.length > 0) {
        const navn = document.createElement('div');
        navn.className = 'bilde-navn';
        navn.textContent = rad.navn[i];
        container.appendChild(navn);
      }

      bilderRad.appendChild(container);
    });

    radWrapper.appendChild(tittelEl);
    radWrapper.appendChild(bilderRad);
    hovedContainer.appendChild(radWrapper);
  });
}

async function tilbakeTilKonto() {
  if (profiler[aktivProfilIndex] && valgtBilde) {
    // Oppdaterer lokalt i arrayet
    profiler[aktivProfilIndex].bilde = valgtBilde;
    
    // Oppdaterer lokal cache umiddelbart så endringen merkes på de andre sidene
    localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));

    // Hvis brukeren endrer bildet på profilen som akkurat NÅ er aktiv, oppdaterer vi aktivProfil-variablene også
    const gjeldendeAktivIndex = localStorage.getItem("aktivProfilIndex");
    if (gjeldendeAktivIndex !== null && parseInt(gjeldendeAktivIndex) === aktivProfilIndex) {
      localStorage.setItem("profilbilde", valgtBilde);
    }
    
    // Skriver til Firestore i bakgrunnen
    if (docRef) {
      try {
        await setDoc(docRef, { profiler: profiler }, { merge: true });
      } catch (error) {
        console.error("Feil ved lagring av profilbilde i Firestore:", error);
      }
    }
  }
  
  window.location.href = `konto.html?index=${aktivProfilIndex}`;
}

window.tilbakeTilKonto = tilbakeTilKonto;
</script>

</body>
</html>
