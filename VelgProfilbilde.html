<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velg Profilbilde | Watch Nordic™</title>
  
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #050c0e;
      --accent: #00FFCC;
      --muted: #8e9fa2;
      --circle-gray: #1e2a2e; /* Mørkegrå standard bakgrunn */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top center, #0f2b32 0%, var(--bg-dark) 75%);
      color: #ffffff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .topp-seksjon {
      text-align: center;
      margin-top: 10px;
    }

    /* Rene hvit farge uten gradient */
    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* Karusell-område */
    .karusell-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 10px auto;
      position: relative;
      display: flex;
      align-items: center;
    }

    .karusell-viewport {
      width: 100%;
      overflow: hidden; /* Forhindrer at elementer stikker ut på sidene */
      padding: 100px 10px 30px 10px; /* God plass på toppen så bildet stikker opp */
    }

    .karusell-spor {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      gap: 50px;
    }

    /* Avatar-kort med større dimensjoner */
    .avatar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      min-width: 210px;
      width: 210px;
      flex-shrink: 0;
    }

    /* 3D POP-OUT RAMME STRUKTUR */
    .avatar-bilde-wrap {
      width: 210px;
      height: 210px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      /* overflow: visible lar figuren gå opp over kanten, men viewporten stopper sidetracking */
      overflow: visible; 
    }

    /* Mørkegrå sirkelbakgrunn */
    .avatar-bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-color: var(--circle-gray);
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: background-color 0.35s ease, border-color 0.35s ease;
      z-index: 1;
    }

    /* Selve bildet/figuren - gjort betydelig større */
    .avatar-bilde {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      z-index: 2;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom center;
    }

    /* PNG-figurer som stikker mye mer ut i toppen */
    .avatar-bilde.png-karakter {
      object-fit: contain;
      border-radius: 0;
      height: 160%; /* Gjort bildet enda større */
      bottom: 0;
      transform: translateY(-35px) scale(1.15);
    }

    /* --- HOVER & VALGT TILSTAND --- */
    .avatar-item:hover .avatar-bg,
    .avatar-item.selected .avatar-bg {
      background-color: var(--active-color, var(--accent));
      border-color: #ffffff;
    }

    /* Betydelig løft/pop-out på hover og valgt */
    .avatar-item:hover .avatar-bilde.png-karakter {
      transform: translateY(-50px) scale(1.28);
    }

    .avatar-item.selected .avatar-bilde.png-karakter {
      transform: translateY(-45px) scale(1.22);
    }

    .avatar-item:hover .avatar-bilde:not(.png-karakter) {
      transform: scale(1.08);
    }

    /* Film / Serie Logo plassert nederst på bunnen */
    .film-logo-wrap {
      margin-top: 20px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .film-logo {
      max-height: 100%;
      max-width: 130px;
      object-fit: contain;
      filter: brightness(0) invert(1); /* Ren hvit farge som standard */
      opacity: 0.7;
      transition: filter 0.3s ease, opacity 0.3s ease, transform 0.3s ease;
    }

    .avatar-item:hover .film-logo,
    .avatar-item.selected .film-logo {
      filter: none; /* Viser originale farger ved hover/valgt */
      opacity: 1;
      transform: scale(1.08);
    }

    /* Navigasjonspiler */
    .nav-pil {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 43, 50, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      z-index: 10;
      backdrop-filter: blur(12px);
      transition: all 0.25s ease;
    }

    .nav-pil:hover {
      background: var(--accent);
      color: #050c0e;
      border-color: var(--accent);
      transform: translateY(-50%) scale(1.1);
    }

    .pil-venstre { left: -25px; }
    .pil-hoyre { right: -25px; }

    /* Lagre-knapp */
    .bunn-seksjon {
      margin-top: 10px;
      text-align: center;
    }

    .lagre-knapp {
      background: var(--accent);
      color: #050c0e;
      padding: 16px 50px;
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.25s ease;
    }

    .lagre-knapp:hover {
      background-color: #33ffd6;
      transform: translateY(-2px);
    }

    @media (max-width: 850px) {
      .karusell-wrapper { max-width: 100%; }
      .pil-venstre { left: 0px; }
      .pil-hoyre { right: 0px; }
      .karusell-spor { gap: 30px; }
      .avatar-item { min-width: 160px; width: 160px; }
      .avatar-bilde-wrap { width: 160px; height: 160px; }
    }
  </style>
</head>
<body>

<div class="topp-seksjon">
  <h1>Velg Profilbilde</h1>
  <p class="subtitle">Finn din favorittkarakter</p>
</div>

<div class="karusell-wrapper">
  <button class="nav-pil pil-venstre" onclick="flyttKarusell(-1)"><i class="fa-solid fa-chevron-left"></i></button>
  
  <div class="karusell-viewport">
    <div class="karusell-spor" id="karusell-spor">
      <!-- Bildene genereres via JS -->
    </div>
  </div>

  <button class="nav-pil pil-hoyre" onclick="flyttKarusell(1)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<div class="bunn-seksjon">
  <button class="lagre-knapp" onclick="tilbakeTilKonto()"><i class="fa-solid fa-check"></i> Lagre og fortsett</button>
</div>

<script type="module">
import { auth, db } from "./firebase-oppsett.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const aktivProfilIndex = parseInt(urlParams.get('index')) || 0;

const alleProfiler = [
  { 
    url: 'https://static.wixstatic.com/media/d9ace9_f30eec65f0434128974f59e1bba6d30d~mv2.jpg', 
    navn: "Tiger", 
    erPng: false, 
    farge: '#f4a261',
    logoUrl: ''
  },
  { 
    url: 'https://static.wixstatic.com/media/d9ace9_ca94b393665e49c98c8432e69a33e49f~mv2.jpg', 
    navn: "Robot", 
    erPng: false, 
    farge: '#00b4d8',
    logoUrl: ''
  },
  { 
    url: 'https://static.wixstatic.com/media/d9ace9_675337e8909c4b44aa606f634ad6a2ed~mv2.jpg', 
    navn: "Alien", 
    erPng: false, 
    farge: '#7209b7',
    logoUrl: ''
  },
  { 
    url: 'https://static.wixstatic.com/media/d9ace9_8d9b602d060d4b63a5d986882ebd59f3~mv2.png', 
    navn: "Detektiv Muffins", 
    erPng: false, 
    farge: '#e9c46a',
    logoUrl: ''
  }
];

const sporEl = document.getElementById('karusell-spor');
let scrollPosisjon = 0;
let valgtBilde = null;
let profiler = [];
let docRef = null;

// Cache-håndtering
const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
if (cachedProfiles) {
  try {
    profiler = JSON.parse(cachedProfiles);
    if (profiler[aktivProfilIndex]) {
      valgtBilde = profiler[aktivProfilIndex].bilde || null;
    }
  } catch (e) {
    console.error("Feil ved lesing av cache:", e);
  }
}

byggKarusell();
oppdaterValgMarkering();

function byggKarusell() {
  sporEl.innerHTML = "";

  alleProfiler.forEach(item => {
    const avatarItem = document.createElement('div');
    avatarItem.className = 'avatar-item';
    
    if (item.farge) {
      avatarItem.style.setProperty('--active-color', item.farge);
    }

    const wrap = document.createElement('div');
    wrap.className = 'avatar-bilde-wrap';

    const bg = document.createElement('div');
    bg.className = 'avatar-bg';

    const img = document.createElement('img');
    img.src = item.url;
    img.alt = item.navn;
    img.className = `avatar-bilde ${item.erPng ? 'png-karakter' : ''}`;

    wrap.appendChild(bg);
    wrap.appendChild(img);
    avatarItem.appendChild(wrap);

    // Navn er fjernet, legger kun inn logo nederst på bunnen
    if (item.logoUrl) {
      const logoWrap = document.createElement('div');
      logoWrap.className = 'film-logo-wrap';

      const logoImg = document.createElement('img');
      logoImg.src = item.logoUrl;
      logoImg.alt = "Logo";
      logoImg.className = "film-logo";

      logoWrap.appendChild(logoImg);
      avatarItem.appendChild(logoWrap);
    }

    avatarItem.addEventListener('click', () => {
      valgtBilde = item.url;
      oppdaterValgMarkering();
    });

    sporEl.appendChild(avatarItem);
  });
}

function flyttKarusell(retning) {
  const skritt = 260; // 210px kortbredde + 50px gap
  const viewportBredde = sporEl.parentElement.clientWidth;
  const totalBredde = sporEl.scrollWidth;
  const maksScroll = -(totalBredde - viewportBredde);

  scrollPosisjon += retning * (skritt * -2); // Bla 2 bilder av gangen

  if (scrollPosisjon < maksScroll) scrollPosisjon = maksScroll;
  if (scrollPosisjon > 0) scrollPosisjon = 0;

  sporEl.style.transform = `translateX(${scrollPosisjon}px)`;
}

function oppdaterValgMarkering() {
  document.querySelectorAll('.avatar-item').forEach(el => {
    const imgEl = el.querySelector('.avatar-bilde');
    const isSelected = imgEl && imgEl.src === valgtBilde;
    el.classList.toggle('selected', isSelected);
  });
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    docRef = doc(db, "users", user.uid);
    hentProfilbildeFraDb();
  } else {
    window.location.href = "Innlogging.html";
  }
});

async function hentProfilbildeFraDb() {
  try {
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      profiler = docSnap.data().profiler || [];
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      if (profiler[aktivProfilIndex]) {
        valgtBilde = profiler[aktivProfilIndex].bilde || null;
        oppdaterValgMarkering();
      }
    }
  } catch (err) {
    console.error("Feil ved henting:", err);
  }
}

async function tilbakeTilKonto() {
  if (profiler[aktivProfilIndex] && valgtBilde) {
    profiler[aktivProfilIndex].bilde = valgtBilde;
    localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));

    if (localStorage.getItem("aktivProfilIndex") === String(aktivProfilIndex)) {
      localStorage.setItem("profilbilde", valgtBilde);
    }

    if (docRef) {
      try {
        await setDoc(docRef, { profiler: profiler }, { merge: true });
      } catch (err) {
        console.error("Feil ved lagring til Firestore:", err);
      }
    }
  }
  window.location.href = `konto.html?index=${aktivProfilIndex}`;
}

window.flyttKarusell = flyttKarusell;
window.tilbakeTilKonto = tilbakeTilKonto;
</script>

</body>
</html>
