<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velg Profilbilde | Watch Nordic™</title>
  
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-dark: #050c0e;
      --surface: rgba(13, 30, 34, 0.75);
      --accent: #00FFCC;
      --accent-glow: rgba(0, 255, 204, 0.4);
      --muted: #8e9fa2;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top center, #0f2b32 0%, var(--bg-dark) 70%);
      color: white;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .topp-seksjon {
      text-align: center;
      margin-top: 10px;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, #00FFCC 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1.05rem;
    }

    /* Karusell */
    .karusell-wrapper {
      width: 100%;
      max-width: 950px;
      margin: 20px auto;
      position: relative;
      display: flex;
      align-items: center;
    }

    .karusell-viewport {
      width: 100%;
      overflow: hidden;
      padding: 60px 10px 30px 10px; /* Godt med luft på toppen for 3D-figurene */
    }

    .karusell-spor {
      display: flex;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      gap: 30px;
    }

    .kategori-kort {
      min-width: 100%;
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 30px 30px 30px;
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    .kategori-tittel {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
      text-align: left;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 35px 25px;
      justify-items: center;
    }

    .avatar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      width: 120px;
    }

    /* 3D POP-OUT & GLOW STRUKTUR */
    .avatar-bilde-wrap {
      width: 120px;
      height: 120px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Sikte/Sirkel-bakgrunn som gløder */
    .avatar-bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid var(--border);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
    }

    /* Selve bildet/figuren */
    .avatar-bilde {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      z-index: 2;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom center;
    }

    /* SPESIAL-EFFEKT: PNG Figurer som spretter ut (Pop-out 3D) */
    .avatar-bilde.png-karakter {
      object-fit: contain;
      border-radius: 0;
      height: 145%; /* Gjør figuren høyere slik at den stikker opp */
      bottom: 0;
      transform: translateY(-5px) scale(1.05);
    }

    /* --- HOVER & VALGT TILSTAND --- */

    /* Farget bakgrunnsglød ved hover/valgt */
    .avatar-item:hover .avatar-bg {
      background: radial-gradient(circle, var(--glow-color, rgba(0, 255, 204, 0.35)) 0%, rgba(0,0,0,0) 70%);
      border-color: var(--glow-color, var(--accent));
      box-shadow: 0 0 25px var(--glow-color, var(--accent-glow));
    }

    .avatar-item.selected .avatar-bg {
      background: radial-gradient(circle, var(--glow-color, rgba(0, 255, 204, 0.5)) 0%, rgba(0,0,0,0.2) 75%);
      border-color: var(--glow-color, var(--accent));
      box-shadow: 0 0 30px var(--glow-color, var(--accent-glow));
    }

    /* 3D Pop-out skala-effekt */
    .avatar-item:hover .avatar-bilde.png-karakter {
      transform: translateY(-22px) scale(1.25); /* Figur hoppet ut over rammen */
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
    }

    .avatar-item.selected .avatar-bilde.png-karakter {
      transform: translateY(-20px) scale(1.2);
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.6));
    }

    /* Vanlige sirkelbilder ved hover */
    .avatar-item:hover .avatar-bilde:not(.png-karakter) {
      transform: scale(1.08);
    }

    .avatar-navn {
      margin-top: 15px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.25s ease;
      text-align: center;
    }

    .avatar-item:hover .avatar-navn,
    .avatar-item.selected .avatar-navn {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Navigasjonspiler */
    .nav-pil {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(13, 30, 34, 0.85);
      border: 1px solid var(--border);
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 10;
      backdrop-filter: blur(8px);
      transition: all 0.25s ease;
    }

    .nav-pil:hover {
      background: var(--accent);
      color: #071315;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-50%) scale(1.1);
    }

    .pil-venstre { left: -25px; }
    .pil-hoyre { right: -25px; }

    /* Knapper */
    .bunn-seksjon {
      margin-top: 15px;
      text-align: center;
    }

    .lagre-knapp {
      background: var(--accent);
      color: #050c0e;
      padding: 16px 48px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 25px var(--accent-glow);
    }

    .lagre-knapp:hover {
      background-color: #33ffd6;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 30px rgba(0, 255, 204, 0.5);
    }

    @media (max-width: 768px) {
      .karusell-wrapper { max-width: 100%; padding: 0; }
      .pil-venstre { left: 0px; }
      .pil-hoyre { right: 0px; }
      .kategori-kort { padding: 30px 15px 20px 15px; }
    }
  </style>
</head>
<body>

<div class="topp-seksjon">
  <h1>Velg Profilbilde</h1>
  <p class="subtitle">Utforsk karakterer og finn din stil</p>
</div>

<div class="karusell-wrapper">
  <button class="nav-pil pil-venstre" onclick="flyttKarusell(-1)"><i class="fa-solid fa-chevron-left"></i></button>
  
  <div class="karusell-viewport">
    <div class="karusell-spor" id="karusell-spor">
      <!-- Genereres via JS -->
    </div>
  </div>

  <button class="nav-pil pil-hoyre" onclick="flyttKarusell(1)"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<div class="bunn-seksjon">
  <button class="lagre-knapp" onclick="tilbakeTilKonto()"><i class="fa-solid fa-check"></i> Lagre og fortsett</button>
</div>

<script type="module">
import { auth, db } from "./firebase-oppsett.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const urlParams = new URLSearchParams(window.location.search);
const aktivProfilIndex = parseInt(urlParams.get('index')) || 0;

/* 
  Sett 'erPng: true' for at figuren skal sprette opp over rammen (3D-effekt).
  Legg valgfritt til 'farge' (f.eks. '#ff0055') for å gi tilpasset bakgrunnsglød på hver figur!
*/
const kategorier = [
  {
    tittel: "Karakterer & Ikoner",
    bilder: [
      { url: 'https://static.wixstatic.com/media/d9ace9_f30eec65f0434128974f59e1bba6d30d~mv2.jpg', navn: "Tiger", erPng: false, farge: 'rgba(255, 153, 0, 0.6)' },
      { url: 'https://static.wixstatic.com/media/d9ace9_ca94b393665e49c98c8432e69a33e49f~mv2.jpg', navn: "Robot", erPng: false, farge: 'rgba(0, 204, 255, 0.6)' },
      { url: 'https://static.wixstatic.com/media/d9ace9_675337e8909c4b44aa606f634ad6a2ed~mv2.jpg', navn: "Alien", erPng: false, farge: 'rgba(153, 51, 255, 0.6)' }
    ]
  },
  {
    tittel: "Klassiske farger",
    bilder: [
      { url: 'https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png', navn: "Rød", erPng: true, farge: 'rgba(255, 50, 50, 0.7)' },
      { url: 'https://static.wixstatic.com/media/fd2fb2_4c90736292b44b59929074fa97b847b3~mv2.png', navn: "Blå", erPng: true, farge: 'rgba(0, 150, 255, 0.7)' },
      { url: 'https://static.wixstatic.com/media/fd2fb2_bda02652f6384ce59dfaf168afecdb64~mv2.png', navn: "Grønn", erPng: true, farge: 'rgba(0, 230, 115, 0.7)' }
    ]
  },
  {
    tittel: "Detektiv Muffins på eventyr",
    bilder: [
      { url: 'https://static.wixstatic.com/media/d9ace9_21edff009aec43ed92ab6f25b38c7592~mv2.png', navn: "Detektiv Muffins", erPng: false, farge: 'rgba(255, 204, 0, 0.6)' }
    ]
  }
];

const sporEl = document.getElementById('karusell-spor');
let aktivIndex = 0;
let valgtBilde = null;
let profiler = [];
let docRef = null;

// Cache-håndtering
const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
if (cachedProfiles) {
  try {
    profiler = JSON.parse(cachedProfiles);
    if (profiler[aktivProfilIndex]) {
      valgtBilde = profiler[aktivProfilIndex].bilde || null;
    }
  } catch (e) {
    console.error("Feil ved lesing av cache:", e);
  }
}

byggKarusell();
oppdaterValgMarkering();

function byggKarusell() {
  sporEl.innerHTML = "";
  kategorier.forEach(kat => {
    const kort = document.createElement('div');
    kort.className = 'kategori-kort';

    const tittel = document.createElement('div');
    tittel.className = 'kategori-tittel';
    tittel.textContent = kat.tittel;

    const grid = document.createElement('div');
    grid.className = 'avatar-grid';

    kat.bilder.forEach(item => {
      const avatarItem = document.createElement('div');
      avatarItem.className = 'avatar-item';
      
      // Sett fargeglød om spesifisert
      if (item.farge) {
        avatarItem.style.setProperty('--glow-color', item.farge);
      }

      const wrap = document.createElement('div');
      wrap.className = 'avatar-bilde-wrap';

      const bg = document.createElement('div');
      bg.className = 'avatar-bg';

      const img = document.createElement('img');
      img.src = item.url;
      img.alt = item.navn;
      img.className = `avatar-bilde ${item.erPng ? 'png-karakter' : ''}`;

      wrap.appendChild(bg);
      wrap.appendChild(img);
      avatarItem.appendChild(wrap);

      if (item.navn) {
        const navnEl = document.createElement('div');
        navnEl.className = 'avatar-navn';
        navnEl.textContent = item.navn;
        avatarItem.appendChild(navnEl);
      }

      avatarItem.addEventListener('click', () => {
        valgtBilde = item.url;
        oppdaterValgMarkering();
      });

      grid.appendChild(avatarItem);
    });

    kort.appendChild(tittel);
    kort.appendChild(grid);
    sporEl.appendChild(kort);
  });
}

function flyttKarusell(retning) {
  aktivIndex += retning;
  if (aktivIndex < 0) aktivIndex = kategorier.length - 1;
  if (aktivIndex >= kategorier.length) aktivIndex = 0;
  
  sporEl.style.transform = `translateX(-${aktivIndex * 100}%)`;
}

function oppdaterValgMarkering() {
  document.querySelectorAll('.avatar-item').forEach(el => {
    const imgEl = el.querySelector('img');
    const isSelected = imgEl.src === valgtBilde;
    el.classList.toggle('selected', isSelected);
  });
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    docRef = doc(db, "users", user.uid);
    hentProfilbildeFraDb();
  } else {
    window.location.href = "Innlogging.html";
  }
});

async function hentProfilbildeFraDb() {
  try {
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      profiler = docSnap.data().profiler || [];
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      if (profiler[aktivProfilIndex]) {
        valgtBilde = profiler[aktivProfilIndex].bilde || null;
        oppdaterValgMarkering();
      }
    }
  } catch (err) {
    console.error("Feil ved henting:", err);
  }
}

async function tilbakeTilKonto() {
  if (profiler[aktivProfilIndex] && valgtBilde) {
    profiler[aktivProfilIndex].bilde = valgtBilde;
    localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));

    if (localStorage.getItem("aktivProfilIndex") === String(aktivProfilIndex)) {
      localStorage.setItem("profilbilde", valgtBilde);
    }

    if (docRef) {
      try {
        await setDoc(docRef, { profiler: profiler }, { merge: true });
      } catch (err) {
        console.error("Feil ved lagring til Firestore:", err);
      }
    }
  }
  window.location.href = `konto.html?index=${aktivProfilIndex}`;
}

window.flyttKarusell = flyttKarusell;
window.tilbakeTilKonto = tilbakeTilKonto;
</script>

</body>
</html>
