<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Watch Støtteordning</title>
</head>

<body style="background:#091B1E; color:white; font-family:Arial; padding:40px;">

<h1>Watch Støtteordning</h1>

<form id="form">

<input name="fornavn" placeholder="Fornavn" required><br><br>
<input name="etternavn" placeholder="Etternavn" required><br><br>
<input name="studio" placeholder="Studio" required><br><br>

<select name="type">
<option>Film</option>
<option>Kortfilm</option>
<option>Serie</option>
</select><br><br>

<input name="rolle" placeholder="Rolle" required><br><br>
<input name="epost" placeholder="E-post" required><br><br>

<input type="file" name="manus" accept="image/png" required><br><br>

<textarea name="beskrivelse" placeholder="Beskrivelse"></textarea><br><br>

<button>Send</button>

</form>

<script>
document.getElementById("form").addEventListener("submit", async e => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const res = await fetch("http://localhost:3000/send", {
    method: "POST",
    body: formData
  });

  alert("Søknad sendt!");
});
</script>

</body>
</html>
