<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
:root {
  --bg:#0a0a0a;
  --card:#141414;
  --muted:#9e9e9e;
  --accent:#00aaff;
}

body {
  margin:0;
  background:radial-gradient(circle at top, #111, #050505);
  color:white;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  transition:opacity .3s;
}

.container {
  text-align:center;
}

h1 {
  font-size:46px;
  margin-bottom:70px;
}

.profiles {
  display:flex;
  gap:70px;
  flex-wrap:wrap;
  justify-content:center;
}

.profile {
  cursor:pointer;
  transition:.35s;
  text-align:center;
  position:relative;
}

.profile:hover {
  transform:scale(1.15);
}

.avatar {
  width:170px;
  height:170px;
  border-radius:50%;
  overflow:hidden;
  background:var(--card);
  border:2px solid transparent;
  transition:.35s;
}

.profile:hover .avatar {
  border-color:var(--accent);
  box-shadow:0 0 25px rgba(0,170,255,0.5);
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.name {
  margin-top:18px;
  font-size:18px;
  color:var(--muted);
}

.profile:hover .name {
  color:white;
}

.edit-btn {
  position:absolute;
  bottom:55px;
  right:15px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  border-radius:50%;
  font-size:14px;
  opacity:0;
  transition:.3s;
}

.profile:hover .edit-btn {
  opacity:1;
}

.add-profile .avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hvem er det som ser på?</h1>
  <div class="profiles" id="profiles"></div>
</div>

<script>

const MAX_PROFILER = 5;

/* LAST PROFILER */
let profiler = JSON.parse(localStorage.getItem("profiler"));

if (!profiler) {
  profiler = [
    {
      navn: "Bruker 1",
      bilde: "https://api.dicebear.com/7.x/avataaars/svg?seed=User1",
      pin: null
    }
  ];
  localStorage.setItem("profiler", JSON.stringify(profiler));
}

/* 🔥 HENT ENDRING FRA KONTO/BILDEVELGER */
let valgtBilde = localStorage.getItem("valgtProfilbilde");
let aktivProfilIndex = localStorage.getItem("aktivProfil");

/* Hvis bilde er endret → oppdater riktig profil */
if (valgtBilde && aktivProfilIndex !== null && profiler[aktivProfilIndex]) {
  profiler[aktivProfilIndex].bilde = valgtBilde;

  localStorage.setItem("profiler", JSON.stringify(profiler));

  localStorage.removeItem("valgtProfilbilde");
}

const container = document.getElementById("profiles");

/* RENDER */
function renderProfiler() {
  container.innerHTML = "";

  profiler.forEach((profil, index) => {

    const div = document.createElement("div");
    div.className = "profile";

    div.innerHTML = `
      <div class="avatar">
        <img src="${profil.bilde}">
      </div>

      <div class="name">${profil.navn}</div>

      <div class="edit-btn">
        <i class="fa-solid fa-pen"></i>
      </div>
    `;

    /* VELG PROFIL */
    div.addEventListener("click", () => {
      velgProfil(index);
    });

    /* REDIGER */
    div.querySelector(".edit-btn").addEventListener("click", (e) => {
      e.stopPropagation();

      localStorage.setItem("redigerProfilIndex", index);
      window.location.href = "konto.html";
    });

    container.appendChild(div);
  });

  /* LEGG TIL PROFIL */
  if (profiler.length < MAX_PROFILER) {
    const add = document.createElement("div");
    add.className = "profile add-profile";

    add.innerHTML = `
      <div class="avatar">+</div>
      <div class="name">Legg til</div>
    `;

    add.addEventListener("click", leggTilProfil);

    container.appendChild(add);
  }
}

renderProfiler();

/* VELG PROFIL */
function velgProfil(index) {
  const profil = profiler[index];

  if (profil.pin) {
    const input = prompt("Skriv PIN:");

    if (input !== profil.pin) {
      alert("Feil PIN");
      return;
    }
  }

  localStorage.setItem("aktivProfil", index);

  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "Hovedside.html";
  }, 300);
}

/* LEGG TIL PROFIL */
function leggTilProfil() {
  if (profiler.length >= MAX_PROFILER) return;

  const navn = prompt("Navn:");
  if (!navn) return;

  profiler.push({
    navn: navn,
    bilde: `https://api.dicebear.com/7.x/avataaars/svg?seed=${navn}`,
    pin: null
  });

  localStorage.setItem("profiler", JSON.stringify(profiler));

  renderProfiler();
}

</script>

</body>
</html>
