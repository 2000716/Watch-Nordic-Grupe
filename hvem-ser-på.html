<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hvem ser på? – Watch Nordic</title>

<style>
:root {
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --muted:#b3b3b3;
  --accent:#00a8e1;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background: radial-gradient(circle at top, rgba(0,168,225,0.15), transparent 40%), var(--bg);
  color:white;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

h1 {
  font-size:42px;
  font-weight:600;
  margin-bottom:50px;
  letter-spacing:0.5px;
}

/* PROFILES */
.profiles {
  display:flex;
  gap:50px;
  flex-wrap:wrap;
  justify-content:center;
}

.profile {
  text-align:center;
  cursor:pointer;
  transition:transform .25s ease;
}

.profile:hover {
  transform:scale(1.12);
}

/* AVATAR */
.avatar {
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  background:var(--card);
  border:3px solid transparent;
  transition:.3s;
  box-shadow:0 0 0 transparent;
}

.profile:hover .avatar {
  border-color:var(--accent);
  box-shadow:0 0 25px rgba(0,168,225,0.4);
}

.profile.active .avatar {
  border-color:white;
}

/* IMAGE */
.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* KIDS BADGE */
.kids-badge {
  position:absolute;
  bottom:8px;
  right:8px;
  background:#ffc107;
  color:black;
  font-size:12px;
  padding:3px 8px;
  border-radius:12px;
  font-weight:600;
}

/* ✏️ EDIT BUTTON */
.edit-btn {
  margin:12px auto 0;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#2a2a2a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
  opacity:0;
  transform:scale(0.8);
}

.manage-mode .edit-btn {
  opacity:1;
  transform:scale(1);
}

.edit-btn:hover {
  background:var(--accent);
  transform:scale(1.1);
}

/* NAME */
.name {
  margin-top:14px;
  font-size:18px;
  color:var(--muted);
  transition:0.2s;
}

.profile:hover .name {
  color:white;
}

/* DELETE */
.delete {
  margin-top:6px;
  font-size:13px;
  color:#ff6b6b;
  display:none;
}

.manage-mode .delete {
  display:block;
}

/* BUTTONS */
.actions {
  margin-top:60px;
  display:flex;
  gap:20px;
}

button {
  background:none;
  border:1px solid var(--muted);
  color:white;
  padding:12px 30px;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  border-color:white;
  transform:scale(1.05);
}

/* FOOTER */
footer {
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#8c8c8c;
}
</style>
</head>

<body>

<h1>Hvem ser på?</h1>

<div class="profiles" id="profiles"></div>

<div class="actions">
  <button onclick="leggTilProfil()">Legg til profil</button>
  <button onclick="toggleManage()">Administrer profiler</button>
</div>

<footer>
© 2026 Watch Nordic AS
</footer>

<script>

const MAX_PROFILER = 5;
let manageMode = false;

let profiler = JSON.parse(localStorage.getItem("profiler")) || [];

/* DEFAULT */
if (!Array.isArray(profiler) || profiler.length === 0) {
  profiler = [
    {
      navn: "Bruker 1",
      bilde: "https://api.dicebear.com/7.x/avataaars/svg?seed=User1",
      barn: false
    },
    {
      navn: "Barn",
      bilde: "https://api.dicebear.com/7.x/bottts/svg?seed=Kid",
      barn: true
    }
  ];
  localStorage.setItem("profiler", JSON.stringify(profiler));
}

let aktivProfil = Number(localStorage.getItem("aktivProfil"));
if (isNaN(aktivProfil)) aktivProfil = 0;

const container = document.getElementById("profiles");

/* RENDER */
function renderProfiler() {
  container.innerHTML = "";

  profiler.forEach((profil, index) => {

    const div = document.createElement("div");
    div.className = "profile";

    if (index === aktivProfil) {
      div.classList.add("active");
    }

    div.innerHTML = `
      <div class="avatar">
        <img src="${profil.bilde}">
      </div>

      <div class="edit-btn">✏️</div>

      <div class="name">${profil.navn}</div>
      ${manageMode ? `<div class="delete">Slett</div>` : ""}
    `;

    /* KLIKK PROFIL */
    div.addEventListener("click", () => {
      if (!manageMode) {
        velgProfil(index);
      }
    });

    /* ✏️ REDIGER */
    const editBtn = div.querySelector(".edit-btn");
    editBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      redigerProfil(index);
    });

    /* SLETT */
    if (manageMode) {
      const deleteBtn = div.querySelector(".delete");
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        slettProfil(index);
      });
    }

    container.appendChild(div);
  });

  document.body.classList.toggle("manage-mode", manageMode);
}

renderProfiler();

/* VELG PROFIL */
function velgProfil(index) {
  const profil = profiler[index];

  localStorage.setItem("aktivProfil", index);
  localStorage.setItem("aktivNavn", profil.navn);
  localStorage.setItem("aktivBilde", profil.bilde);
  localStorage.setItem("erBarn", profil.barn);

  document.body.style.opacity = "0.4";

  setTimeout(() => {
    window.location.href = "Hovedside.html";
  }, 250);
}

/* REDIGER */
function redigerProfil(index) {
  localStorage.setItem("redigerProfil", index);
  window.location.href = "Konto.html";
}

/* LEGG TIL */
function leggTilProfil() {
  if (profiler.length >= MAX_PROFILER) {
    alert("Maks 5 profiler!");
    return;
  }

  window.location.href = "Registreringsside.html";
}

/* ADMIN MODE */
function toggleManage() {
  manageMode = !manageMode;
  renderProfiler();
}

/* SLETT */
function slettProfil(index) {
  if (!confirm("Slette denne profilen?")) return;

  profiler.splice(index, 1);
  localStorage.setItem("profiler", JSON.stringify(profiler));

  if (aktivProfil >= profiler.length) {
    aktivProfil = 0;
  }

  localStorage.setItem("aktivProfil", aktivProfil);
  renderProfiler();
}

</script>

</body>
</html>
