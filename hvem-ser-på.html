<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
:root {
  --bg:#0b0b0b;
  --muted:#9e9e9e;
}

body {
  margin:0;
  background:var(--bg);
  color:white;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  transition:opacity .3s;
}

.container {
  text-align:center;
}

h1 {
  font-size:42px;
  margin-bottom:60px;
}

/* GRID */
.profiles {
  display:flex;
  gap:60px;
  flex-wrap:wrap;
  justify-content:center;
}

/* PROFILE */
.profile {
  cursor:pointer;
  transition:.25s;
  text-align:center;
  position:relative;
}

.profile:hover {
  transform:scale(1.1);
}

/* AVATAR */
.avatar {
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  background:#1a1a1a;
  border:2px solid transparent;
  transition:.3s;
}

.profile:hover .avatar {
  border-color:white;
}

/* IMAGE */
.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
.name {
  margin-top:16px;
  font-size:18px;
  color:var(--muted);
}

.profile:hover .name {
  color:white;
}

/* EDIT ICON */
.edit-btn {
  margin-top:10px;
  font-size:16px;
  color:#aaa;
  opacity:0;
  transition:.2s;
}

.profile:hover .edit-btn {
  opacity:1;
}

.edit-btn:hover {
  color:white;
}

/* ADD PROFILE */
.add-profile .avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:#777;
}

.add-profile:hover .avatar {
  border-color:white;
  color:white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hvem er det som ser på?</h1>
  <div class="profiles" id="profiles"></div>
</div>

<script>

const MAX_PROFILER = 5;

/* HENT BILDE FRA REGISTRERING */
let lagretBilde = localStorage.getItem("valgtProfilbilde");

/* PROFILER */
let profiler = JSON.parse(localStorage.getItem("profiler")) || [
  {
    navn:"Bruker 1",
    bilde: lagretBilde || "https://api.dicebear.com/7.x/avataaars/svg?seed=User1",
    pin:null
  }
];

const container = document.getElementById("profiles");

/* RENDER */
function renderProfiler() {
  container.innerHTML = "";

  profiler.forEach((profil, index) => {

    const div = document.createElement("div");
    div.className = "profile";

    div.innerHTML = `
      <div class="avatar">
        <img src="${profil.bilde}">
      </div>

      <div class="name">${profil.navn}</div>

      <div class="edit-btn">
        <i class="fa-solid fa-pen"></i>
      </div>
    `;

    /* SELECT PROFILE */
    div.addEventListener("click", () => {
      velgProfil(index);
    });

    /* EDIT ICON → konto.html */
    div.querySelector(".edit-btn").addEventListener("click", (e) => {
      e.stopPropagation();

      localStorage.setItem("redigerProfilIndex", index);

      window.location.href = "konto.html";
    });

    container.appendChild(div);
  });

  /* ADD PROFILE */
  if (profiler.length < MAX_PROFILER) {
    const add = document.createElement("div");
    add.className = "profile add-profile";

    add.innerHTML = `
      <div class="avatar">+</div>
      <div class="name">Legg til</div>
    `;

    add.addEventListener("click", leggTilProfil);

    container.appendChild(add);
  }
}

renderProfiler();

/* SELECT PROFILE */
function velgProfil(index) {
  const profil = profiler[index];

  if (profil.pin) {
    const input = prompt("Skriv PIN:");

    if (input !== profil.pin) {
      alert("Feil PIN");
      return;
    }
  }

  localStorage.setItem("aktivProfil", index);

  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "Hovedside.html";
  }, 300);
}

/* ADD PROFILE */
function leggTilProfil() {
  if (profiler.length >= MAX_PROFILER) return;

  const navn = prompt("Navn:");
  if (!navn) return;

  profiler.push({
    navn,
    bilde: localStorage.getItem("valgtProfilbilde") || `https://api.dicebear.com/7.x/avataaars/svg?seed=${navn}`,
    pin:null
  });

  localStorage.setItem("profiler", JSON.stringify(profiler));
  renderProfiler();
}

</script>

</body>
</html>
