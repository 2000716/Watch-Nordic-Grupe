<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hvem ser på? | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #091B1E;
      --card: rgba(255, 255, 255, 0.04);
      --muted: #bfc9c9;
      --accent: #00FFCC;
      --border: rgba(255, 255, 255, 0.08);
      --delete: #ff4d4d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      transition: opacity 0.4s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,204,0.05), transparent 50%);
      z-index: -1;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 1200px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 60px;
      text-shadow: 0 0 15px rgba(0,255,204,0.15);
    }

    .profiles {
      display: flex;
      gap: 50px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .profile {
      cursor: pointer;
      transition: transform 0.3s ease;
      text-align: center;
      position: relative;
      width: 160px;
    }

    .profile:hover {
      transform: scale(1.08);
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      border: 3px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      margin: 0 auto;
    }

    .profile:hover .avatar {
      border-color: var(--accent);
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.25s;
      word-break: break-word;
    }

    .profile:hover .name {
      color: white;
    }

    /* Handling-knapper som dukker opp ved hover */
    .action-btn {
      position: absolute;
      background: rgba(9, 27, 30, 0.9);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 50%;
      font-size: 13px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .profile:hover .action-btn {
      opacity: 1;
      transform: scale(1);
    }

    /* Redigeringsblyant */
    .edit-btn {
      top: 0;
      right: 15px;
      color: var(--accent);
    }
    .edit-btn:hover {
      background: var(--accent);
      color: #071214;
    }

    /* Sletteknapp */
    .delete-btn {
      top: 0;
      left: 15px;
      color: var(--delete);
      border-color: rgba(255, 77, 77, 0.3);
    }
    .delete-btn:hover {
      background: var(--delete);
      color: white;
      border-color: var(--delete);
    }

    /* Legg til profil knapp */
    .add-profile .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      color: rgba(255,255,255,0.4);
      background: var(--card);
      border: 2px dashed rgba(255,255,255,0.2);
    }

    .add-profile:hover .avatar {
      border-color: var(--accent);
      border-style: solid;
      color: var(--accent);
      background: rgba(0, 255, 204, 0.03);
    }

    /* POPUP MODAL FOR NY PROFIL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 14, 16, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: #0d2529;
      border: 1px solid var(--border);
      padding: 35px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal.active .modal-content {
      transform: translateY(0);
    }

    .modal h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .modal input {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      margin-bottom: 25px;
      outline: none;
      text-align: center;
    }

    .modal input:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .btn-create {
      background: var(--accent);
      color: #071214;
    }
    .btn-create:hover { background: #00e6b8; }

    .btn-close {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
    }
    .btn-close:hover { color: white; border-color: rgba(255,255,255,0.3); }

    @media (max-width: 768px) {
      h1 { font-size: 30px; margin-bottom: 40px; }
      .profiles { gap: 30px; }
      .profile { width: 130px; }
      .avatar { width: 120px; height: 120px; }
      .action-btn { opacity: 1; transform: scale(1); } /* Alltid synlig på mobil */
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hvem ser på nå?</h1>
    <div class="profiles" id="profiles"></div>
  </div>

  <div class="modal" id="addProfileModal">
    <div class="modal-content">
      <h2>Opprett ny profil</h2>
      <input type="text" id="newProfileName" placeholder="Skriv profilnavn..." maxlength="15">
      <div class="modal-actions">
        <button class="btn-create" onclick="lagreNyProfil()">Opprett profil</button>
        <button class="btn-close" onclick="lukkModal()">Avbryt</button>
      </div>
    </div>
  </div>

  <script>
    const MAX_PROFILER = 5;
    const container = document.getElementById("profiles");
    const modal = document.getElementById("addProfileModal");
    const newProfileNameInput = document.getElementById("newProfileName");

    const standardBilde = "https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png";

    /* 1. LAST PROFILER */
    let profiler = JSON.parse(localStorage.getItem("profiler"));

    if (!profiler) {
      const globaltNavn = localStorage.getItem("navn") || "Hovedprofil";
      const globaltBilde = localStorage.getItem("profilbilde") || standardBilde;
      
      profiler = [
        {
          navn: globaltNavn,
          bilde: globaltBilde,
          pin: null
        }
      ];
      localStorage.setItem("profiler", JSON.stringify(profiler));
    }

    /* 2. SYNKRONISERING FRÅ KONTOSIDE */
    let aktivProfilIndex = localStorage.getItem("aktivProfil");
    if (aktivProfilIndex !== null && profiler[aktivProfilIndex]) {
      const oppdatertBilde = localStorage.getItem("profilbilde");
      const oppdatertNavn = localStorage.getItem("navn");
      let endret = false;

      if (oppdatertBilde && profiler[aktivProfilIndex].bilde !== oppdatertBilde) {
        profiler[aktivProfilIndex].bilde = oppdatertBilde;
        endret = true;
      }
      if (oppdatertNavn && profiler[aktivProfilIndex].navn !== oppdatertNavn) {
        profiler[aktivProfilIndex].navn = oppdatertNavn;
        endret = true;
      }
      if (endret) {
        localStorage.setItem("profiler", JSON.stringify(profiler));
      }
    }

    /* 3. TEGN PROFILER (RENDER) */
    function renderProfiler() {
      container.innerHTML = "";

      profiler.forEach((profil, index) => {
        const div = document.createElement("div");
        div.className = "profile";

        // Lag sletteknapp-HTML bare hvis det IKKE er profil nr 1 (indeks 0), så man ikke tømmer alt
        const deleteBtnHtml = index > 0 
          ? `<div class="action-btn delete-btn" title="Slett denne profilen"><i class="fa-solid fa-trash"></i></div>` 
          : '';

        div.innerHTML = `
          <div class="avatar">
            <img src="${profil.bilde || standardBilde}">
          </div>
          <div class="name">${profil.navn}</div>
          <div class="action-btn edit-btn" title="Endre navn og bilde">
            <i class="fa-solid fa-pen"></i>
          </div>
          ${deleteBtnHtml}
        `;

        // Klikk på selve profilen for å velge den
        div.addEventListener("click", () => {
          velgProfil(index);
        });

        // Klikk på redigeringsblyanten
        div.querySelector(".edit-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          localStorage.setItem("aktivProfil", index);
          localStorage.setItem("navn", profil.navn);
          localStorage.setItem("profilbilde", profil.bilde || standardBilde);
          window.location.href = "konto.html";
        });

        // Aktiver klikk på sletteknappen dersom den eksisterer
        const dBtn = div.querySelector(".delete-btn");
        if (dBtn) {
          dBtn.addEventListener("click", (e) => {
            e.stopPropagation(); // Unngå at profilen logges inn samtidig som den slettes
            slettProfil(index, profil.navn);
          });
        }

        container.appendChild(div);
      });

      /* LEGG TIL PROFIL-KNAPP */
      if (profiler.length < MAX_PROFILER) {
        const addDiv = document.createElement("div");
        addDiv.className = "profile add-profile";
        addDiv.innerHTML = `
          <div class="avatar"><i class="fa-solid fa-plus"></i></div>
          <div class="name">Legg til profil</div>
        `;
        addDiv.addEventListener("click", åpneModal);
        container.appendChild(addDiv);
      }
    }

    /* 4. SLETT PROFIL FUNKSJON */
    function slettProfil(index, navn) {
      if (!confirm(`Er du sikker på at du vil slette profilen "${navn}"? Alle innstillinger for denne profilen vil forsvinne.`)) return;

      // Slett profilen fra arrayen
      profiler.splice(index, 1);
      localStorage.setItem("profiler", JSON.stringify(profiler));

      // Hvis profilen vi slettet var den vi var logget inn på, nullstill aktivProfil til hovedprofilen (0)
      if (Number(aktivProfilIndex) === index) {
        localStorage.setItem("aktivProfil", 0);
        localStorage.setItem("navn", profiler[0].navn);
        localStorage.setItem("profilbilde", profiler[0].bilde);
      } else if (Number(aktivProfilIndex) > index) {
        // Juster indeksen ned et hakk hvis vi slettet en profil som lå foran oss i køen
        localStorage.setItem("aktivProfil", Number(aktivProfilIndex) - 1);
      }

      // Oppdater visningen med en gang
      renderProfiler();
    }

    /* 5. VELG EN PROFIL */
    function velgProfil(index) {
      const profil = profiler[index];

      if (profil.pin) {
        const input = prompt(`Skriv PIN-kode for ${profil.navn}:`);
        if (input !== profil.pin) {
          alert("Feil PIN-kode!");
          return;
        }
      }

      localStorage.setItem("aktivProfil", index);
      localStorage.setItem("navn", profil.navn);
      localStorage.setItem("profilbilde", profil.bilde || standardBilde);

      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "Hovedside.html";
      }, 400);
    }

    /* 6. MODAL-FUNKSJONER */
    function åpneModal() {
      newProfileNameInput.value = "";
      modal.classList.add("active");
      newProfileNameInput.focus();
    }

    function lukkModal() {
      modal.classList.remove("active");
    }

    function lagreNyProfil() {
      const navn = newProfileNameInput.value.trim();
      if (!navn) return alert("Profilen må ha et navn!");
      if (profiler.length >= MAX_PROFILER) return lukkModal();

      profiler.push({
        navn: navn,
        bilde: "https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png", 
        pin: null
      });

      localStorage.setItem("profiler", JSON.stringify(profiler));
      lukkModal();
      renderProfiler();
    }

    renderProfiler();
  </script>

</body>
</html>
