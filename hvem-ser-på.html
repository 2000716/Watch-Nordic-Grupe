<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hvem ser på? | Watch Nordic™</title>
  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root { --bg: #091B1E; --card: rgba(255, 255, 255, 0.04); --muted: #bfc9c9; --accent: #00FFCC; --border: rgba(255, 255, 255, 0.08); --delete: #ff4d4d; --kids-accent: #33b5ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: white; font-family: 'Inter', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; transition: opacity 0.4s ease; }
    .container { text-align: center; width: 100%; max-width: 1200px; padding: 40px 20px; }
    h1 { font-size: 40px; font-weight: 900; margin-bottom: 60px; }
    .profiles { display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; }
    .profile { cursor: pointer; transition: transform 0.3s ease; width: 160px; position: relative; }
    .profile:hover { transform: scale(1.08); }
    .avatar { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.1); margin: 0 auto; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .name { margin-top: 16px; font-size: 18px; font-weight: 600; color: var(--muted); }
    .modal { position: fixed; inset: 0; background: rgba(5,14,16,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #0d2529; padding: 35px; border-radius: 24px; width: 400px; text-align: center; border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hvem ser på nå?</h1>
    <div class="profiles" id="profiles">Laster profiler...</div>
  </div>

  <div class="modal" id="addProfileModal">
    <div class="modal-content">
      <h2>Opprett ny profil</h2>
      <input type="text" id="newProfileName" placeholder="Navn..." maxlength="15">
      <button onclick="lagreNyProfil()" class="btn-create">Opprett</button>
      <button onclick="lukkModal()" class="btn-close">Avbryt</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBlfCbB1AuiKVHMBEhYd0cvkJ0jxHVZfUg",
      authDomain: "watch-nordic-78b99.firebaseapp.com",
      projectId: "watch-nordic-78b99",
      storageBucket: "watch-nordic-78b99.firebasestorage.app",
      messagingSenderId: "541804766412",
      appId: "1:541804766412:web:83fc77721e384131a1ce69"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // SIKKERHETSSJEKK: Venter på at Firebase verifiserer innlogging
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        initApp();
      }
    });

    function initApp() {
      const container = document.getElementById("profiles");
      let profiler = JSON.parse(localStorage.getItem("profiler")) || [
        { navn: "Hovedprofil", bilde: "https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png" }
      ];

      function render() {
        container.innerHTML = "";
        profiler.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "profile";
          div.innerHTML = `<div class="avatar"><img src="${p.bilde}"></div><div class="name">${p.navn}</div>`;
          div.onclick = () => {
            localStorage.setItem("aktivProfil", i);
            window.location.href = "Hovedside.html";
          };
          container.appendChild(div);
        });
      }
      render();
    }
  </script>
</body>
</html>
