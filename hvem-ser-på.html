<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hvem ser på? – Watch Nordic</title>

<style>
:root {
  --bg:#141414;
  --card:#1f1f1f;
  --muted:#b3b3b3;
  --accent:#00a8e1;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background:
    radial-gradient(circle at top, rgba(0,168,225,0.15), transparent 40%),
    #141414;
  color:white;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

h1 {
  font-size:38px;
  font-weight:500;
  margin-bottom:40px;
}

/* PROFILES */
.profiles {
  display:flex;
  gap:40px;
  flex-wrap:wrap;
  justify-content:center;
}

.profile {
  text-align:center;
  cursor:pointer;
  transition:transform .2s ease;
}

.profile:hover { transform:scale(1.08); }

.avatar {
  width:150px;
  height:150px;
  border-radius:50%;
  overflow:hidden;
  background:var(--card);
  border:3px solid transparent;
  position:relative;
}

.profile:hover .avatar,
.profile.active .avatar {
  border-color:var(--accent);
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.kids-badge {
  position:absolute;
  bottom:6px;
  right:6px;
  background:#ffc107;
  color:black;
  font-size:12px;
  padding:2px 8px;
  border-radius:12px;
  font-weight:600;
}

.name {
  margin-top:14px;
  font-size:18px;
  color:var(--muted);
}

.delete {
  margin-top:6px;
  font-size:13px;
  color:#ff6b6b;
  display:none;
}

.manage-mode .delete {
  display:block;
}

.actions {
  margin-top:50px;
  display:flex;
  gap:16px;
}

button {
  background:none;
  border:1px solid var(--muted);
  color:white;
  padding:12px 28px;
  border-radius:6px;
  cursor:pointer;
}

button:hover { border-color:white; }

footer {
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#8c8c8c;
  text-align:center;
}
</style>
</head>

<body>

<h1>Hvem ser på?</h1>

<div class="profiles" id="profiles"></div>

<div class="actions">
  <button onclick="leggTilProfil()">Legg til profil</button>
  <button onclick="toggleManage()">Administrer profiler</button>
</div>

<footer>
© 2026 Watch Nordic AS. Alle rettigheter forbeholdt.
</footer>

<script>

const MAX_PROFILER = 5;
let manageMode = false;

let profiler = JSON.parse(localStorage.getItem("profiler")) || [];

/* DEFAULT */
if (!Array.isArray(profiler) || profiler.length === 0) {
  profiler = [
    {
      navn: "Bruker 1",
      bilde: "https://api.dicebear.com/7.x/avataaars/svg?seed=User1",
      barn: false
    },
    {
      navn: "Barn",
      bilde: "https://api.dicebear.com/7.x/bottts/svg?seed=Kid",
      barn: true
    }
  ];
  localStorage.setItem("profiler", JSON.stringify(profiler));
}

let aktivProfil = Number(localStorage.getItem("aktivProfil"));
if (isNaN(aktivProfil)) aktivProfil = 0;

const container = document.getElementById("profiles");

/* RENDER */
function renderProfiler() {
  container.innerHTML = "";

  profiler.forEach((profil, index) => {

    const div = document.createElement("div");
    div.className = "profile";

    if (index === aktivProfil) {
      div.classList.add("active");
    }

    div.innerHTML = `
      <div class="avatar">
        <img src="${profil.bilde}">
        ${profil.barn ? `<div class="kids-badge">👶</div>` : ""}
      </div>
      <div class="name">${profil.navn}</div>
      ${manageMode ? `<div class="delete">Slett</div>` : ""}
    `;

    /* KLIKK */
    div.addEventListener("click", () => {
      if (!manageMode) {
        velgProfil(index);
      }
    });

    /* SLETT */
    if (manageMode) {
      const deleteBtn = div.querySelector(".delete");
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        slettProfil(index);
      });
    }

    container.appendChild(div);
  });

  document.body.classList.toggle("manage-mode", manageMode);
}

renderProfiler();

/* VELG PROFIL (som Netflix) */
function velgProfil(index) {
  const profil = profiler[index];

  localStorage.setItem("aktivProfil", index);
  localStorage.setItem("aktivNavn", profil.navn);
  localStorage.setItem("aktivBilde", profil.bilde);
  localStorage.setItem("erBarn", profil.barn);

  /* liten delay for smooth følelse */
  document.body.style.opacity = "0.5";

  setTimeout(() => {
    window.location.href = "Hovedside.html";
  }, 300);
}

/* LEGG TIL */
function leggTilProfil() {
  if (profiler.length >= MAX_PROFILER) {
    alert("Maks 5 profiler!");
    return;
  }

  window.location.href = "Registreringsside.html";
}

/* ADMIN MODE */
function toggleManage() {
  manageMode = !manageMode;
  renderProfiler();
}

/* SLETT */
function slettProfil(index) {
  if (!confirm("Slette denne profilen?")) return;

  profiler.splice(index, 1);
  localStorage.setItem("profiler", JSON.stringify(profiler));

  if (aktivProfil >= profiler.length) {
    aktivProfil = 0;
  }

  localStorage.setItem("aktivProfil", aktivProfil);
  renderProfiler();
}

</script>

</body>
</html>
