<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hvem ser på? | Watch Nordic™</title>

  <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/d9ace9_95bbe3f5ff4b4aab9314a8d08804344e~mv2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #091B1E;
      --card: rgba(255, 255, 255, 0.04);
      --muted: #bfc9c9;
      --accent: #00FFCC;
      --border: rgba(255, 255, 255, 0.08);
      --kids-accent: #33b5ff;
      --btn-gray: rgba(255, 255, 255, 0.1);
      --btn-gray-hover: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      transition: opacity 0.4s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,204,0.05), transparent 50%);
      z-index: -1;
    }

    /* Topplinje for logo og kontoknapp */
    .top-bar {
      width: 100%;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .logo-img {
      height: 40px;
      object-fit: contain;
    }

    .account-btn {
      background: var(--btn-gray);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.25s ease;
      text-decoration: none;
    }

    .account-btn:hover {
      background: var(--btn-gray-hover);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 1200px;
      padding: 40px 20px;
      margin: auto;
    }

    h1 {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 60px;
      text-shadow: 0 0 15px rgba(0,255,204,0.15);
    }

    .profiles {
      display: flex;
      gap: 50px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .profile {
      cursor: pointer;
      transition: transform 0.3s ease;
      text-align: center;
      position: relative;
      width: 160px;
    }

    .profile:hover {
      transform: scale(1.08);
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      border: 3px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      margin: 0 auto;
    }

    .profile:hover .avatar {
      border-color: var(--accent);
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
    }

    .profile.kids-profile:hover .avatar {
      border-color: var(--kids-accent);
      box-shadow: 0 0 25px rgba(51, 181, 255, 0.5);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.25s;
      word-break: break-word;
    }

    .profile:hover .name {
      color: white;
    }

    .kids-badge {
      display: inline-block;
      background: var(--kids-accent);
      color: #071214;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Redigeringsknapp-styling (Pennen) */
    .action-btn {
      position: absolute;
      background: rgba(9, 27, 30, 0.9);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 50%;
      font-size: 13px;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.25s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .profile:hover .action-btn {
      opacity: 1;
      transform: scale(1);
    }

    .edit-btn {
      top: 0;
      right: 15px;
      color: var(--accent);
    }
    .edit-btn:hover {
      background: var(--accent);
      color: #071214;
    }

    .add-profile .avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      color: rgba(255,255,255,0.4);
      background: var(--card);
      border: 2px dashed rgba(255,255,255,0.2);
    }

    .add-profile:hover .avatar {
      border-color: var(--accent);
      border-style: solid;
      color: var(--accent);
      background: rgba(0, 255, 204, 0.03);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 14, 16, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: #0d2529;
      border: 1px solid var(--border);
      padding: 35px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal.active .modal-content {
      transform: translateY(0);
    }

    .modal h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .modal input[type="text"] {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
      outline: none;
      text-align: center;
    }

    .modal input[type="text"]:focus {
      border-color: var(--accent);
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
      cursor: pointer;
      user-select: none;
      font-size: 15px;
      color: var(--muted);
    }

    .checkbox-container input {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: var(--kids-accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }

    .btn-create {
      background: var(--accent);
      color: #071214;
    }
    .btn-create:hover { background: #00e6b8; }

    .btn-close {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
    }
    .btn-close:hover { color: white; border-color: rgba(255,255,255,0.3); }

    @media (max-width: 768px) {
      .top-bar { padding: 15px 20px; }
      h1 { font-size: 30px; margin-bottom: 40px; }
      .profiles { gap: 30px; }
      .profile { width: 130px; }
      .avatar { width: 120px; height: 120px; }
      .action-btn { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <img src="https://static.wixstatic.com/media/d9ace9_081ea242211b45a2801873c3067e1205~mv2.png" alt="Logo" class="logo-img">
    <a href="konto.html?index=0" class="account-btn" id="kontoLink">
      <i class="fa-solid fa-gear"></i> Konto
    </a>
  </div>

  <div class="container">
    <h1>Hvem er det som ser på?</h1>
    <div class="profiles" id="profiles"></div>
  </div>

  <div class="modal" id="addProfileModal">
    <div class="modal-content">
      <h2>Opprett ny profil</h2>
      <input type="text" id="newProfileName" placeholder="Skriv profilnavn..." maxlength="15">
      
      <label class="checkbox-container">
        <input type="checkbox" id="isKidsProfile">
        Dette er en barneprofil
      </label>

      <div class="modal-actions">
        <button class="btn-create" onclick="lagreNyProfil()">Opprett profil</button>
        <button class="btn-close" onclick="lukkModal()">Avbryt</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-oppsett.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const MAX_PROFILER = 5;
    const container = document.getElementById("profiles");
    const modal = document.getElementById("addProfileModal");
    const newProfileNameInput = document.getElementById("newProfileName");
    const isKidsProfileInput = document.getElementById("isKidsProfile");
    const kontoLink = document.getElementById("kontoLink");

    const standardBilde = "https://static.wixstatic.com/media/fd2fb2_39376e4ee55b460ab7a3ebbfcf35fef7~mv2.png";
    const barnBilde = "https://static.wixstatic.com/media/fd2fb2_3df40a7e62c545afa3918fc10393284d~mv2.png";

    let profiler = [];
    let docRef = null;

    // LYNRAST OPPSTART (Mellomlagring)
    const cachedProfiles = localStorage.getItem("watch_nordic_profiles_cache");
    if (cachedProfiles) {
      try {
        profiler = JSON.parse(cachedProfiles);
        renderProfiler(); 
      } catch (e) {
        console.error("Kunne ikke lese profil-cache:", e);
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        docRef = doc(db, "users", user.uid);
        hentProfiler();
      } else {
        window.location.href = "Innlogging.html";
      }
    });

    async function hentProfiler() {
      try {
        const docSnap = await getDoc(docRef);
        let databaseEndret = false;
        
        if (docSnap.exists()) {
          profiler = docSnap.data().profiler || [];
        } else {
          profiler = [];
        }

        if (profiler.length === 0) {
          profiler.push({
            navn: "Hovedprofil",
            bilde: standardBilde,
            pin: null,
            isKids: false,
            maksAldersgrense: "18"
          });
          databaseEndret = true;
        }

        // Automatisk barnekonto
        const harBarneprofil = profiler.some(p => p.isKids === true);
        if (!harBarneprofil) {
          profiler.push({
            navn: "Barn",
            bilde: barnBilde,
            pin: null,
            isKids: true,
            maksAldersgrense: "12"
          });
          databaseEndret = true;
        }

        if (databaseEndret) {
          await setDoc(docRef, { profiler: profiler }, { merge: true });
        }
        
        localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
        renderProfiler();
      } catch (error) {
        console.error("Feil ved henting av profiler:", error);
      }
    }

    function renderProfiler() {
      container.innerHTML = "";

      profiler.forEach((profil, index) => {
        const div = document.createElement("div");
        div.className = "profile" + (profil.isKids ? " kids-profile" : "");

        const kidsBadgeHtml = profil.isKids ? `<br><span class="kids-badge">Kids</span>` : '';

        // Lagt tilbake ".edit-btn" (pennen) i HTML-strukturen
        div.innerHTML = `
          <div class="avatar">
            <img src="${profil.bilde || (profil.isKids ? barnBilde : standardBilde)}">
          </div>
          <div class="name">${profil.navn}${kidsBadgeHtml}</div>
          <div class="action-btn edit-btn" title="Endre navn og bilde">
            <i class="fa-solid fa-pen"></i>
          </div>
        `;

        div.addEventListener("click", () => {
          velgProfil(index);
        });

        // Event listener for pennen som sender brukeren til konto.html med riktig profilindex
        div.querySelector(".edit-btn").addEventListener("click", (e) => {
          e.stopPropagation(); // Hindrer at profilen velges når man trykker på pennen
          window.location.href = `konto.html?index=${index}`;
        });

        container.appendChild(div);
      });

      if (profiler.length < MAX_PROFILER) {
        const addDiv = document.createElement("div");
        addDiv.className = "profile add-profile";
        addDiv.innerHTML = `
          <div class="avatar"><i class="fa-solid fa-plus"></i></div>
          <div class="name">Legg til profil</div>
        `;
        addDiv.addEventListener("click", åpneModal);
        container.appendChild(addDiv);
      }
    }

    function velgProfil(index) {
      const profil = profiler[index];

      if (profil.pin) {
        const input = prompt(`Skriv PIN-kode for ${profil.navn}:`);
        if (input !== profil.pin) {
          alert("Feil PIN-kode!");
          return;
        }
      }

      localStorage.setItem("aktivProfilIndex", index);
      localStorage.setItem("profilnavn", profil.navn || "");
      localStorage.setItem("aktivProfil", profil.navn || "");
      localStorage.setItem("profilbilde", profil.bilde || (profil.isKids ? barnBilde : standardBilde));
      localStorage.setItem("isKids", profil.isKids ? "true" : "false");
      localStorage.setItem("maksAldersgrense", profil.maksAldersgrense || "12");

      kontoLink.href = `konto.html?index=${index}`;

      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = `Hovedside.html?index=${index}`;
      }, 400);
    }

    function åpneModal() {
      newProfileNameInput.value = "";
      isKidsProfileInput.checked = false;
      modal.classList.add("active");
      newProfileNameInput.focus();
    }

    function lukkModal() {
      modal.classList.remove("active");
    }

    async function lagreNyProfil() {
      const navn = newProfileNameInput.value.trim();
      const erBarn = isKidsProfileInput.checked;

      if (!navn) return alert("Profilen må ha et navn!");
      if (profiler.length >= MAX_PROFILER) return lukkModal();

      profiler.push({
        navn: navn,
        bilde: erBarn ? barnBilde : standardBilde, 
        pin: null,
        isKids: erBarn,
        maksAldersgrense: erBarn ? "12" : "18"
      });

      await setDoc(docRef, { profiler: profiler }, { merge: true });
      localStorage.setItem("watch_nordic_profiles_cache", JSON.stringify(profiler));
      
      lukkModal();
      renderProfiler();
    }

    window.lagreNyProfil = lagreNyProfil;
    window.lukkModal = lukkModal;
    window.åpneModal = åpneModal;
  </script>
</body>
</html>
