<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profiler</title>

<style>
:root {
  --bg:#0b0b0b;
  --muted:#9e9e9e;
}

body {
  margin:0;
  background:var(--bg);
  color:white;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  transition:opacity .3s;
}

.container {
  text-align:center;
}

h1 {
  font-size:42px;
  margin-bottom:60px;
}

/* GRID */
.profiles {
  display:flex;
  gap:60px;
  flex-wrap:wrap;
  justify-content:center;
}

/* PROFILE */
.profile {
  cursor:pointer;
  transition:.25s;
  text-align:center;
}

.profile:hover {
  transform:scale(1.1);
}

/* AVATAR */
.avatar {
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  background:#1a1a1a;
  border:2px solid transparent;
  transition:.3s;
}

.profile:hover .avatar {
  border-color:white;
}

/* IMAGE */
.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* NAME */
.name {
  margin-top:16px;
  font-size:18px;
  color:var(--muted);
}

.profile:hover .name {
  color:white;
}

/* EDIT */
.edit-btn {
  margin-top:10px;
  font-size:14px;
  color:#aaa;
  opacity:0;
  transition:.2s;
}

.profile:hover .edit-btn {
  opacity:1;
}

.edit-btn:hover {
  color:white;
  text-decoration:underline;
}

/* ADD PROFILE */
.add-profile .avatar {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:#777;
}

.add-profile:hover .avatar {
  border-color:white;
  color:white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hvem ser på?</h1>
  <div class="profiles" id="profiles"></div>
</div>

<script>

const MAX_PROFILER = 5;

let profiler = JSON.parse(localStorage.getItem("profiler")) || [
  {
    navn:"Bruker 1",
    bilde:"https://api.dicebear.com/7.x/avataaars/svg?seed=User1",
    pin:null
  }
];

const container = document.getElementById("profiles");

/* AUTO LOGIN */
const sist = localStorage.getItem("aktivProfil");
if (sist !== null) {
  setTimeout(() => {
    velgProfil(Number(sist));
  }, 500);
}

/* RENDER */
function renderProfiler() {
  container.innerHTML = "";

  profiler.forEach((profil, index) => {

    const div = document.createElement("div");
    div.className = "profile";

    div.innerHTML = `
      <div class="avatar">
        <img src="${profil.bilde}">
      </div>

      <div class="name">${profil.navn}</div>
      <div class="edit-btn">Rediger</div>
    `;

    /* SELECT */
    div.addEventListener("click", () => {
      velgProfil(index);
    });

    /* EDIT */
    div.querySelector(".edit-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      redigerProfil(index);
    });

    container.appendChild(div);
  });

  /* ADD PROFILE */
  if (profiler.length < MAX_PROFILER) {
    const add = document.createElement("div");
    add.className = "profile add-profile";

    add.innerHTML = `
      <div class="avatar">+</div>
      <div class="name">Legg til</div>
    `;

    add.addEventListener("click", leggTilProfil);

    container.appendChild(add);
  }
}

renderProfiler();

/* SELECT PROFILE */
function velgProfil(index) {
  const profil = profiler[index];

  /* PIN CHECK */
  if (profil.pin) {
    const input = prompt("Skriv PIN:");

    if (input !== profil.pin) {
      alert("Feil PIN");
      return;
    }
  }

  localStorage.setItem("aktivProfil", index);

  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "Hovedside.html";
  }, 300);
}

/* EDIT */
function redigerProfil(index) {
  const profil = profiler[index];

  let nyttNavn = prompt("Endre navn:", profil.navn);
  if (nyttNavn) profil.navn = nyttNavn;

  let settPin = confirm("Vil du legge til/endre PIN?");
  if (settPin) {
    let nyPin = prompt("Ny PIN (4 tall):");
    if (nyPin) profil.pin = nyPin;
  }

  profiler[index] = profil;
  localStorage.setItem("profiler", JSON.stringify(profiler));

  renderProfiler();
}

/* ADD */
function leggTilProfil() {
  if (profiler.length >= MAX_PROFILER) return;

  const navn = prompt("Navn:");
  if (!navn) return;

  profiler.push({
    navn,
    bilde:`https://api.dicebear.com/7.x/avataaars/svg?seed=${navn}`,
    pin:null
  });

  localStorage.setItem("profiler", JSON.stringify(profiler));
  renderProfiler();
}

</script>

</body>
</html>
